// ═══════════════════════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════════════════════

async function apiGet(action, params = {}) {
    const url = new URL(API_URL);
    url.searchParams.set('action', action);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    for (let attempt = 0; attempt < 3; attempt++) {
        try {
            const res = await fetch(url.toString());
            return await res.json();
        } catch(err) {
            // JSONP fallback
            try {
                const name = '_jia' + Date.now() + Math.random().toString(36).slice(2);
                const result = await new Promise((resolve, reject) => {
                    let done = false;
                    const cleanup = () => { done = true; delete window[name]; if (script.parentNode) script.remove(); };
                    window[name] = (data) => { cleanup(); resolve(data); };
                    const script = document.createElement('script');
                    script.onerror = () => { cleanup(); reject(new Error('JSONP failed')); };
                    script.src = url.toString() + '&callback=' + name;
                    setTimeout(() => { if (!done) { cleanup(); reject(new Error('JSONP timeout')); } }, 15000);
                    document.head.appendChild(script);
                });
                return result;
            } catch(e2) {
                if (attempt === 2) throw e2;
                await new Promise(r => setTimeout(r, 1500));
            }
        }
    }
}

// SHA-256 hash ใน browser
async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function renderStaffList(role) {
    const isInstructor = role === 'instructor';
    const roleName = isInstructor ? 'ผู้สอน' : 'เซลล์';
    const roleIcon = isInstructor ? '🟡' : '🟢';

        <div class="card p-8 max-w-md w-full fade-in">
            <button onclick="renderChooseScreen()" class="text-gray-400 hover:text-gray-600 mb-4 flex items-center gap-1" style="cursor:pointer">← กลับ</button>
            <div class="text-center py-8">
                <div class="loading-spinner mb-4"></div>
                <p class="text-gray-500">กำลังโหลดรายชื่อ ${roleName}...</p>
            </div>
        </div>`;

    try {
        const users = await apiGet('listUsers');
        const staffList = (Array.isArray(users) ? users : []).filter(u => u.role === role);

        if (staffList.length === 0) {
            app.innerHTML = `
                <div class="card p-8 max-w-md w-full fade-in">
                    <button onclick="renderChooseScreen()" class="text-gray-400 hover:text-gray-600 mb-4 flex items-center gap-1" style="cursor:pointer">← กลับ</button>
                    <div class="text-center py-8">
                        <div class="text-5xl mb-4">${roleIcon}</div>
                        <h2 class="text-xl font-bold text-gray-800 mb-2">ยังไม่มี${roleName}</h2>
                        <p class="text-sm text-gray-500">แจ้ง Admin เพื่อเพิ่ม${roleName}ในระบบ</p>
                    </div>
                </div>`;
            return;
        }

        const colors = isInstructor
            ? { bg: 'bg-amber-50', hover: 'hover:bg-amber-100', active: 'active:bg-amber-200', border: 'hover:border-amber-300', circle: 'bg-amber-200', text: 'text-amber-700' }
            : { bg: 'bg-emerald-50', hover: 'hover:bg-emerald-100', active: 'active:bg-emerald-200', border: 'hover:border-emerald-300', circle: 'bg-emerald-200', text: 'text-emerald-700' };

        let listHtml = staffList.map(u => {
            const safeName = u.name.replace(/'/g, "\\'");
            return `
            <button onclick="staffTapLogin('${u.username}', '${safeName}', '${role}')"
                class="w-full ${colors.bg} ${colors.hover} ${colors.active} rounded-2xl p-5 transition-all text-left flex items-center gap-4 border-2 border-transparent ${colors.border}"
                style="cursor:pointer">
                <div class="w-12 h-12 rounded-full ${colors.circle} flex items-center justify-center text-xl font-bold ${colors.text}">
                    ${u.name.charAt(0)}
                </div>
                <div>
                    <p class="font-bold text-gray-800 text-lg">${u.name}</p>
                </div>
            </button>`;
        }).join('');

        app.innerHTML = `
            <div class="card p-8 max-w-md w-full fade-in">
                <button onclick="renderChooseScreen()" class="text-gray-400 hover:text-gray-600 mb-4 flex items-center gap-1" style="cursor:pointer">← กลับ</button>
                <div class="text-center mb-6">
                    <div class="text-4xl mb-2">${roleIcon}</div>
                    <h2 class="text-xl font-bold text-gray-800">เลือก${roleName}</h2>
                    <p class="text-sm text-gray-500">กดชื่อเพื่อเข้าระบบ</p>
                </div>
                <div class="space-y-3">${listHtml}</div>
            </div>`;
    } catch (err) {
        console.error('Load staff error:', err);
        app.innerHTML = `
            <div class="card p-8 max-w-md w-full fade-in">
                <button onclick="renderChooseScreen()" class="text-gray-400 hover:text-gray-600 mb-4 flex items-center gap-1" style="cursor:pointer">← กลับ</button>
                <div class="text-center py-8">
                    <div class="text-4xl mb-3">⚠️</div>
                    <p class="text-gray-600 mb-4">ไม่สามารถโหลดรายชื่อได้</p>
                    <button onclick="renderStaffList('${role}')" class="btn-primary" style="width:auto; padding:12px 24px;">ลองใหม่</button>
                </div>
            </div>`;
    }
}

function staffTapLogin(username, name, role) {
    saveSession({ username, name, role });
    const page = PAGES[role];
    if (page) { window.location.href = page; }
    else { renderSuccessScreen(role, name); }
}

// ═══════════════════════════════════════════════════════════
// SESSION HELPERS — use localStorage for persistence
// ═══════════════════════════════════════════════════════════

function saveSession(user) {
    const data = JSON.stringify({ username: user.username, name: user.name, role: user.role, loginAt: Date.now() });
    localStorage.setItem('jia_user', data);
    sessionStorage.setItem('jia_user', data); // keep backward compat
}
function clearSession() {
    localStorage.removeItem('jia_user');
    sessionStorage.removeItem('jia_user');
}
function getSavedSession() {
    const ls = localStorage.getItem('jia_user');
    if (ls) try { return JSON.parse(ls); } catch(e) {}
    const ss = sessionStorage.getItem('jia_user');
    if (ss) try { return JSON.parse(ss); } catch(e) {}
    return null;
}

// ═══════════════════════════════════════════════════════════
// AUTH ACTIONS
// ═══════════════════════════════════════════════════════════

// Admin login (username + full password)
async function handleLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    if (!username || !password) {
        errEl.textContent = 'กรุณากรอก username และรหัสผ่าน';
        errEl.classList.remove('hidden');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'กำลังตรวจสอบ...';
    errEl.classList.add('hidden');

    try {
        const passwordHash = await hashPassword(password);
        const result = await apiGet('loginPassword', {
            username: username,
            password: passwordHash
        });

        if (result.success) {
            saveSession(result);

            if (result.role === 'admin') {
                renderAdminPanel(result);
            } else {
                renderSuccessScreen(result.role, result.name);
            }
        } else {
            errEl.textContent = result.message || result.error || 'เข้าสู่ระบบไม่สำเร็จ';
            errEl.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'เข้าสู่ระบบ';
        }
    } catch (err) {
        console.error('Login error:', err);
        errEl.textContent = 'ไม่สามารถเชื่อมต่อ server ได้';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
    }
}

function handleSignOut() {
    clearSession();
    renderChooseScreen();
}

// ═══════════════════════════════════════════════════════════
// ADMIN: ADD STAFF (auto-generates username + PIN)
// ═══════════════════════════════════════════════════════════

async function handleAddStaff() {
    const nameEl = document.getElementById('new-staff-name');
    const roleEl = document.getElementById('new-staff-role');
    const btn = document.getElementById('add-staff-btn');
    const resultEl = document.getElementById('add-staff-result');
    const errEl = document.getElementById('add-staff-error');
    const name = nameEl.value.trim();
    const role = roleEl.value;

    if (!name) { errEl.textContent = 'กรุณาใส่ชื่อพนักงาน'; errEl.classList.remove('hidden'); return; }

    btn.disabled = true;
    btn.textContent = 'กำลังสร้าง...';
    errEl.classList.add('hidden');
    resultEl.classList.add('hidden');

    try {
        // Step 1: gen invite code
        const admin = getSavedSession() || {};
        const codeResult = await apiGet('genCode', { role, username: admin.username || 'admin' });
        if (!codeResult.success) { throw new Error(codeResult.message || 'สร้างรหัสไม่สำเร็จ'); }

        // Step 2: auto-generate username and PIN
        const autoUsername = name.toLowerCase().replace(/[^a-z0-9]/g, '') + Math.floor(Math.random() * 900 + 100);
        const autoPin = String(Math.floor(1000 + Math.random() * 9000)); // 4-digit PIN
        const pinHash = await hashPassword(autoPin);

        // Step 3: register
        const regResult = await apiGet('registerPassword', {
            code: codeResult.code,
            username: autoUsername,
            name: name,
            password: pinHash
        });

        if (regResult.success) {
            resultEl.innerHTML = `
                <p class="text-green-700 font-semibold mb-2">เพิ่ม "${name}" สำเร็จ!</p>
                <div class="bg-white rounded-lg p-3 text-left space-y-1">
                    <p class="text-sm text-gray-600">ตำแหน่ง: <strong>${role === 'sales' ? 'เซลล์' : role === 'instructor' ? 'ผู้สอน' : 'แอดมิน'}</strong></p>
                    <p class="text-sm text-gray-600">Username: <strong class="font-mono">${autoUsername}</strong></p>
                    <p class="text-sm text-gray-600">PIN: <strong class="font-mono text-lg">${autoPin}</strong></p>
                </div>
                <p class="text-xs text-gray-500 mt-2">* เซลล์/ผู้สอนไม่ต้องใช้ PIN (กดชื่อเข้าเลย) PIN ใช้สำรองเผื่อต้องการ</p>`;
            resultEl.classList.remove('hidden');
            nameEl.value = '';
            loadUsers(); // refresh list
        } else {
            throw new Error(regResult.message || regResult.error || 'ลงทะเบียนไม่สำเร็จ');
        }
    } catch (err) {
        console.error('Add staff error:', err);
        errEl.textContent = err.message || 'เกิดข้อผิดพลาด';
        errEl.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.textContent = 'เพิ่ม';
    }
}

async function handleResetPassword(username, displayName) {
    const newPass = prompt(`ตั้งรหัสผ่านใหม่ให้ "${displayName}" (@${username}):`);
    if (!newPass || !newPass.trim()) return;
    if (newPass.length < 4) { alert('รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร'); return; }
    try {
        const hashed = await hashPassword(newPass.trim());
        const saved = getSavedSession();
        const result = await apiGet('resetPassword', {
            adminUser: saved.username,
            targetUser: username,
            newPassword: hashed
        });
        if (result.error) { alert('ผิดพลาด: ' + result.error); return; }
        alert(`รีเซ็ตรหัสผ่านของ @${username} สำเร็จ!\nรหัสผ่านใหม่: ${newPass.trim()}`);
    } catch (err) {
        alert('เกิดข้อผิดพลาด: ' + err.message);
    }
}

async function loadUsers() {
    try {
        const users = await apiGet('listUsers');
        if (!Array.isArray(users) || users.length === 0) return;

        const listEl = document.getElementById('users-list');
        if (!listEl) return;

        const roleLabels = { admin: 'แอดมิน', sales: 'เซลล์', instructor: 'ผู้สอน' };
        const roleClasses = { admin: 'role-admin', sales: 'role-sales', instructor: 'role-instructor' };

        let html = '<div class="space-y-2">';
        users.forEach(u => {
            html += `
                <div class="flex justify-between items-center bg-gray-50 rounded-lg px-4 py-3">
                    <div>
                        <span class="font-semibold text-gray-800">${u.name}</span>
                        <span class="text-sm text-gray-500 ml-1">@${u.username}</span>
                        <span class="role-badge ${roleClasses[u.role] || ''} ml-2">${roleLabels[u.role] || u.role}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs text-gray-400">${u.lastLogin ? new Date(u.lastLogin).toLocaleDateString('th-TH') : 'ยังไม่เคย login'}</span>
                        <button onclick="handleResetPassword('${u.username}', '${u.name}')"
                            class="text-xs bg-amber-100 text-amber-700 px-3 py-1 rounded-lg hover:bg-amber-200 transition-colors font-medium">
                            รีเซ็ต Pass
                        </button>
                    </div>
                </div>`;
        });
        html += '</div>';

        listEl.innerHTML = html;
    } catch (err) {
        console.error('Load users error:', err);
    }
}

// INIT — Check if already logged in
// ═══════════════════════════════════════════════════════════

(function init() {
    const user = getSavedSession();
    if (user && user.username) {
        // Already logged in → go straight to their page
        if (user.role === 'admin') {
            renderAdminPanel(user);
        } else {
            // Auto-redirect for sales/instructor (no success screen needed)
            const page = PAGES[user.role];
            if (page) {
                // Also ensure sessionStorage is set for backward compat
                sessionStorage.setItem('jia_user', JSON.stringify(user));
                window.location.href = page;
                return;
            }
            renderSuccessScreen(user.role, user.name);
        }
        return;
    }
    renderChooseScreen();
})();
</script>
