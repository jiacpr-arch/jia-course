// ═══════════════════════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════════════════════

async function apiGet(action, params = {}) {
    const url = new URL(API_URL);
    url.searchParams.set('action', action);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    for (let attempt = 0; attempt < 3; attempt++) {
        try {
            const res = await fetch(url.toString());
            return await res.json();
        } catch(err) {
            // JSONP fallback
            try {
                const name = '_jia' + Date.now() + Math.random().toString(36).slice(2);
                const result = await new Promise((resolve, reject) => {
                    let done = false;
                    const cleanup = () => { done = true; delete window[name]; if (script.parentNode) script.remove(); };
                    window[name] = (data) => { cleanup(); resolve(data); };
                    const script = document.createElement('script');
                    script.onerror = () => { cleanup(); reject(new Error('JSONP failed')); };
                    script.src = url.toString() + '&callback=' + name;
                    setTimeout(() => { if (!done) { cleanup(); reject(new Error('JSONP timeout')); } }, 15000);
                    document.head.appendChild(script);
                });
                return result;
            } catch(e2) {
                if (attempt === 2) throw e2;
                await new Promise(r => setTimeout(r, 1500));
            }
        }
    }
}

// SHA-256 hash ใน browser
async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

        formLogin.classList.remove('hidden');
        formRegister.classList.add('hidden');
    } else {
        tabRegister.className = tabRegister.className.replace('tab-inactive', 'tab-active');
        tabLogin.className = tabLogin.className.replace('tab-active', 'tab-inactive');
        formRegister.classList.remove('hidden');

// ═══════════════════════════════════════════════════════════
// AUTH ACTIONS
// ═══════════════════════════════════════════════════════════

async function handleLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    if (!username || !password) {
        errEl.textContent = 'กรุณากรอก username และรหัสผ่าน';
        errEl.classList.remove('hidden');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'กำลังตรวจสอบ...';
    errEl.classList.add('hidden');

    try {
        const passwordHash = await hashPassword(password);
        const result = await apiGet('loginPassword', {
            username: username,
            password: passwordHash
        });

        if (result.success) {
            // Save session
            sessionStorage.setItem('jia_user', JSON.stringify({
                username: result.username,
                name: result.name,
                role: result.role
            }));

            if (result.role === 'admin') {
                renderAdminPanel(result);
            } else {
                renderSuccessScreen(result.role, result.name);
            }
        } else {
            errEl.textContent = result.message || result.error || 'เข้าสู่ระบบไม่สำเร็จ';
            errEl.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'เข้าสู่ระบบ';
        }
    } catch (err) {
        console.error('Login error:', err);
        errEl.textContent = 'ไม่สามารถเชื่อมต่อ server ได้';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
    }
}

async function handleRegister() {
    const code = document.getElementById('reg-code').value.trim().toUpperCase();
    const name = document.getElementById('reg-name').value.trim();
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const password2 = document.getElementById('reg-password2').value;
    const errEl = document.getElementById('register-error');
    const btn = document.getElementById('register-btn');

    // Validate
    if (!code) { showRegError('กรุณาใส่รหัสเชิญ'); return; }
    if (!name) { showRegError('กรุณาใส่ชื่อที่แสดง'); return; }
    if (!username) { showRegError('กรุณาใส่ชื่อผู้ใช้'); return; }
    if (username.length < 3) { showRegError('ชื่อผู้ใช้ต้องมีอย่างน้อย 3 ตัวอักษร'); return; }
    if (/[^a-zA-Z0-9._-]/.test(username)) { showRegError('ชื่อผู้ใช้ใช้ได้เฉพาะ a-z, 0-9, . _ -'); return; }
    if (!password) { showRegError('กรุณาตั้งรหัสผ่าน'); return; }
    if (password.length < 4) { showRegError('รหัสผ่านต้องมีอย่างน้อย 4 ตัว'); return; }
    if (password !== password2) { showRegError('รหัสผ่านไม่ตรงกัน'); return; }

    btn.disabled = true;
    btn.textContent = 'กำลังลงทะเบียน...';
    errEl.classList.add('hidden');

    try {
        const passwordHash = await hashPassword(password);
        const result = await apiGet('registerPassword', {
            code: code,
            username: username,
            name: name,
            password: passwordHash
        });

        if (result.success) {
            // Save session
            sessionStorage.setItem('jia_user', JSON.stringify({
                username: username,
                name: result.name,
                role: result.role
            }));

            renderSuccessScreen(result.role, result.name);
        } else {
            showRegError(result.message || result.error || 'ลงทะเบียนไม่สำเร็จ');
            btn.disabled = false;
            btn.textContent = 'ลงทะเบียน';
        }
    } catch (err) {
        console.error('Register error:', err);
        showRegError('ไม่สามารถเชื่อมต่อ server ได้');
        btn.disabled = false;
        btn.textContent = 'ลงทะเบียน';
    }
}

function showRegError(msg) {
    const errEl = document.getElementById('register-error');
    errEl.textContent = msg;
    errEl.classList.remove('hidden');
}

function handleSignOut() {
    sessionStorage.removeItem('jia_user');
    renderLoginScreen();
}

// ═══════════════════════════════════════════════════════════
// ADMIN: INVITE CODES
// ═══════════════════════════════════════════════════════════

function toggleLevelSelect() {
    const role = document.getElementById('code-role').value;
    const levelRow = document.getElementById('level-select-row');
    if (role === 'instructor') {
        levelRow.classList.remove('hidden');
    } else {
        levelRow.classList.add('hidden');
    }
}

async function handleGenCode() {
    const role = document.getElementById('code-role').value;
    const user = JSON.parse(sessionStorage.getItem('jia_user') || '{}');
    const params = {
        role: role,
        username: user.username || 'admin'
    };

    // ถ้าเป็นผู้สอน → ส่ง level ไปด้วย
    if (role === 'instructor') {
        const levelEl = document.getElementById('code-level');
        params.level = levelEl ? levelEl.value : '1';
    }

    try {
        const result = await apiGet('genCode', params);

        if (result.success) {
            const levelText = (role === 'instructor' && result.level) ? ' (Level ' + result.level + ')' : '';
            document.getElementById('code-display').textContent = result.code + levelText;
            document.getElementById('code-result').classList.remove('hidden');
            loadExistingCodes();
        } else {
            alert(result.message || 'สร้างรหัสไม่สำเร็จ');
        }
    } catch (err) {
        alert('เชื่อมต่อ server ไม่สำเร็จ');
    }
}

function copyCode() {
    const code = document.getElementById('code-display').textContent;
    navigator.clipboard.writeText(code).then(() => {
        const btn = event.target;
        btn.textContent = 'คัดลอกแล้ว!';
        setTimeout(() => btn.textContent = 'คัดลอก', 2000);
    });
}

async function loadExistingCodes() {
    try {
        const codes = await apiGet('listCodes');
        if (!Array.isArray(codes) || codes.length === 0) return;

        const listEl = document.getElementById('codes-list');
        if (!listEl) return;

        const roleLabels = { admin: 'แอดมิน', sales: 'เซลล์', instructor: 'ผู้สอน' };
        const roleClasses = { admin: 'role-admin', sales: 'role-sales', instructor: 'role-instructor' };

        const activeCodes = codes.filter(c => c.status === 'active');
        const usedCodes = codes.filter(c => c.status === 'used').slice(-5);

        let html = '';

        if (activeCodes.length > 0) {
            html += '<h3 class="text-sm font-bold text-gray-600 mb-2">รหัสที่ยังไม่ได้ใช้</h3>';
            html += '<div class="space-y-2 mb-4">';
            activeCodes.forEach(c => {
                html += `
                    <div class="flex justify-between items-center bg-gray-50 rounded-lg px-4 py-3">
                        <div>
                            <code class="font-mono font-bold text-gray-800">${c.code}</code>
                            <span class="role-badge ${roleClasses[c.role] || ''} ml-2">${roleLabels[c.role] || c.role}</span>
                        </div>
                        <span class="text-xs text-gray-400">${c.createdAt ? new Date(c.createdAt).toLocaleDateString('th-TH') : ''}</span>
                    </div>`;
            });
            html += '</div>';
        }

        if (usedCodes.length > 0) {
            html += '<h3 class="text-sm font-bold text-gray-400 mb-2">ใช้แล้ว (ล่าสุด)</h3>';
            html += '<div class="space-y-1">';
            usedCodes.forEach(c => {
                html += `
                    <div class="flex justify-between items-center text-xs text-gray-400 px-4 py-2">
                        <span class="line-through">${c.code}</span>
                        <span>${c.usedBy || '?'}</span>
                    </div>`;
            });
            html += '</div>';
        }

        listEl.innerHTML = html;
    } catch (err) {
        console.error('Load codes error:', err);
    }
}

async function handleResetPassword(username, displayName) {
    const newPass = prompt(`ตั้งรหัสผ่านใหม่ให้ "${displayName}" (@${username}):`);
    if (!newPass || !newPass.trim()) return;
    if (newPass.length < 4) { alert('รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร'); return; }
    try {
        const hashed = await hashPassword(newPass.trim());
        const saved = JSON.parse(sessionStorage.getItem('jia_user'));
        const result = await apiGet('resetPassword', {
            adminUser: saved.username,
            targetUser: username,
            newPassword: hashed
        });
        if (result.error) { alert('ผิดพลาด: ' + result.error); return; }
        alert(`รีเซ็ตรหัสผ่านของ @${username} สำเร็จ!\nรหัสผ่านใหม่: ${newPass.trim()}`);
    } catch (err) {
        alert('เกิดข้อผิดพลาด: ' + err.message);
    }
}

async function loadUsers() {
    try {
        const users = await apiGet('listUsers');
        if (!Array.isArray(users) || users.length === 0) return;

        const listEl = document.getElementById('users-list');
        if (!listEl) return;

        const roleLabels = { admin: 'แอดมิน', sales: 'เซลล์', instructor: 'ผู้สอน' };
        const roleClasses = { admin: 'role-admin', sales: 'role-sales', instructor: 'role-instructor' };

        let html = '<div class="space-y-2">';
        users.forEach(u => {
            html += `
                <div class="flex justify-between items-center bg-gray-50 rounded-lg px-4 py-3">
                    <div>
                        <span class="font-semibold text-gray-800">${u.name}</span>
                        <span class="text-sm text-gray-500 ml-1">@${u.username}</span>
                        <span class="role-badge ${roleClasses[u.role] || ''} ml-2">${roleLabels[u.role] || u.role}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs text-gray-400">${u.lastLogin ? new Date(u.lastLogin).toLocaleDateString('th-TH') : 'ยังไม่เคย login'}</span>
                        <button onclick="handleResetPassword('${u.username}', '${u.name}')"
                            class="text-xs bg-amber-100 text-amber-700 px-3 py-1 rounded-lg hover:bg-amber-200 transition-colors font-medium">
                            รีเซ็ต Pass
                        </button>
                    </div>
                </div>`;
        });
        html += '</div>';

        listEl.innerHTML = html;
    } catch (err) {
        console.error('Load users error:', err);
    }
}

(function init() {
    const saved = sessionStorage.getItem('jia_user');
    if (saved) {
        try {
            const user = JSON.parse(saved);
            if (user.role === 'admin') {
                renderAdminPanel(user);
            } else {
                renderSuccessScreen(user.role, user.name);
            }
            return;
        } catch(e) {}
    }
    renderLoginScreen();
})();
