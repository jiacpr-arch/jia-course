// ─── Error Boundary: จับ error ใน React component ───
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error('🔴 React Error:', error, info); }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', { className: 'bg-red-50 border border-red-200 rounded-xl p-6 m-4' },
        React.createElement('h3', { className: 'font-bold text-red-700 mb-2' }, '❌ เกิดข้อผิดพลาด'),
        React.createElement('pre', { className: 'text-xs text-red-600 whitespace-pre-wrap' }, String(this.state.error)),
        React.createElement('button', {
          className: 'mt-3 bg-red-600 text-white px-4 py-2 rounded text-sm',
          onClick: () => this.setState({ hasError: false, error: null })
        }, 'ลองใหม่')
      );
    }
    return this.props.children;
  }
}

// ─── PIN Login Gate Component ───
// ─── AppLoader: รอ API โหลดเสร็จ ───
function AppLoader() {
  const [ready, setReady] = useState(!window.JIA_API_URL);
  useEffect(() => {
    if (window.JIA_DATA_READY) window.JIA_DATA_READY.then(() => setReady(true));
    else setReady(true);
  }, []);
  if (!ready) return (
    <div className="min-h-screen flex items-center justify-center bg-gray-50">
      <div className="text-center">
        <div className="text-4xl mb-4">🔵</div>
        <h1 className="text-2xl font-bold text-blue-600 mb-2">JIA COURSE</h1>
        <p className="text-gray-500 mb-4">กำลังโหลดข้อมูล...</p>
        <div className="w-8 h-8 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mx-auto"></div>
      </div>
    </div>
  );
  // ถ้า login ผ่าน Firebase แล้ว ข้าม PIN gate
  if (window.JIA_AUTH_USER) return <AppContent />;
  return <LoginGate><AppContent /></LoginGate>;
}

function LoginGate({ children }) {
  const [authenticated, setAuthenticated] = useState(() => sessionStorage.getItem("jia_admin_auth") === "true");
  const [pin, setPin] = useState("");
  const [error, setError] = useState(false);
  const [showChangePIN, setShowChangePIN] = useState(false);
  const [oldPin, setOldPin] = useState("");
  const [newPin, setNewPin] = useState("");
  const [confirmPin, setConfirmPin] = useState("");
  const [pinMsg, setPinMsg] = useState("");
  
  const correctPin = localStorage.getItem("jia_admin_pin") || "1234";
  
  const handlePinInput = (digit) => {
    if (pin.length < 4) {
      const newPinVal = pin + digit;
      setPin(newPinVal);
      if (newPinVal.length === 4) {
        setTimeout(() => checkPin(newPinVal), 300);
      }
    }
  };

  const handleBackspace = () => {
    setPin(pin.slice(0, -1));
  };

  const checkPin = (testPin) => {
    if (testPin === correctPin) {
      sessionStorage.setItem("jia_admin_auth", "true");
      setAuthenticated(true);
    } else {
      setError(true);
      setPin("");
      setTimeout(() => setError(false), 1500);
    }
  };

  const handleChangePin = () => {
    if (oldPin !== correctPin) {
      setPinMsg("รหัส PIN เดิมไม่ถูกต้อง");
      return;
    }
    if (newPin.length !== 4 || !/^\d+$/.test(newPin)) {
      setPinMsg("รหัส PIN ต้องเป็นตัวเลข 4 หลัก");
      return;
    }
    if (newPin !== confirmPin) {
      setPinMsg("รหัส PIN ใหม่ไม่ตรงกัน");
      return;
    }
    localStorage.setItem("jia_admin_pin", newPin);
    setPinMsg("เปลี่ยนรหัส PIN สำเร็จ");
    setOldPin("");
    setNewPin("");
    setConfirmPin("");
    setTimeout(() => {
      setShowChangePIN(false);
      setPinMsg("");
    }, 2000);
  };

  const handleLogout = () => {
    sessionStorage.removeItem("jia_admin_auth");
    setAuthenticated(false);
    setPin("");
    setError(false);
  };

  if (authenticated) {
    return <>{children}</>;
  }

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
        <div className="text-center mb-8">
          <h1 className="text-3xl font-bold text-blue-900 mb-2">JIA TRAINER CENTER</h1>
          <p className="text-gray-600 font-semibold">ระบบหลังบ้าน</p>
        </div>

        {!showChangePIN ? (
          <>
            <p className="text-center text-gray-600 mb-6 font-semibold">กรุณาใส่รหัส PIN (4 หลัก)</p>

            <div className="flex justify-center gap-3 mb-8">
              {[0, 1, 2, 3].map((i) => (
                <div
                  key={i}
                  className={`w-14 h-14 rounded-lg border-2 flex items-center justify-center font-bold text-2xl transition-all ${
                    i < pin.length
                      ? 'bg-blue-100 border-blue-600 text-blue-900'
                      : 'bg-gray-100 border-gray-300'
                  }`}
                >
                  {i < pin.length ? '●' : ''}
                </div>
              ))}
            </div>

            {error && (
              <div className="text-center mb-6 text-red-600 font-semibold bg-red-50 p-3 rounded-lg">
                รหัสไม่ถูกต้อง
              </div>
            )}

            <div className="grid grid-cols-3 gap-2 mb-6">
              {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                <button
                  key={num}
                  onClick={() => handlePinInput(String(num))}
                  className="py-3 bg-gray-100 hover:bg-blue-100 border border-gray-300 rounded-lg font-bold text-lg transition-colors active:scale-95"
                >
                  {num}
                </button>
              ))}
              <button
                onClick={handleBackspace}
                className="col-start-1 py-3 bg-red-100 hover:bg-red-200 border border-red-300 rounded-lg font-bold text-sm transition-colors active:scale-95"
              >
                ลบ
              </button>
              <button
                onClick={() => handlePinInput("0")}
                className="col-span-2 py-3 bg-gray-100 hover:bg-blue-100 border border-gray-300 rounded-lg font-bold text-lg transition-colors active:scale-95"
              >
                0
              </button>
            </div>

            <button
              onClick={() => setShowChangePIN(true)}
              className="w-full py-2 text-sm text-blue-600 hover:text-blue-800 font-semibold"
            >
              เปลี่ยนรหัส PIN
            </button>
          </>
        ) : (
          <>
            <h2 className="text-lg font-bold text-gray-800 mb-4">เปลี่ยนรหัส PIN</h2>
            <div className="space-y-3 mb-4">
              <input
                type="password"
                placeholder="รหัส PIN เดิม"
                value={oldPin}
                onChange={(e) => setOldPin(e.target.value.replace(/\D/g, '').slice(0, 4))}
                className="w-full px-3 py-2 border border-gray-300 rounded-lg text-center font-bold tracking-widest"
              />
              <input
                type="password"
                placeholder="รหัส PIN ใหม่"
                value={newPin}
                onChange={(e) => setNewPin(e.target.value.replace(/\D/g, '').slice(0, 4))}
                className="w-full px-3 py-2 border border-gray-300 rounded-lg text-center font-bold tracking-widest"
              />
              <input
                type="password"
                placeholder="ยืนยันรหัส PIN ใหม่"
                value={confirmPin}
                onChange={(e) => setConfirmPin(e.target.value.replace(/\D/g, '').slice(0, 4))}
                className="w-full px-3 py-2 border border-gray-300 rounded-lg text-center font-bold tracking-widest"
              />
            </div>
            {pinMsg && (
              <div className={`text-sm p-2 rounded-lg mb-4 text-center font-semibold ${pinMsg.includes('สำเร็จ') ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                {pinMsg}
              </div>
            )}
            <div className="flex gap-2">
              <button
                onClick={handleChangePin}
                className="flex-1 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors"
              >
                บันทึก
              </button>
              <button
                onClick={() => {
                  setShowChangePIN(false);
                  setPinMsg("");
                  setOldPin("");
                  setNewPin("");
                  setConfirmPin("");
                }}
                className="flex-1 py-2 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold rounded-lg transition-colors"
              >
                ยกเลิก
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── Main App ───
function AppContent() {
  const userRole = window.JIA_AUTH_USER?.role || 'admin';
  const [tab, setTab] = useState('ops');
  const [customers, setCustomers] = useState([]);
  const [bookings, setBookings] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [courses, setCourses] = useState([]);
  const [staff, setStaff] = useState([]);
  const [instructors, setInstructors] = useState([]);
  const [instructorAvail, setInstructorAvail] = useState([]);
  const [promoCodes, setPromoCodes] = useState([]);
  // v2: classes + class_instructors
  const [classes, setClasses] = useState([]);
  const [classInstructors, setClassInstructors] = useState([]);
  const [gsUrl, setGsUrl] = useState("supabase"); // compat — always connected via Supabase
  const [showSetup, setShowSetup] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");

  useEffect(() => {
    try {
      setCustomers(JSON.parse(localStorage.getItem("jia_customers") || "[]"));
      setBookings(JSON.parse(localStorage.getItem("jia_bookings") || "[]"));
      setSessions(JSON.parse(localStorage.getItem("jia_sessions") || "[]"));
      const savedCourses = JSON.parse(localStorage.getItem("jia_courses") || "null");
      setCourses(savedCourses || DEFAULT_COURSES);
      const savedStaff = JSON.parse(localStorage.getItem("jia_staff") || "null");
      setStaff(Array.isArray(savedStaff) ? savedStaff : DEFAULT_STAFF);
      const savedInstructors = JSON.parse(localStorage.getItem("jia_instructors") || "null");
      setInstructors(Array.isArray(savedInstructors) ? savedInstructors : DEFAULT_INSTRUCTORS);
      setInstructorAvail(JSON.parse(localStorage.getItem("jia_instructor_avail") || "[]"));
      // promoCodes อาจเป็น array หรือ object (จากหน้า booking) — ต้อง normalize
      const rawPromo = JSON.parse(localStorage.getItem("jia_promo_codes") || "[]");
      if (Array.isArray(rawPromo)) {
        setPromoCodes(rawPromo);
      } else if (rawPromo && typeof rawPromo === 'object') {
        // แปลง object { "SALE-XXX": {discount, used, ...} } → array [{code, discount, used, ...}]
        const arr = Object.entries(rawPromo).map(([code, data]) => ({ ...data, code, id: code }));
        setPromoCodes(arr);
      } else {
        setPromoCodes([]);
      }
      // v2
      setClasses(JSON.parse(localStorage.getItem("jia_classes") || "[]"));
      setClassInstructors(JSON.parse(localStorage.getItem("jia_class_instructors") || "[]"));
    } catch {}
  }, []);

  const save = useCallback((key, data) => localStorage.setItem(key, JSON.stringify(data)), []);

  const courseMap = useMemo(() => {
    const m = {};
    courses.forEach(c => { m[c.key] = c; });
    return m;
  }, [courses]);
  const cfg = useCallback((key) => courseMap[key] || { label: key, range: "", max: 999, color: "bg-gray-100 text-gray-700", price: 0, discountPrice: 0 }, [courseMap]);
  const courseKeys = useMemo(() => courses.map(c => c.key), [courses]);

  const syncFromGs = useCallback(async () => {
    setSyncing(true); setSyncMsg("กำลังซิงค์...");
    try {
      const res = await jiaApiGet('getAllData', { username: window.JIA_AUTH_USER?.username });
      if (res.customers) { setCustomers(res.customers); save("jia_customers", res.customers); }
      if (res.bookings)  { setBookings(res.bookings);   save("jia_bookings", res.bookings); }
      if (res.sessions)  { setSessions(res.sessions);   save("jia_sessions", res.sessions); }
      if (res.classes)   { setClasses(res.classes);      save("jia_classes", res.classes); }
      if (res.class_instructors) { setClassInstructors(res.class_instructors); save("jia_class_instructors", res.class_instructors); }
      setSyncMsg("ซิงค์สำเร็จ");
    } catch (e) { setSyncMsg("ผิดพลาด: " + e.message); }
    setSyncing(false);
    setTimeout(() => setSyncMsg(""), 3000);
  }, [save]);

  // ─── บันทึกข้อมูลทั้งหมดไป Google Sheets ───
  const [saving, setSaving] = useState(false);
  const [saveStatus, setSaveStatus] = useState(''); // '', 'saving', 'success', 'error'

  // API helper (compat — routes through Supabase)
  const jsonpCall = useCallback((params) => {
    return jiaApiGet(params.action, params);
  }, []);

  const saveAllToSheet = useCallback(async () => {
    if (!JIA_API_URL) { alert('ยังไม่ได้ตั้งค่า API URL'); return; }
    setSaving(true); setSaveStatus('saving');
    showToast('💾 กำลังบันทึกทั้งหมด...');

    // ── ดึง classes + class_instructors ล่าสุดจาก API ก่อน (ผู้สอนอาจกดรับจากหน้าอื่น) ──
    let latestClasses = classes;
    let latestCI = classInstructors;
    try {
      const [apiClasses, apiCI] = await Promise.all([
        jiaApiGet('getData', { sheet: 'classes' }),
        jiaApiGet('getData', { sheet: 'class_instructors' })
      ]);
      if (Array.isArray(apiClasses) && apiClasses.length > 0) {
        // merge: ใช้ API เป็นฐาน แต่ถ้า local มีคลาสที่ API ไม่มี (สร้างใหม่ยังไม่ sync) → เพิ่มเข้าไป
        const apiIds = new Set(apiClasses.map(c => c.id));
        const localOnly = classes.filter(c => c.id && !apiIds.has(c.id));
        latestClasses = [...apiClasses, ...localOnly];
        setClasses(latestClasses); save('jia_classes', latestClasses);
      }
      if (Array.isArray(apiCI)) {
        const apiCIIds = new Set(apiCI.map(ci => ci.id));
        const localOnlyCI = classInstructors.filter(ci => ci.id && !apiCIIds.has(ci.id));
        latestCI = [...apiCI, ...localOnlyCI];
        setClassInstructors(latestCI); save('jia_class_instructors', latestCI);
      }
    } catch(mergeErr) {
      console.warn('⚠️ ดึงข้อมูลคลาสล่าสุดไม่ได้ ใช้ข้อมูล local:', mergeErr.message);
    }

    // รวมข้อมูลทุก sheet เป็น object เดียว
    const allData = {
      customers: customers,
      bookings: bookings,
      sessions: sessions,
      courses: courses,
      staff: staff.map((s, i) => typeof s === 'object' ? s : { id: 'staff' + (i+1), name: s }),
      instructors: instructors.map((inst, i) => typeof inst === 'object' ? inst : { id: 'inst' + (i+1), name: inst, level: 1 }),
      instructor_avail: instructorAvail,
      promo_codes: promoCodes,
      // v2 — ใช้ข้อมูลที่ merge แล้ว
      classes: latestClasses,
      class_instructors: latestCI,
    };

    try {
      const quals = JSON.parse(localStorage.getItem('jia_instructor_quals') || '{}');
      if (quals && typeof quals === 'object' && !Array.isArray(quals)) {
        allData.instructor_quals = Object.entries(quals).map(([instructor, cs]) => ({
          instructor, courses: Array.isArray(cs) ? cs.join(',') : String(cs)
        }));
      }
    } catch(e) {}

    // เพิ่ม settings
    const settingsData = [];
    const pin = localStorage.getItem('jia_admin_pin');
    const burl = localStorage.getItem('jia_booking_url');
    if (pin) settingsData.push({ key: 'admin_pin', value: pin });
    if (burl) settingsData.push({ key: 'booking_url', value: burl });
    if (settingsData.length > 0) allData.settings = settingsData;

    // บันทึก timestamp ว่าเซฟเมื่อไหร่
    localStorage.setItem('jia_last_save', new Date().toISOString());

    try {
      // ส่งทั้งก้อนใน request เดียว (saveAll)
      const b64Data = btoa(unescape(encodeURIComponent(JSON.stringify(allData))));
      console.log('💾 Sending saveAll — data size:', b64Data.length, 'chars');

      const result = await jiaApiPost('saveAll', {}, allData);

      setSaving(false);
      if (result && result.failed && result.failed.length > 0) {
        setSaveStatus('success');
        console.warn('⚠️ บันทึกบางตารางไม่สำเร็จ:', result.failed);
        showToast('⚠️ บันทึกส่วนใหญ่สำเร็จ (บางตารางมีปัญหา)');
      } else {
        setSaveStatus('success');
        showToast('✅ บันทึกสำเร็จ! ข้อมูลอยู่ใน Supabase แล้ว');
      }
      localStorage.setItem('jia_save_verified', 'true');
    } catch(err) {
      console.error('❌ saveAll error:', err);
      setSaving(false);
      setSaveStatus('error');
      showToast('❌ บันทึกล้มเหลว: ' + err.message, true);
      alert('❌ บันทึกล้มเหลว!\n\nข้อมูลยังอยู่ใน localStorage ไม่หาย\nลอง: กด บันทึก อีกครั้ง\n\nรายละเอียด: ' + err.message);
    }
    setTimeout(() => setSaveStatus(''), 5000);
  }, [customers, bookings, sessions, courses, staff, instructors, instructorAvail, promoCodes, classes, classInstructors, jsonpCall]);

  const addCustomer = useCallback(async (c) => {
    c.id = uid(); c.createdAt = today();
    const next = [...customers, c];
    setCustomers(next); save("jia_customers", next);
    jiaApiPost('saveRow', { sheet: 'customers' }, c).catch(e => console.warn('⚠️ Sync customer failed:', e.message));
    return c;
  }, [customers, save]);

  const updateCustomer = useCallback((id, data) => {
    const next = customers.map(c => c.id === id ? { ...c, ...data } : c);
    setCustomers(next); save("jia_customers", next);
    jiaApiPost('updateRow', { sheet: 'customers', key: id, keyCol: 'id' }, data).catch(e => console.warn('⚠️ Update customer sync failed:', e.message));
  }, [customers, save]);

  const deleteCustomer = useCallback((id) => {
    const nc = customers.filter(c => c.id !== id);
    const nb = bookings.filter(b => b.customerId !== id);
    const ns = sessions.filter(s => s.customerId !== id);
    setCustomers(nc); save("jia_customers", nc);
    setBookings(nb);  save("jia_bookings", nb);
    setSessions(ns);  save("jia_sessions", ns);
  }, [customers, bookings, sessions, save]);

  const anonymizeCustomerPDPA = useCallback((id) => {
    const customer = customers.find(c => c.id === id);
    if (!customer) return;
    
    const confirmed = window.confirm(
      'การลบข้อมูลตาม PDPA จะลบข้อมูลส่วนบุคคลทั้งหมดของลูกค้ารายนี้ รวมถึง ชื่อ เบอร์โทร อีเมล และสลิปการชำระเงิน\n' +
      'ข้อมูลการจอง (ไม่ระบุตัวตน) จะคงอยู่เพื่อการรายงาน\n\n' +
      'ต้องการดำเนินการต่อหรือไม่?'
    );
    
    if (!confirmed) return;
    
    // Anonymize customer data
    const updatedCustomers = customers.map(c => 
      c.id === id 
        ? { ...c, name: `ลูกค้า #${id.slice(0, 6)}`, tel: '', email: '' }
        : c
    );
    
    // Remove payment slips from bookings
    const updatedBookings = bookings.map(b =>
      b.customerId === id
        ? { ...b, paymentSlip: '' }
        : b
    );
    
    setCustomers(updatedCustomers);
    setBookings(updatedBookings);
    save("jia_customers", updatedCustomers);
    save("jia_bookings", updatedBookings);
    
    // Log PDPA deletion
    const pdpaLog = JSON.parse(localStorage.getItem("jia_pdpa_log") || '[]');
    pdpaLog.push({
      date: new Date().toISOString(),
      action: "data_erasure",
      customerId: id,
      customerName: customer.name,
      requestedBy: "admin"
    });
    localStorage.setItem("jia_pdpa_log", JSON.stringify(pdpaLog));
    
    alert('ลบข้อมูลตาม PDPA สำเร็จ');
  }, [customers, bookings, save]);

  const addBooking = useCallback(async (bk) => {
    bk.id = uid(); bk.createdAt = today();
    const next = [...bookings, bk];
    setBookings(next); save("jia_bookings", next);
    jiaApiPost('saveRow', { sheet: 'bookings' }, bk).catch(e => console.warn('⚠️ Sync booking failed:', e.message));
    // แจ้งเตือนการจองใหม่ทางอีเมล
    jiaApiPost('notifyBooking', {}, bk).catch(err => console.warn('⚠️ Notify failed:', err));
    const slist = Array.from({ length: Number(bk.totalPeople) || 1 }, (_, i) => ({
      id: uid(), bookingId: bk.id, customerId: bk.customerId,
      sessionNo: i + 1, done: false, date: "", note: ""
    }));
    const nextS = [...sessions, ...slist];
    setSessions(nextS); save("jia_sessions", nextS);
    slist.forEach(s => { jiaApiPost('saveRow', { sheet: 'sessions' }, s).catch(e => console.warn('⚠️ Sync session failed:', e.message)); });
  }, [bookings, sessions, save]);

  const updateBooking = useCallback((id, data) => {
    const next = bookings.map(b => b.id === id ? { ...b, ...data } : b);
    setBookings(next); save("jia_bookings", next);
    jiaApiPost('updateRow', { sheet: 'bookings', key: id, keyCol: 'id' }, data).catch(e => console.warn('⚠️ Update booking sync failed:', e.message));
  }, [bookings, save]);

  const deleteBooking = useCallback((id) => {
    const nb = bookings.filter(b => b.id !== id);
    const ns = sessions.filter(s => s.bookingId !== id);
    setBookings(nb); save("jia_bookings", nb);
    setSessions(ns); save("jia_sessions", ns);
  }, [bookings, sessions, save]);

  const toggleSession = useCallback((sid) => {
    const next = sessions.map(s => s.id === sid ? { ...s, done: !s.done, date: s.done ? "" : today() } : s);
    setSessions(next); save("jia_sessions", next);
    const s = next.find(x => x.id === sid);
    jiaApiPost('updateRow', { sheet: 'sessions', key: sid, keyCol: 'id' }, { done: s.done, date: s.date }).catch(e => console.warn('⚠️ Update session sync failed:', e.message));
  }, [sessions, save]);

  const updateSessionDate = useCallback((sid, date) => {
    const next = sessions.map(s => s.id === sid ? { ...s, date } : s);
    setSessions(next); save("jia_sessions", next);
  }, [sessions, save]);

  const saveCourses = useCallback((list) => {
    setCourses(list); save("jia_courses", list);
  }, [save]);

  const saveStaff = useCallback((list) => {
    setStaff(list); save("jia_staff", list);
  }, [save]);

  const saveInstructors = useCallback((list) => {
    setInstructors(list); save("jia_instructors", list);
  }, [save]);

  const saveInstructorAvail = useCallback((list) => {
    setInstructorAvail(list); save("jia_instructor_avail", list);
  }, [save]);

  const savePromoCodes = useCallback((list) => {
    setPromoCodes(list); save("jia_promo_codes", list);
  }, [save]);

  // v2: class management
  const saveClasses = useCallback((list) => {
    setClasses(list); save("jia_classes", list);
  }, [save]);
  const saveClassInstructors = useCallback((list) => {
    setClassInstructors(list); save("jia_class_instructors", list);
  }, [save]);

  const addClass = useCallback((cls) => {
    cls.id = uid(); cls.createdAt = today(); cls.currentInstructors = 0; cls.status = 'waiting_instructor';
    const next = [...classes, cls];
    saveClasses(next);
    // ── Auto-save to Google Sheets ทันที ──
    jiaApiPost('saveRow', { sheet: 'classes' }, cls)
      .then(r => { if(r) console.log('✅ คลาสใหม่ sync:', r); })
      .catch(e => console.warn('⚠️ sync คลาสใหม่ไม่ได้:', e.message));
    // ── LINE Notify แจ้งผู้สอน ──
    jiaApiPost('notifyNewClass', {}, cls)
      .catch(e => console.warn('⚠️ LINE notify failed:', e.message));
    return cls;
  }, [classes, saveClasses]);

  const updateClass = useCallback((id, data) => {
    const next = classes.map(c => c.id === id ? { ...c, ...data } : c);
    saveClasses(next);
  }, [classes, saveClasses]);

  const deleteClass = useCallback((id) => {
    saveClasses(classes.filter(c => c.id !== id));
    saveClassInstructors(classInstructors.filter(ci => ci.classId !== id));
    // ── Auto-delete from Google Sheets ──
    jiaApiGet('deleteRow', { sheet: 'classes', key: id, keyCol: 'id' }).catch(e => console.warn('⚠️ delete class sync:', e.message));
  }, [classes, classInstructors, saveClasses, saveClassInstructors]);

  const assignInstructor = useCallback((classId, instructorName, assignedBy) => {
    // ตรวจว่ายังไม่ได้ assign
    if (classInstructors.some(ci => ci.classId === classId && ci.instructor === instructorName)) return;
    const newCi = { id: uid(), classId, instructor: instructorName, assignedBy: assignedBy || 'admin', assignedAt: new Date().toISOString() };
    const nextCi = [...classInstructors, newCi];
    saveClassInstructors(nextCi);
    // อัพเดทจำนวนผู้สอนและสถานะ
    const cls = classes.find(c => c.id === classId);
    if (cls) {
      const count = nextCi.filter(ci => ci.classId === classId).length;
      const needed = parseInt(cls.requiredInstructors) || 1;
      updateClass(classId, { currentInstructors: count, status: count >= needed ? 'ready' : 'waiting_instructor' });
    }
    // ── Auto-save to Google Sheets ทันที ──
    jiaApiPost('saveRow', { sheet: 'class_instructors' }, newCi)
      .then(r => { if(r) console.log('✅ assign instructor sync:', r); })
      .catch(e => console.warn('⚠️ assign sync:', e.message));
    // อัพเดทสถานะคลาสใน Sheets ด้วย
    if (cls) {
      const count2 = nextCi.filter(ci => ci.classId === classId).length;
      const needed2 = parseInt(cls.requiredInstructors) || 1;
      jiaApiPost('updateRow', { sheet: 'classes', key: classId, keyCol: 'id' },
        { currentInstructors: count2, status: count2 >= needed2 ? 'ready' : 'waiting_instructor' }
      ).catch(e => console.warn('⚠️ update class status:', e.message));
    }
  }, [classes, classInstructors, saveClassInstructors, updateClass]);

  const removeInstructorFromClass = useCallback((classId, instructorName) => {
    const nextCi = classInstructors.filter(ci => !(ci.classId === classId && ci.instructor === instructorName));
    saveClassInstructors(nextCi);
    const cls = classes.find(c => c.id === classId);
    if (cls) {
      const count = nextCi.filter(ci => ci.classId === classId).length;
      const needed = parseInt(cls.requiredInstructors) || 1;
      updateClass(classId, { currentInstructors: count, status: count >= needed ? 'ready' : 'waiting_instructor' });
    }
  }, [classes, classInstructors, saveClassInstructors, updateClass]);

  const enrolled = useMemo(() => {
    const map = {};
    courseKeys.forEach(k => { map[k] = 0; });
    bookings.forEach(b => { map[b.courseType] = (map[b.courseType] || 0) + (Number(b.totalPeople) || 0); });
    return map;
  }, [bookings, courseKeys]);

  const stats = useMemo(() => ({
    totalCustomers: customers.length,
    totalBookings: bookings.length,
    todayDone: sessions.filter(s => s.date === today()).length,
    pending: sessions.filter(s => !s.done).length,
  }), [customers, bookings, sessions]);

  return (
    <div className="min-h-screen bg-blue-50 font-sans">
      <header style={{ background: "linear-gradient(135deg, #253A8D 0%, #3757D3 100%)" }} className="admin-header text-white shadow-lg">
        <div className="max-w-5xl mx-auto px-3 md:px-4 py-2 md:py-3 flex justify-between items-center">
          <div>
            <h1 className="text-lg md:text-xl font-bold tracking-wide">JIA Course</h1>
            <p className="text-blue-200 text-[10px] md:text-xs">เจี๋ยรักษา — ระบบจองคอร์ส</p>
          </div>
          <div className="flex gap-2 items-center">
            {syncMsg && <span className="text-xs bg-white/20 px-2 py-1 rounded">{syncMsg}</span>}

            {/* ปุ่มบันทึก — สีเปลี่ยนตามสถานะ */}
            <button onClick={saveAllToSheet} disabled={saving}
              className={`text-sm font-bold px-4 py-1.5 rounded-lg transition-all shadow-sm ${
                saving ? 'bg-yellow-400 text-yellow-900 animate-pulse' :
                saveStatus === 'success' ? 'bg-green-400 text-green-900' :
                saveStatus === 'error' ? 'bg-red-400 text-white' :
                'bg-white text-blue-700 hover:bg-blue-50'
              }`}>
              {saving ? '💾 กำลังบันทึก...' :
               saveStatus === 'success' ? '✅ บันทึกแล้ว!' :
               saveStatus === 'error' ? '❌ มีข้อผิดพลาด' :
               '💾 บันทึก'}
            </button>

            <button onClick={() => { sessionStorage.removeItem("jia_admin_auth"); sessionStorage.removeItem("jia_user"); window.location.href = "./jia-login.html"; }}
              className="text-xs bg-red-500/20 hover:bg-red-600/30 px-3 py-1 rounded">
              🚪 ออกจากระบบ
            </button>
          </div>
        </div>
      </header>

      <nav className="bg-white border-b shadow-sm overflow-x-auto custom-scroll sticky top-0 z-30">
        <div className="max-w-5xl mx-auto px-2 md:px-4 flex">
          {ALL_TABS.filter(t => t.roles.includes(userRole)).map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`px-2 md:px-4 py-2.5 md:py-3 text-xs md:text-sm font-medium border-b-2 whitespace-nowrap transition-colors ${
                tab === t.id ? "border-blue-600 text-blue-700" : "border-transparent text-gray-500 hover:text-blue-600"
              }`}>{t.label}</button>
          ))}
        </div>
      </nav>

      <main className="admin-main max-w-5xl mx-auto px-3 md:px-4 py-4 md:py-6">
        {tab === 'ops' && <OperationsBoard bookings={bookings} customers={customers} courses={courses} cfg={cfg} instructors={instructors} updateBooking={updateBooking} userRole={userRole} currentUserName={window.JIA_AUTH_USER?.name || ''} />}
        {tab === 'myBookings' && <MyBookingsReview bookings={bookings} customers={customers} sessions={sessions} cfg={cfg} currentUserName={window.JIA_AUTH_USER?.name || ''} />}
        {tab === 'dashboard' && <Dashboard stats={stats} bookings={bookings} customers={customers} enrolled={enrolled} courses={courses} cfg={cfg} courseKeys={courseKeys} instructors={instructors} />}
        {tab === 'classes' && <ClassManager classes={classes} classInstructors={classInstructors} courses={courses} instructors={instructors} bookings={bookings}
          addClass={addClass} updateClass={updateClass} deleteClass={deleteClass}
          assignInstructor={assignInstructor} removeInstructorFromClass={removeInstructorFromClass} />}
        {tab === 'booking' && <BookingForm customers={customers} addCustomer={addCustomer} addBooking={addBooking} enrolled={enrolled} courses={courses} cfg={cfg} courseKeys={courseKeys} staff={staff} instructors={instructors} instructorAvail={instructorAvail} promoCodes={promoCodes} updatePromoCodes={savePromoCodes} classes={classes} classInstructors={classInstructors} />}
        {tab === 'customers' && (
          <CustomerList customers={customers} bookings={bookings} sessions={sessions}
            updateCustomer={updateCustomer} deleteCustomer={deleteCustomer}
            updateBooking={updateBooking} deleteBooking={deleteBooking} enrolled={enrolled} cfg={cfg} courseKeys={courseKeys} staff={staff} instructors={instructors} courses={courses}
            userRole={userRole} currentUserName={window.JIA_AUTH_USER?.name || ''} />
        )}
        {tab === 'schedule' && (
          <Schedule sessions={sessions} bookings={bookings} customers={customers}
            toggleSession={toggleSession} updateSessionDate={updateSessionDate}
            updateBooking={updateBooking} deleteBooking={deleteBooking} enrolled={enrolled} cfg={cfg} courseKeys={courseKeys} staff={staff} instructors={instructors} courses={courses}
            userRole={userRole} currentUserName={window.JIA_AUTH_USER?.name || ''} />
        )}
        {tab === 'calendar' && <CalendarView sessions={sessions} bookings={bookings} courses={courses} cfg={cfg} customers={customers} classes={classes} classInstructors={classInstructors} />}
        {tab === 'promo' && <ErrorBoundary><PromoCodeManager promoCodes={promoCodes} savePromoCodes={savePromoCodes} staff={staff} /></ErrorBoundary>}
        {tab === 'instSched' && <InstructorSchedule bookings={bookings} instructors={instructors} classes={classes} classInstructors={classInstructors} />}
        {tab === 'users' && <UserManager />}
        {tab === 'settings' && <CourseSettings courses={courses} saveCourses={saveCourses} staff={staff} saveStaff={saveStaff} instructors={instructors} saveInstructors={saveInstructors} enrolled={enrolled} />}
      </main>
    </div>
  );
}

// ─── v2: Class Manager (เปิดคลาส) ───
function ClassManager({ classes, classInstructors, courses, instructors, bookings, addClass, updateClass, deleteClass, assignInstructor, removeInstructorFromClass }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ courseKey: '', date: '', timeSlot: '', maxStudents: 15, requiredInstructors: 1, place: '', note: '', instructorPayPerStudent: '', instructorPayMax: '', salesCommission: '' });
  const [filter, setFilter] = useState('all'); // all, waiting_instructor, ready, full

  // Helper: instructor name → level
  const getLevel = (name) => {
    const inst = instructors.find(i => (typeof i === 'object' ? i.name : i) === name);
    return inst && typeof inst === 'object' ? (parseInt(inst.level) || 1) : 1;
  };
  const getInstructorName = (i) => typeof i === 'object' ? i.name : i;

  // Helper: course requiredLevel
  const getCourseLevel = (courseKey) => {
    const c = courses.find(x => x.key === courseKey);
    return c ? (parseInt(c.requiredLevel) || 1) : 1;
  };

  // available time slots from courses
  const dynSlots = useMemo(() => getAllTimeSlots(courses), [courses]);

  // sorted classes
  const sortedClasses = useMemo(() => {
    let list = [...classes];
    if (filter !== 'all') list = list.filter(c => c.status === filter);
    return list.sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.timeSlot || '').localeCompare(b.timeSlot || ''));
  }, [classes, filter]);

  const handleSubmit = () => {
    if (!form.courseKey || !form.date || !form.timeSlot) { alert('กรุณาเลือกคอร์ส วันที่ และเวลา'); return; }
    const course = courses.find(c => c.key === form.courseKey);
    addClass({
      ...form,
      courseName: course ? course.label : form.courseKey,
      maxStudents: parseInt(form.maxStudents) || 15,
      requiredInstructors: parseInt(form.requiredInstructors) || 1,
      instructorPayPerStudent: form.instructorPayPerStudent ? parseFloat(form.instructorPayPerStudent) : 0,
      instructorPayMax: form.instructorPayMax ? parseFloat(form.instructorPayMax) : 0,
      salesCommission: form.salesCommission ? parseFloat(form.salesCommission) : 0,
      createdBy: window.JIA_AUTH_USER?.name || 'admin',
    });
    setForm({ courseKey: '', date: '', timeSlot: '', maxStudents: 15, requiredInstructors: 1, place: '', note: '', instructorPayPerStudent: '', instructorPayMax: '', salesCommission: '' });
    setShowForm(false);
  };

  // count bookings per class
  const classBookingCount = useMemo(() => {
    const map = {};
    bookings.forEach(b => { if (b.classId) map[b.classId] = (map[b.classId] || 0) + (parseInt(b.totalPeople) || 1); });
    return map;
  }, [bookings]);

  // qualified instructors for a class
  const getQualifiedInstructors = (cls) => {
    const reqLevel = getCourseLevel(cls.courseKey);
    const assigned = classInstructors.filter(ci => ci.classId === cls.id).map(ci => ci.instructor);
    return instructors
      .map(i => ({ name: getInstructorName(i), level: typeof i === 'object' ? (parseInt(i.level) || 1) : 1 }))
      .filter(i => i.level >= reqLevel && !assigned.includes(i.name));
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-xl font-bold">เปิดคลาสเรียน</h2>
        <button onClick={() => setShowForm(!showForm)} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">
          {showForm ? 'ปิดฟอร์ม' : '+ เปิดคลาสใหม่'}
        </button>
      </div>

      {/* Filter */}
      <div className="flex gap-2 mb-4 flex-wrap">
        {[{k:'all',l:'ทั้งหมด'},{k:'waiting_instructor',l:'🟡 รอผู้สอน'},{k:'ready',l:'🔵 พร้อม'},{k:'full',l:'🟢 เต็ม'},{k:'completed',l:'✅ สอนแล้ว'}].map(f =>
          <button key={f.k} onClick={() => setFilter(f.k)}
            className={'px-3 py-1 rounded-full text-xs font-semibold border ' + (filter === f.k ? 'bg-blue-600 text-white border-blue-600' : 'bg-white border-gray-200')}>
            {f.l} {f.k !== 'all' ? '(' + classes.filter(c => c.status === f.k).length + ')' : '(' + classes.length + ')'}
          </button>
        )}
      </div>

      {/* Create Form */}
      {showForm && (
        <div className="bg-white rounded-xl p-5 shadow mb-6 border border-blue-200">
          <h3 className="font-bold mb-3">สร้างคลาสใหม่</h3>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs text-gray-500">คอร์ส *</label>
              <select value={form.courseKey} onChange={e => setForm({...form, courseKey: e.target.value})}
                className="w-full border rounded-lg p-2 text-sm">
                <option value="">เลือกคอร์ส</option>
                {courses.filter(c => c.key !== 'Other').map(c =>
                  <option key={c.key} value={c.key}>{c.label} (Level {c.requiredLevel || 1})</option>
                )}
              </select>
            </div>
            <div>
              <label className="text-xs text-gray-500">วันที่ *</label>
              <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})}
                className="w-full border rounded-lg p-2 text-sm" />
            </div>
            <div>
              <label className="text-xs text-gray-500">เวลา *</label>
              <select value={form.timeSlot} onChange={e => setForm({...form, timeSlot: e.target.value})}
                className="w-full border rounded-lg p-2 text-sm">
                <option value="">เลือกเวลา</option>
                {dynSlots.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div>
              <label className="text-xs text-gray-500">ที่นั่งสูงสุด</label>
              <input type="number" value={form.maxStudents} onChange={e => setForm({...form, maxStudents: e.target.value})}
                className="w-full border rounded-lg p-2 text-sm" min="1" />
            </div>
            <div>
              <label className="text-xs text-gray-500">จำนวนผู้สอนที่ต้องการ</label>
              <input type="number" value={form.requiredInstructors} onChange={e => setForm({...form, requiredInstructors: e.target.value})}
                className="w-full border rounded-lg p-2 text-sm" min="1" max="10" />
            </div>
            <div>
              <label className="text-xs text-gray-500">สถานที่</label>
              <input value={form.place} onChange={e => setForm({...form, place: e.target.value})}
                className="w-full border rounded-lg p-2 text-sm" placeholder="ห้อง / สถานที่" />
            </div>
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 mt-3">
            <div className="text-xs font-semibold text-blue-700 mb-2">💰 รายได้ต่อคลาส</div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              <div>
                <label className="text-xs text-gray-500">ค่าสอน (บาท/คน)</label>
                <input type="number" value={form.instructorPayPerStudent} onChange={e => setForm({...form, instructorPayPerStudent: e.target.value})}
                  className="w-full border rounded-lg p-2 text-sm" min="0" placeholder="เช่น 250" />
              </div>
              <div>
                <label className="text-xs text-gray-500">ค่าสอนสูงสุด (บาท)</label>
                <input type="number" value={form.instructorPayMax} onChange={e => setForm({...form, instructorPayMax: e.target.value})}
                  className="w-full border rounded-lg p-2 text-sm" min="0" placeholder="เช่น 1500" />
              </div>
              <div>
                <label className="text-xs text-gray-500">ค่าคอมเซลล์ (%)</label>
                <input type="number" value={form.salesCommission} onChange={e => setForm({...form, salesCommission: e.target.value})}
                  className="w-full border rounded-lg p-2 text-sm" min="0" max="100" placeholder="เช่น 10" />
              </div>
              <div>
                <label className="text-xs text-gray-500">หมายเหตุ</label>
                <input value={form.note} onChange={e => setForm({...form, note: e.target.value})}
                  className="w-full border rounded-lg p-2 text-sm" placeholder="หมายเหตุเพิ่มเติม" />
              </div>
            </div>
          </div>
          <button onClick={handleSubmit} className="mt-4 bg-green-600 text-white px-6 py-2 rounded-lg text-sm font-semibold">
            สร้างคลาส
          </button>
        </div>
      )}

      {/* Class List */}
      {sortedClasses.length === 0 ? (
        <div className="text-center text-gray-400 py-12">ยังไม่มีคลาส — กด "+ เปิดคลาสใหม่" เพื่อสร้าง</div>
      ) : sortedClasses.map(cls => {
        const st = CLASS_STATUS[cls.status] || CLASS_STATUS.waiting_instructor;
        const assigned = classInstructors.filter(ci => ci.classId === cls.id);
        const qualified = getQualifiedInstructors(cls);
        const booked = classBookingCount[cls.id] || 0;
        const course = courses.find(c => c.key === cls.courseKey);

        return (
          <div key={cls.id} className="bg-white rounded-xl p-5 shadow mb-3 border-l-4" style={{borderLeftColor: cls.status === 'ready' ? '#2563EB' : cls.status === 'waiting_instructor' ? '#EAB308' : cls.status === 'full' ? '#22C55E' : '#9CA3AF'}}>
            <div className="flex justify-between items-start mb-2">
              <div>
                <span className={'inline-block px-2 py-0.5 rounded-full text-xs font-semibold mr-2 ' + st.color}>{st.icon} {st.label}</span>
                <span className="text-xs text-gray-400">{fmt(cls.date)} {cls.timeSlot}</span>
              </div>
              <div className="flex gap-2">
                {cls.status === 'ready' && <button onClick={() => updateClass(cls.id, {status:'full'})} className="text-xs text-green-600 border border-green-200 rounded px-2 py-1">ปิดรับ</button>}
                {cls.status === 'full' && <button onClick={() => updateClass(cls.id, {status:'ready'})} className="text-xs text-blue-600 border border-blue-200 rounded px-2 py-1">เปิดรับ</button>}
                <button onClick={() => updateClass(cls.id, {status:'completed'})} className="text-xs text-gray-500 border border-gray-200 rounded px-2 py-1">สอนแล้ว</button>
                <button onClick={() => { if(confirm('ลบคลาสนี้?')) deleteClass(cls.id); }} className="text-xs text-red-500 border border-red-200 rounded px-2 py-1">ลบ</button>
              </div>
            </div>

            <h3 className="font-bold text-lg">{cls.courseName || cls.courseKey}</h3>
            <div className="text-sm text-gray-500 mt-1">
              {cls.place && <span className="mr-3">📍 {cls.place}</span>}
              <span className="mr-3">👥 {booked}/{cls.maxStudents} คน</span>
              <span>Level {course?.requiredLevel || 1} ขึ้นไป</span>
            </div>
            {(cls.instructorPayPerStudent > 0 || cls.salesCommission > 0) && (
            <div className="text-xs mt-1 flex flex-wrap gap-x-3">
              {cls.instructorPayPerStudent > 0 && <span className="text-teal-600 font-semibold">🎓 ค่าสอน {Number(cls.instructorPayPerStudent).toLocaleString()} บาท/คน {cls.instructorPayMax > 0 ? '(max ' + Number(cls.instructorPayMax).toLocaleString() + ')' : ''}</span>}
              {cls.salesCommission > 0 && <span className="text-blue-600 font-semibold">💼 คอม {cls.salesCommission}%</span>}
            </div>
            )}

            {/* Assigned Instructors */}
            <div className="mt-3">
              <div className="text-xs text-gray-500 mb-1">ผู้สอน ({assigned.length}/{cls.requiredInstructors || 1}):</div>
              <div className="flex flex-wrap gap-1">
                {assigned.map(ci => (
                  <span key={ci.id} className="inline-flex items-center gap-1 bg-teal-50 text-teal-700 px-2 py-1 rounded-full text-xs font-semibold">
                    {INSTRUCTOR_LEVELS.find(l => l.value === getLevel(ci.instructor))?.badge} {ci.instructor}
                    <button onClick={() => removeInstructorFromClass(cls.id, ci.instructor)} className="text-red-400 hover:text-red-600 ml-1">✕</button>
                  </span>
                ))}
                {assigned.length < (parseInt(cls.requiredInstructors) || 1) && qualified.length > 0 && (
                  <select onChange={e => { if(e.target.value) { assignInstructor(cls.id, e.target.value, 'admin'); e.target.value=''; }}}
                    className="text-xs border rounded-full px-2 py-1 bg-yellow-50 border-yellow-300">
                    <option value="">+ เพิ่มผู้สอน</option>
                    {qualified.map(q => <option key={q.name} value={q.name}>{q.badge || ''} {q.name} (Lv.{q.level})</option>)}
                  </select>
                )}
                {assigned.length < (parseInt(cls.requiredInstructors) || 1) && qualified.length === 0 && (
                  <span className="text-xs text-red-400 italic">ไม่มีผู้สอนที่มี Level ถึง</span>
                )}
              </div>
            </div>

            {cls.note && <div className="text-xs text-gray-400 mt-2">📝 {cls.note}</div>}
          </div>
        );
      })}
    </div>
  );
}

// ─── Operations Board (บอร์ดหน้างาน) ───
// ─── Sales: My Bookings Review ───
function MyBookingsReview({ bookings, customers, sessions, cfg, currentUserName }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');

  const myBookings = useMemo(() => {
    let list = bookings.filter(b => b.salesStaff === currentUserName || b.createdBy === currentUserName);
    if (filter === 'today') list = list.filter(b => b.startDate === today());
    else if (filter === 'upcoming') list = list.filter(b => b.startDate >= today());
    else if (filter === 'past') list = list.filter(b => b.startDate < today());
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(b => (b.name || '').toLowerCase().includes(q) || (b.tel || '').includes(q));
    }
    return list.sort((a, b) => (b.startDate || '').localeCompare(a.startDate || ''));
  }, [bookings, currentUserName, filter, search]);

  const stats = useMemo(() => {
    const all = bookings.filter(b => b.salesStaff === currentUserName || b.createdBy === currentUserName);
    return {
      total: all.length,
      today: all.filter(b => b.startDate === today()).length,
      upcoming: all.filter(b => b.startDate > today()).length,
      totalRevenue: all.reduce((s, b) => s + (Number(b.finalPrice) || 0), 0),
    };
  }, [bookings, currentUserName]);

  return (
    <div className="space-y-6">
      {/* Stats cards */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div className="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-xl p-4 shadow-lg">
          <div className="text-xs font-medium opacity-90">การจองทั้งหมด</div>
          <div className="text-3xl font-bold mt-1">{stats.total}</div>
        </div>
        <div className="bg-gradient-to-br from-green-500 to-green-600 text-white rounded-xl p-4 shadow-lg">
          <div className="text-xs font-medium opacity-90">วันนี้</div>
          <div className="text-3xl font-bold mt-1">{stats.today}</div>
        </div>
        <div className="bg-gradient-to-br from-purple-500 to-purple-600 text-white rounded-xl p-4 shadow-lg">
          <div className="text-xs font-medium opacity-90">กำลังจะมา</div>
          <div className="text-3xl font-bold mt-1">{stats.upcoming}</div>
        </div>
        <div className="bg-gradient-to-br from-amber-500 to-amber-600 text-white rounded-xl p-4 shadow-lg">
          <div className="text-xs font-medium opacity-90">ยอดขายรวม</div>
          <div className="text-2xl font-bold mt-1">฿{fmtPrice(stats.totalRevenue)}</div>
        </div>
      </div>

      {/* Filters */}
      <div className="flex flex-col md:flex-row gap-3">
        <div className="flex gap-2 flex-wrap">
          {[['all','ทั้งหมด'],['today','วันนี้'],['upcoming','กำลังจะมา'],['past','ผ่านแล้ว']].map(([k,l]) => (
            <button key={k} onClick={() => setFilter(k)}
              className={`text-xs font-medium px-4 py-2 rounded-lg transition-colors ${
                filter === k ? 'bg-blue-600 text-white' : 'bg-blue-100 text-blue-700 hover:bg-blue-200'
              }`}>{l}</button>
          ))}
        </div>
        <input type="text" value={search} onChange={(e) => setSearch(e.target.value)}
          placeholder="ค้นหาชื่อ/เบอร์โทร..."
          className="flex-1 border border-blue-200 bg-blue-50 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" />
      </div>

      {/* Booking list */}
      <div className="space-y-3">
        {myBookings.length === 0 ? (
          <div className="bg-white rounded-xl border border-blue-100 p-8 text-center">
            <div className="text-4xl mb-2">📋</div>
            <div className="text-lg font-semibold text-gray-700">ไม่มีการจอง</div>
            <div className="text-sm text-gray-500 mt-1">ไม่พบการจองที่ตรงกับเงื่อนไข</div>
          </div>
        ) : (
          myBookings.map(bk => {
            const bkSessions = sessions.filter(s => s.bookingId === bk.id);
            const bkCompleted = bkSessions.filter(s => s.done).length;
            const isPaid = bk.paymentStatus === 'ชำระแล้ว' || bk.paymentMode === 'โอนเงิน (ตรวจแล้ว)';
            const isPending = bk.paymentStatus === 'รอตรวจสอบ';
            const rescheduleCount = Number(bk.rescheduleCount) || 0;
            const isToday = bk.startDate === today();
            const isPast = bk.startDate < today();

            return (
              <div key={bk.id} className={`bg-white rounded-xl border p-4 space-y-3 ${isToday ? 'border-green-300 bg-green-50' : isPast ? 'border-gray-200' : 'border-blue-200'}`}>
                <div className="flex justify-between items-start">
                  <div>
                    <div className="font-bold text-gray-800">{bk.name}</div>
                    <div className="text-xs text-gray-500">{bk.tel}</div>
                  </div>
                  <div className="flex gap-1 flex-wrap justify-end">
                    {isToday && <span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-medium">วันนี้</span>}
                    {isPaid && <span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-medium">ชำระแล้ว</span>}
                    {isPending && <span className="text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded-full font-medium">รอตรวจสอบ</span>}
                    {!isPaid && !isPending && <span className="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full font-medium">ยังไม่ชำระ</span>}
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-2 text-xs text-gray-600">
                  <div>📦 {cfg(bk.courseType).label}</div>
                  <div>👥 {bk.totalPeople} คน</div>
                  <div>📅 {fmt(bk.startDate)} {bk.timeSlot}</div>
                  <div>🎓 {bk.instructor}</div>
                  <div>💰 {fmtPrice(bk.finalPrice)} บาท ({bk.paymentMode})</div>
                  <div>🛒 {bk.channel || 'ไม่ระบุ'}</div>
                </div>

                {rescheduleCount > 0 && (
                  <div className="text-xs text-orange-600 bg-orange-50 px-2 py-1 rounded">
                    เลื่อนแล้ว {rescheduleCount} ครั้ง
                  </div>
                )}

                {bk.note && (
                  <div className="text-xs text-gray-500 bg-gray-50 px-2 py-1 rounded">
                    หมายเหตุ: {bk.note}
                  </div>
                )}

                <div className="flex justify-between items-center text-xs text-gray-600 pt-1">
                  <span>{bkCompleted}/{bkSessions.length} เรียนแล้ว</span>
                  <span className="text-gray-400">จองเมื่อ {fmt(bk.createdAt)}</span>
                </div>
                <div className="w-full bg-gray-200 rounded-full h-1.5">
                  <div className="bg-blue-500 h-1.5 rounded-full transition-all"
                    style={{ width: (bkSessions.length > 0 ? Math.round((bkCompleted / bkSessions.length) * 100) : 0) + '%' }} />
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function OperationsBoard({ bookings, customers, courses, cfg, instructors, updateBooking, userRole, currentUserName }) {
  const isSales = userRole === 'sales';

  const myBookings = useMemo(() => {
    if (!isSales || !currentUserName) return bookings;
    return bookings.filter(b => b.salesStaff === currentUserName || b.createdBy === currentUserName);
  }, [bookings, isSales, currentUserName]);

  const todayBookings = useMemo(() => {
    const t = today();
    return myBookings.filter(b => b.startDate === t);
  }, [myBookings]);

  const pendingPayments = useMemo(() => {
    return myBookings.filter(b => b.paymentStatus === "รอตรวจสอบ");
  }, [myBookings]);

  const [viewSlip, setViewSlip] = useState(null);

  const confirmPayment = (bk) => {
    updateBooking(bk.id, { paymentStatus: "ชำระแล้ว", paymentMode: "โอนเงิน (ตรวจแล้ว)" });
    // ส่งอีเมลแจ้งเตือนชำระเงินสำเร็จ
    jiaApiPost('notifyPayment', {}, bk).catch(err => console.warn('⚠️ Payment notify failed:', err));
    // สร้าง Google Calendar event
    jiaApiPost('createCalendarEvent', {}, bk).catch(err => console.warn('⚠️ Calendar event failed:', err));
    showToast('✅ ยืนยันชำระเงินแล้ว + แจ้งเตือนอีเมล + สร้าง Calendar');
  };

  const todayInstructors = useMemo(() => {
    const set = new Set();
    todayBookings.forEach(b => { if (b.instructor) set.add(b.instructor); });
    return Array.from(set);
  }, [todayBookings]);

  const todayStudents = useMemo(() => {
    return todayBookings.reduce((sum, b) => sum + (Number(b.totalPeople) || 0), 0);
  }, [todayBookings]);

  const dynSlots = React.useMemo(() => getAllTimeSlots(courses), [courses]);
  const groupedByTimeSlot = useMemo(() => {
    const groups = {};
    dynSlots.forEach(slot => { groups[slot] = []; });
    todayBookings.forEach(b => {
      if (groups[b.timeSlot]) groups[b.timeSlot].push(b);
      else { groups[b.timeSlot] = [b]; } // กรณี time slot ที่ถูกลบแล้ว
    });
    return groups;
  }, [todayBookings, dynSlots]);

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div className="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-xl p-6 shadow-lg">
          <div className="text-sm font-medium opacity-90">ผู้สอนวันนี้</div>
          <div className="text-4xl font-bold mt-2">{todayInstructors.length}</div>
          <div className="text-xs opacity-75 mt-2">{todayInstructors.join(", ") || "ไม่มีผู้สอน"}</div>
        </div>
        <div className="bg-gradient-to-br from-green-500 to-green-600 text-white rounded-xl p-6 shadow-lg">
          <div className="text-sm font-medium opacity-90">นักเรียนวันนี้</div>
          <div className="text-4xl font-bold mt-2">{todayStudents}</div>
          <div className="text-xs opacity-75 mt-2">คนทั้งหมด</div>
        </div>
        <div className="bg-gradient-to-br from-purple-500 to-purple-600 text-white rounded-xl p-6 shadow-lg">
          <div className="text-sm font-medium opacity-90">คอร์สวันนี้</div>
          <div className="text-4xl font-bold mt-2">{todayBookings.length}</div>
          <div className="text-xs opacity-75 mt-2">คอร์สทั้งหมด</div>
        </div>
      </div>

      {todayBookings.length === 0 ? (
        <div className="bg-white rounded-xl border border-blue-100 p-8 text-center">
          <div className="text-4xl mb-2">😎</div>
          <div className="text-lg font-semibold text-gray-700">ว่าง</div>
          <div className="text-sm text-gray-500 mt-1">ไม่มีการจองในวันนี้</div>
        </div>
      ) : (
        <div className="space-y-4">
          {dynSlots.map(slot => {
            const slotBookings = groupedByTimeSlot[slot];
            return (
              <div key={slot} className="bg-white rounded-xl border border-blue-100 p-6 shadow-sm">
                <h3 className="text-xl font-bold text-blue-700 mb-4">⏰ {slot}</h3>
                {slotBookings.length === 0 ? (
                  <p className="text-sm text-gray-500">ไม่มีการจองในเวลานี้</p>
                ) : (
                  <div className="space-y-3">
                    {slotBookings.map((bk, i) => {
                      const custNames = [bk.name];
                      return (
                        <div key={i} className="bg-gradient-to-r from-blue-50 to-cyan-50 border border-blue-200 rounded-lg p-4">
                          <div className="grid grid-cols-2 gap-4 md:grid-cols-4">
                            <div>
                              <div className="text-xs text-gray-600 font-medium">ผู้สอน</div>
                              <div className="text-lg font-semibold text-gray-800">{bk.instructor}</div>
                            </div>
                            <div>
                              <div className="text-xs text-gray-600 font-medium">คอร์ส</div>
                              <div className="text-lg font-semibold text-blue-700">{cfg(bk.courseType).label}</div>
                            </div>
                            <div>
                              <div className="text-xs text-gray-600 font-medium">นักเรียน</div>
                              <div className="text-lg font-semibold text-green-700">{bk.totalPeople} คน</div>
                            </div>
                            <div>
                              <div className="text-xs text-gray-600 font-medium">ชื่อ</div>
                              <div className="text-sm font-semibold text-gray-800">{bk.name}</div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* รอตรวจสอบสลิป */}
      {pendingPayments.length > 0 && (
        <div className="bg-white rounded-xl border-2 border-amber-400 p-6 shadow-sm">
          <h3 className="text-xl font-bold text-amber-700 mb-4">🧾 รอตรวจสอบสลิป ({pendingPayments.length})</h3>
          <div className="space-y-3">
            {pendingPayments.map((bk, i) => (
              <div key={i} className="bg-amber-50 border border-amber-200 rounded-lg p-4">
                <div className="flex flex-col md:flex-row md:justify-between md:items-start gap-3">
                  <div className="flex-1 space-y-1">
                    <div className="font-semibold text-gray-800 text-lg">{bk.name}</div>
                    <div className="text-sm text-gray-600">{bk.tel}</div>
                    <div className="text-sm text-gray-600">📅 {fmt(bk.startDate)} {bk.timeSlot}{(bk.totalDays || 1) > 1 && ` (${bk.totalDays} วัน)`}</div>
                    {(bk.totalDays || 1) > 1 && bk.additionalDates && bk.additionalDates.length > 0 && (
                      <div className="text-xs text-gray-400 ml-4">{bk.additionalDates.map((d,i) => `วันที่ ${i+2}: ${fmt(d)}`).join(', ')}</div>
                    )}
                    <div className="text-sm text-gray-600">📦 {bk.package === "flex" ? "Flexible" : bk.package === "fixed" ? "Fixed" : bk.courseType}</div>
                    {bk.discountCode && <div className="text-sm text-green-600">🏷️ โค้ด: {bk.discountCode} (ลด ฿{bk.discountAmount})</div>}
                    <div className="text-lg font-bold text-blue-700">💰 ฿{fmtPrice(bk.finalPrice)}</div>
                  </div>
                  <div className="flex flex-col gap-2 items-end">
                    {bk.paymentSlip && (
                      <button onClick={() => setViewSlip(bk.paymentSlip)}
                        className="text-sm bg-blue-100 text-blue-700 px-4 py-2 rounded-lg hover:bg-blue-200 font-medium">
                        🖼️ ดูสลิป
                      </button>
                    )}
                    <button onClick={() => confirmPayment(bk)}
                      className="text-sm bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 font-semibold">
                      ✓ ยืนยันชำระแล้ว
                    </button>
                    <button onClick={() => updateBooking(bk.id, { paymentStatus: "ไม่ผ่าน" })}
                      className="text-sm bg-red-100 text-red-700 px-4 py-2 rounded-lg hover:bg-red-200 font-medium">
                      ✗ สลิปไม่ถูกต้อง
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Slip Viewer Modal */}
      {viewSlip && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50" onClick={() => setViewSlip(null)}>
          <div className="bg-white rounded-xl p-4 max-w-md w-full mx-4" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-3">
              <h3 className="font-bold text-gray-800">สลิปการชำระเงิน</h3>
              <button onClick={() => setViewSlip(null)} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
            </div>
            <img src={viewSlip} alt="สลิป" className="w-full rounded-lg" />
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Dashboard ───
function Dashboard({ stats, bookings, customers, enrolled, courses, cfg, courseKeys, instructors }) {
  const cards = [
    { label: "ลูกค้าทั้งหมด", value: stats.totalCustomers, icon: "👥", color: "bg-blue-50 border-blue-200" },
    { label: "การจองทั้งหมด", value: stats.totalBookings,  icon: "📋", color: "bg-indigo-50 border-indigo-200" },
    { label: "วันนี้",         value: stats.todayDone,      icon: "📅", color: "bg-sky-50 border-sky-200" },
    { label: "คงเหลือ",        value: stats.pending,        icon: "⏳", color: "bg-cyan-50 border-cyan-200" },
  ];
  const recent = [...bookings].sort((a, b) => (b.createdAt||"").localeCompare(a.createdAt||"")).slice(0, 5);

  const instructorStats = useMemo(() => {
    const map = {};
    instructors.forEach(inst => {
      const studentCount = bookings.filter(b => b.instructor === inst).reduce((sum, b) => sum + (Number(b.totalPeople) || 0), 0);
      const earning = Math.min(studentCount * 250, 1000);
      map[inst] = { studentCount, earning };
    });
    return map;
  }, [bookings, instructors]);

  const revenueStats = useMemo(() => {
    const totalRevenue = bookings.reduce((sum, b) => sum + (Number(b.finalPrice) || 0), 0);
    const ownSales = bookings.filter(b => b.channel === "ซื้อเอง").length;
    const jiacprSales = bookings.filter(b => b.channel === "จาก jiacpr.com").length;
    return { totalRevenue, ownSales, jiacprSales };
  }, [bookings]);

  // รายได้รายเดือน (6 เดือนล่าสุด)
  const monthlyRevenue = useMemo(() => {
    const months = [];
    const now = new Date();
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      const label = d.toLocaleDateString('th-TH', { month: 'short', year: '2-digit' });
      const monthBookings = bookings.filter(b => (b.createdAt || b.startDate || '').startsWith(key));
      const revenue = monthBookings.reduce((sum, b) => sum + (Number(b.finalPrice) || 0), 0);
      const count = monthBookings.length;
      months.push({ key, label, revenue, count });
    }
    const maxRev = Math.max(...months.map(m => m.revenue), 1);
    return { months, maxRev };
  }, [bookings]);

  // รายได้แยกตามคอร์ส
  const courseRevenue = useMemo(() => {
    const map = {};
    bookings.forEach(b => {
      const k = b.courseType || 'other';
      if (!map[k]) map[k] = { revenue: 0, count: 0 };
      map[k].revenue += Number(b.finalPrice) || 0;
      map[k].count += 1;
    });
    return Object.entries(map).map(([key, val]) => ({
      key, label: (courses.find(c => c.key === key) || {}).label || key, ...val
    })).sort((a, b) => b.revenue - a.revenue);
  }, [bookings, courses]);

  // ── Export Functions ──
  const exportCSV = () => {
    const headers = ['ชื่อ','เบอร์โทร','คอร์ส','วันที่','เวลา','จำนวน','ราคา','สถานะชำระ','เซลล์','ผู้สอน','วันที่จอง'];
    const rows = bookings.map(b => [b.name, b.tel, b.courseType, b.startDate, b.timeSlot, b.totalPeople, b.finalPrice, b.paymentStatus, b.salesStaff, b.instructor, b.createdAt]);
    const bom = '\uFEFF';
    const csv = bom + [headers, ...rows].map(r => r.map(v => '"' + String(v || '').replace(/"/g, '""') + '"').join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'JIA_Bookings_' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click(); showToast('📥 ดาวน์โหลด CSV สำเร็จ');
  };

  const exportPDF = () => {
    const w = window.open('', '_blank');
    const html = '<html><head><meta charset="utf-8"><title>JIA Report</title><style>body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #ddd;padding:6px;text-align:left}th{background:#2563eb;color:white}.summary{display:flex;gap:20px;margin:20px 0}.card{border:1px solid #ddd;padding:15px;border-radius:8px;text-align:center;flex:1}h1{color:#1e40af}</style></head><body>'
      + '<h1>JIA Trainer Center — รายงาน</h1>'
      + '<p>วันที่ออกรายงาน: ' + new Date().toLocaleDateString('th-TH') + '</p>'
      + '<div class="summary"><div class="card"><div>ลูกค้า</div><h2>' + stats.totalCustomers + '</h2></div><div class="card"><div>จอง</div><h2>' + stats.totalBookings + '</h2></div><div class="card"><div>รายได้รวม</div><h2>' + fmtPrice(revenueStats.totalRevenue) + ' บาท</h2></div></div>'
      + '<table><tr><th>ชื่อ</th><th>คอร์ส</th><th>วันที่</th><th>เวลา</th><th>จำนวน</th><th>ราคา</th><th>สถานะ</th><th>เซลล์</th></tr>'
      + bookings.slice(0, 200).map(b => '<tr><td>' + [b.name, b.courseType, b.startDate, b.timeSlot, b.totalPeople, fmtPrice(b.finalPrice||0), b.paymentStatus||'-', b.salesStaff||'-'].join('</td><td>') + '</td></tr>').join('')
      + '</table></body></html>';
    w.document.write(html);
    w.document.close();
    setTimeout(() => w.print(), 500);
  };

  return (
    <div className="space-y-6">
      {/* Export Buttons */}
      <div className="flex gap-2 justify-end">
        <button onClick={exportCSV} className="text-xs bg-green-100 text-green-700 px-3 py-2 rounded-lg hover:bg-green-200 font-medium">📊 Export Excel (CSV)</button>
        <button onClick={exportPDF} className="text-xs bg-red-100 text-red-700 px-3 py-2 rounded-lg hover:bg-red-200 font-medium">📄 Export PDF</button>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {cards.map((c, i) => (
          <div key={i} className={`border rounded-xl p-4 ${c.color}`}>
            <div className="text-2xl mb-1">{c.icon}</div>
            <div className="text-2xl font-bold text-gray-800">{c.value}</div>
            <div className="text-xs text-gray-500 mt-1">{c.label}</div>
          </div>
        ))}
      </div>

      <div className="bg-white rounded-xl border border-blue-100 p-5">
        <h2 className="font-semibold text-blue-800 mb-4">💰 รายได้สรุป</h2>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div className="border border-green-200 rounded-lg p-4 bg-green-50">
            <div className="text-xs text-gray-600 mb-1">รายได้รวม</div>
            <div className="text-2xl font-bold text-green-700">{fmtPrice(revenueStats.totalRevenue)} บาท</div>
          </div>
          <div className="border border-blue-200 rounded-lg p-4 bg-blue-50">
            <div className="text-xs text-gray-600 mb-1">ซื้อเอง</div>
            <div className="text-2xl font-bold text-blue-700">{revenueStats.ownSales} คอร์ส</div>
          </div>
          <div className="border border-purple-200 rounded-lg p-4 bg-purple-50">
            <div className="text-xs text-gray-600 mb-1">จาก jiacpr.com</div>
            <div className="text-2xl font-bold text-purple-700">{revenueStats.jiacprSales} คอร์ส</div>
          </div>
        </div>
      </div>

      {/* รายได้รายเดือน — bar chart */}
      <div className="bg-white rounded-xl border border-blue-100 p-5">
        <h2 className="font-semibold text-blue-800 mb-4">📊 รายได้รายเดือน (6 เดือนล่าสุด)</h2>
        <div className="flex items-end gap-2 h-40">
          {monthlyRevenue.months.map(m => {
            const pct = Math.max(4, Math.round((m.revenue / monthlyRevenue.maxRev) * 100));
            const isCurrentMonth = m.key === (new Date().getFullYear() + '-' + String(new Date().getMonth() + 1).padStart(2, '0'));
            return (
              <div key={m.key} className="flex-1 flex flex-col items-center gap-1">
                <div className="text-xs font-bold text-gray-700">{m.revenue > 0 ? fmtPrice(m.revenue) : '-'}</div>
                <div className="w-full relative" style={{ height: pct + '%', minHeight: '8px' }}>
                  <div className={`w-full h-full rounded-t-lg transition-all ${isCurrentMonth ? 'bg-blue-500' : 'bg-blue-200'}`} />
                </div>
                <div className="text-xs text-gray-500">{m.label}</div>
                <div className="text-xs text-gray-400">{m.count} จอง</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* รายได้แยกตามคอร์ส */}
      <div className="bg-white rounded-xl border border-blue-100 p-5">
        <h2 className="font-semibold text-blue-800 mb-4">📚 รายได้แยกตามคอร์ส</h2>
        <div className="space-y-3">
          {courseRevenue.map(cr => {
            const maxCr = courseRevenue[0]?.revenue || 1;
            const pct = Math.round((cr.revenue / maxCr) * 100);
            return (
              <div key={cr.key}>
                <div className="flex justify-between text-sm mb-1">
                  <span className="font-medium text-gray-700">{cr.label}</span>
                  <span className="text-gray-600">{fmtPrice(cr.revenue)} บาท ({cr.count} จอง)</span>
                </div>
                <div className="w-full bg-gray-100 rounded-full h-3">
                  <div className="h-3 rounded-full bg-gradient-to-r from-green-400 to-green-600 transition-all" style={{ width: pct + '%' }} />
                </div>
              </div>
            );
          })}
          {courseRevenue.length === 0 && <p className="text-sm text-gray-400">ยังไม่มีข้อมูล</p>}
        </div>
      </div>

      <div className="bg-white rounded-xl border border-blue-100 p-5">
        <h2 className="font-semibold text-blue-800 mb-4">สถานะที่นั่งแต่ละคอร์ส</h2>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          {courses.filter(c => c.max < 999).map(c => {
            const used = enrolled[c.key] || 0;
            const pct = Math.min(100, Math.round((used / c.max) * 100));
            const full = used >= c.max;
            return (
              <div key={c.key} className="border border-blue-100 rounded-xl p-3">
                <div className="flex justify-between items-start mb-2">
                  <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${c.color}`}>{c.label}</span>
                  {full && <span className="text-xs bg-red-100 text-red-600 px-1.5 py-0.5 rounded-full font-medium">เต็ม</span>}
                </div>
                <p className="text-xs text-gray-400 mb-1">{c.range}</p>
                <div className="w-full bg-gray-100 rounded-full h-2 mb-1">
                  <div className={`h-2 rounded-full transition-all ${full ? "bg-red-400" : "bg-blue-500"}`}
                    style={{ width: pct + "%" }} />
                </div>
                <p className="text-xs text-gray-600 font-medium">{used}/{c.max}</p>
              </div>
            );
          })}
        </div>
      </div>

      <div className="bg-white rounded-xl border border-blue-100 p-5">
        <h2 className="font-semibold text-blue-800 mb-4">สรุปปริมาณงานผู้สอน</h2>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
          {instructors.map(inst => {
            const stat = instructorStats[inst] || { studentCount: 0, earning: 0 };
            const statusColor = stat.earning >= 1000 ? "bg-red-100" : stat.earning >= 500 ? "bg-yellow-100" : "bg-green-100";
            const textColor = stat.earning >= 1000 ? "text-red-700" : stat.earning >= 500 ? "text-yellow-700" : "text-green-700";
            return (
              <div key={inst} className={`border rounded-lg p-3 ${statusColor} ${textColor}`}>
                <div className="font-semibold text-sm">{inst}</div>
                <div className="text-xs mt-1">นักเรียน: {stat.studentCount} คน</div>
                <div className="text-xs">ค่าสอน: {stat.earning} บาท</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="bg-white rounded-xl border border-blue-100 p-5">
        <h2 className="font-semibold text-blue-800 mb-3">การจองล่าสุด</h2>
        <div className="space-y-2 max-h-64 overflow-y-auto">
          {recent.length === 0 ? (
            <p className="text-sm text-gray-500 py-2">ยังไม่มีการจอง</p>
          ) : (
            recent.map((b, i) => (
              <div key={i} className="flex justify-between text-xs py-2 border-b last:border-b-0">
                <div className="font-medium text-gray-700">{b.name}</div>
                <div className="text-gray-500">{b.totalPeople} คน • {fmt(b.startDate)}</div>
              </div>
            ))
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Course Type Picker ───
function CourseTypePicker({ value, onChange, enrolled, courses, size = "normal" }) {
  const [open, setOpen] = useState(false);
  const selected = courses.find(c => c.key === value);
  const baseStyle = size === "small" ? "text-xs px-2 py-1" : "text-sm px-3 py-2";
  return (
    <div className="relative inline-block w-full">
      <button onClick={() => setOpen(!open)}
        className={`${baseStyle} w-full border border-blue-200 bg-blue-50 rounded-lg text-left font-medium hover:border-blue-400 transition-colors flex justify-between items-center`}>
        {selected ? selected.label : "เลือกคอร์ส"}
        <span className="text-blue-400">▼</span>
      </button>
      {open && (

// ─── Instructor Picker (กรองตามคอร์สที่สอนได้) ───
function InstructorPicker({ selected, onChange, instructors, courseType, instructorAvail, selectedDate, selectedSlot }) {
  // โหลด qualifications
  const quals = React.useMemo(() => {
    try { return JSON.parse(localStorage.getItem('jia_instructor_quals') || '{}'); } catch { return {}; }
  }, []);

  // กรองเฉพาะผู้สอนที่สอนคอร์สนี้ได้
  const filtered = courseType
    ? instructors.filter(inst => {
        const instCourses = quals[inst];
        if (!instCourses || instCourses.length === 0) return true;
        return instCourses.includes(courseType);
      })
    : instructors;

  // แยกผู้สอนที่ว่าง vs ไม่ว่าง ตามวันที่/เวลาที่เลือก
  const { available, unavailable } = React.useMemo(() => {
    if (!instructorAvail || !selectedDate || !selectedSlot) {
      return { available: filtered, unavailable: [] };
    }
    const avail = [];
    const unavail = [];
    filtered.forEach(inst => {
      const isAvail = instructorAvail.find(a =>
        a.instructor === inst && a.date === selectedDate && a.timeSlot === selectedSlot
      );
      if (isAvail) avail.push(inst);
      else unavail.push(inst);
    });
    return { available: avail, unavailable: unavail };
  }, [filtered, instructorAvail, selectedDate, selectedSlot]);

  const hasFilter = selectedDate && selectedSlot;

  return (
    <select value={selected} onChange={(e) => onChange(e.target.value)}
      className="w-full border border-blue-200 bg-blue-50 rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:border-blue-500">
      <option value="">เลือกผู้สอน</option>
      {hasFilter && available.length > 0 && <option disabled>── ว่าง ✅ ──</option>}
      {available.map(inst => <option key={inst} value={inst}>✅ {inst}</option>)}
      {hasFilter && unavailable.length > 0 && <option disabled>── ไม่ว่าง ──</option>}
      {unavailable.map(inst => <option key={inst} value={inst}>⚠️ {inst}</option>)}
      {filtered.length === 0 && <option value="" disabled>ไม่มีผู้สอนที่สอนคอร์สนี้ได้</option>}
    </select>
  );
}
