  const [name, setName] = useState("");
  const [tel, setTel] = useState("");
  const [courseType, setCourseType] = useState("");
  const [channel, setChannel] = useState("");
  const [totalPeople, setTotalPeople] = useState("");
  const [paymentMode, setPaymentMode] = useState("");
  const [startDate, setStartDate] = useState("");
  const [timeSlot, setTimeSlot] = useState("");
  const userRole = window.JIA_AUTH_USER?.role || 'admin';
  const isSales = userRole === 'sales';
  const currentUserName = window.JIA_AUTH_USER?.name || '';
  const [salesStaff, setSalesStaff] = useState(() => isSales ? currentUserName : "");
  const [instructor, setInstructor] = useState("");
  const [note, setNote] = useState("");
  const [showNewCustomer, setShowNewCustomer] = useState(false);
  const [selectedCustomer, setSelectedCustomer] = useState(null);
  const [cprPackage, setCprPackage] = useState("");
  const [discountCode, setDiscountCode] = useState("");
  const [discountValidation, setDiscountValidation] = useState("");
  const [customPrice, setCustomPrice] = useState("");
  const [useCustomPrice, setUseCustomPrice] = useState(false);
  const [showConfirmDialog, setShowConfirmDialog] = useState(false);
  const [pendingBooking, setPendingBooking] = useState(null);

  const courseConfig = cfg(courseType);
  let basePrice = courseConfig.price;
  let finalPrice = useCustomPrice && customPrice !== "" ? Number(customPrice) : basePrice;
  let discountAmount = 0;

  // Validate discount code
  const validateDiscountCode = () => {
    if (!discountCode.trim()) {
      setDiscountValidation("");
      return;
    }
    const code = discountCode.toUpperCase();
    if (code.startsWith("JIA-")) {
      setDiscountValidation("valid");
      discountAmount = 100;
    } else if (code.startsWith("SALE-")) {
      const promo = promoCodes.find(p => p.code === code);
      if (promo) {
        if (promo.used) {
          setDiscountValidation("used");
        } else {
          setDiscountValidation("valid");
          discountAmount = Number(promo.discount) || 0;
        }
      } else {
        setDiscountValidation("invalid");
      }
    } else {
      setDiscountValidation("invalid");
    }
  };

  useEffect(() => {
    if (discountCode) validateDiscountCode();
  }, [discountCode]);

  if (!useCustomPrice) {
    finalPrice = Math.max(0, finalPrice - discountAmount);
  }

  const discountPct = courseConfig.price > 0
    ? Math.round(((courseConfig.price - finalPrice) / courseConfig.price) * 100)
    : 0;

  const canBook = courseType && channel && totalPeople && paymentMode && startDate && timeSlot && salesStaff && instructor && selectedCustomer && (courseType !== "CPR" || cprPackage);

  const handleSubmit = async () => {
    if (!canBook) return;
    let usedCode = "";
    if (discountValidation === "valid") {
      usedCode = discountCode.toUpperCase();
    }
    const bk = {
      customerId: selectedCustomer.id,
      name: selectedCustomer.name,
      tel: selectedCustomer.tel,
      courseType,
      channel,
      totalPeople: Number(totalPeople),
      finalPrice: finalPrice,
      paymentMode,
      startDate,
      timeSlot,
      salesStaff,
      instructor,
      note,
      cprPackage,
      discountCode: usedCode,
      createdBy: window.JIA_AUTH_USER?.name || salesStaff || 'unknown',
      rescheduleCount: 0,
    };
    // Show confirmation dialog instead of submitting directly
    setPendingBooking(bk);
    setShowConfirmDialog(true);
  };

  const confirmBooking = async () => {
    if (!pendingBooking) return;
    // Mark promo code as used
    if (discountValidation === "valid" && pendingBooking.discountCode) {
      const usedCode = pendingBooking.discountCode;
      if (usedCode.startsWith("SALE-")) {
        const promo = promoCodes.find(p => p.code === usedCode);
        if (promo) {
          const updated = promoCodes.map(p =>
            p.code === usedCode ? { ...p, used: true, usedBy: pendingBooking.name } : p
          );
          updatePromoCodes(updated);
        }
      }

    await addBooking(pendingBooking);

// ─── Schedule ───
function Schedule({ sessions, bookings, customers, toggleSession, updateSessionDate, updateBooking, deleteBooking, enrolled, cfg, courseKeys, staff, instructors, courses, userRole, currentUserName }) {
  const [filter, setFilter] = useState("all");
  const isSales = userRole === 'sales';

  const myBookings = useMemo(() => {
    if (!isSales || !currentUserName) return bookings;
    return bookings.filter(b => b.salesStaff === currentUserName || b.createdBy === currentUserName);
  }, [bookings, isSales, currentUserName]);

  const myBookingIds = useMemo(() => new Set(myBookings.map(b => b.id)), [myBookings]);

  const sessionList = useMemo(() => {
    let list = sessions
      .filter(s => !isSales || myBookingIds.has(s.bookingId))
      .map(s => {
        const bk = bookings.find(b => b.id === s.bookingId);
        const cust = customers.find(c => c.id === s.customerId);
        return { ...s, booking: bk, customer: cust };
      });
    if (filter === "pending") list = list.filter(s => !s.done);
    else if (filter === "completed") list = list.filter(s => s.done);
    return list.sort((a, b) => (b.date || "9999").localeCompare(a.date || "0000"));
  }, [sessions, bookings, customers, filter, isSales, myBookingIds]);

  return (
    <div className="space-y-4">
      <div className="flex gap-2">
        {["all", "pending", "completed"].map(f => (
          <button key={f} onClick={() => setFilter(f)}
            className={`text-xs font-medium px-4 py-2 rounded-lg transition-colors ${
              filter === f ? "bg-blue-600 text-white" : "bg-blue-100 text-blue-700 hover:bg-blue-200"
            }`}>
            {f === "all" ? "ทั้งหมด" : f === "pending" ? "คงเหลือ" : "เรียนแล้ว"}
          </button>
        ))}
      </div>

      <div className="space-y-3">
        {sessionList.map(s => (
          <div key={s.id} className={`border rounded-lg p-4 transition-all ${s.done ? "bg-green-50 border-green-200" : "bg-white border-blue-100"}`}>
            <div className="flex justify-between items-start mb-2">
              <div>
                <p className="font-semibold text-gray-800">{s.customer?.name} — {s.booking ? cfg(s.booking.courseType).label : "-"}</p>
                <p className="text-xs text-gray-500">Session {s.sessionNo}/{sessions.filter(x => x.customerId === s.customerId && x.bookingId === s.bookingId).length}</p>
              </div>
              <div className="flex gap-2">
                <input type="date" value={s.date} onChange={(e) => updateSessionDate(s.id, e.target.value)}
                  className="text-xs px-2 py-1 border border-blue-200 rounded bg-blue-50 focus:outline-none" />
                <button onClick={() => toggleSession(s.id)}
                  className={`text-xs font-semibold px-3 py-1 rounded transition-colors ${
                    s.done ? "bg-green-100 text-green-700 hover:bg-green-200" : "bg-blue-100 text-blue-700 hover:bg-blue-200"
                  }`}>
                  {s.done ? "✓ เรียนแล้ว" : "ยังไม่เรียน"}
                </button>
              </div>
            </div>
            {s.booking && (
              <p className="text-xs text-gray-600 mb-2">📅 {s.booking.startDate} {s.booking.timeSlot}{(s.booking.totalDays || 1) > 1 ? ` (${s.booking.totalDays} วัน)` : ''} | 👤 {s.booking.salesStaff} | 🎓 {s.booking.instructor}</p>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Calendar View ───
function CalendarView({ sessions, bookings, courses, cfg, customers, classes = [], classInstructors = [] }) {
  const [year, setYear] = useState(new Date().getFullYear() + 543);
  const [month, setMonth] = useState(new Date().getMonth());
  const [selectedDate, setSelectedDate] = useState(null);

  const getDaysInMonth = (m, y) => new Date(y - 543, m + 1, 0).getDate();
  const getFirstDay = (m, y) => new Date(y - 543, m, 1).getDay();
  const daysInMonth = getDaysInMonth(month, year);
  const firstDay = getFirstDay(month, year);
  const todayStr = new Date().toISOString().slice(0, 10);

  const days = Array.from({ length: daysInMonth }, (_, i) => {
    const d = String(i + 1).padStart(2, "0");
    const m = String(month + 1).padStart(2, "0");
    return { date: (year - 543) + "-" + m + "-" + d, day: i + 1 };
  });

  // รวมข้อมูลแต่ละวัน: คอร์สอะไร + จำนวนคนจอง + เต็มหรือยัง
  const dayData = useMemo(() => {
    const map = {};
    // จาก bookings: ใช้ startDate + additionalDates
    bookings.forEach(bk => {
      const dates = [bk.startDate];
      if (bk.additionalDates) {
        try {
          const extra = typeof bk.additionalDates === 'string' ? JSON.parse(bk.additionalDates) : bk.additionalDates;
          if (Array.isArray(extra)) dates.push(...extra);
        } catch(e) {}
      }
      dates.filter(Boolean).forEach(dt => {
        if (!map[dt]) map[dt] = { courses: {}, bookings: [], sessionsDone: 0, sessionsPending: 0 };
        const courseKey = bk.courseType || 'Other';
        const courseLabel = cfg(courseKey).label;
        const maxPpl = cfg(courseKey).max || 999;
        if (!map[dt].courses[courseKey]) map[dt].courses[courseKey] = { label: courseLabel, max: maxPpl, people: 0, bookingIds: [] };
        map[dt].courses[courseKey].people += Number(bk.totalPeople) || 1;
        map[dt].courses[courseKey].bookingIds.push(bk.id);
        map[dt].bookings.push(bk);
      });
    });
    // จาก sessions: นับจำนวน done/pending
    sessions.forEach(s => {
      if (!s.date) return;
      if (!map[s.date]) map[s.date] = { courses: {}, bookings: [], classes: [], sessionsDone: 0, sessionsPending: 0 };
      if (s.done) map[s.date].sessionsDone++;
      else map[s.date].sessionsPending++;
    });
    // จาก classes (เปิดคลาส)
    classes.forEach(cls => {
      if (!cls.date) return;
      if (!map[cls.date]) map[cls.date] = { courses: {}, bookings: [], classes: [], sessionsDone: 0, sessionsPending: 0 };
      if (!map[cls.date].classes) map[cls.date].classes = [];
      const instructorList = classInstructors.filter(ci => ci.classId === cls.id).map(ci => ci.instructor);
      map[cls.date].classes.push({ ...cls, instructorNames: instructorList });
    });
    return map;
  }, [bookings, sessions, classes, classInstructors, cfg]);

  // popup data
  const popupData = useMemo(() => {
    if (!selectedDate) return null;
    const dd = dayData[selectedDate];
    if (!dd) return { date: selectedDate, courses: [], students: [] };
    // รวมรายชื่อนักเรียน
    const students = [];
    const seen = new Set();
    dd.bookings.forEach(bk => {
      const key = bk.customerId || bk.id;
      if (seen.has(key)) return;
      seen.add(key);
      const cust = customers.find(c => c.id === bk.customerId);
      students.push({
        name: cust?.name || bk.name || '-',
        tel: cust?.tel || bk.tel || '-',
        course: cfg(bk.courseType || 'Other').label,
        courseKey: bk.courseType,
        people: bk.totalPeople || 1,
        paymentStatus: bk.paymentStatus || '-',
        timeSlot: bk.timeSlot || '-',
        instructor: bk.instructor || '-',
        bookingId: bk.id
      });
    });
    return {
      date: selectedDate,
      courses: Object.entries(dd.courses).map(([key, v]) => ({ key, ...v })),
      students,
      sessionsDone: dd.sessionsDone,
      sessionsPending: dd.sessionsPending
    };
  }, [selectedDate, dayData, customers, cfg]);

  const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
    "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
  const dayNames = ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"];

  const handlePrevMonth = () => {
    setSelectedDate(null);
    if (month === 0) { setMonth(11); setYear(year - 1); } else setMonth(month - 1);
  };
  const handleNextMonth = () => {
    setSelectedDate(null);
    if (month === 11) { setMonth(0); setYear(year + 1); } else setMonth(month + 1);
  };

  const formatThaiDate = (dateStr) => {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return parseInt(d) + ' ' + monthNames[parseInt(m) - 1] + ' ' + (parseInt(y) + 543);
  };

  return (
    <div className="bg-white rounded-xl border border-blue-100 p-6">
      <div className="flex justify-between items-center mb-6">
        <h2 className="font-bold text-lg text-blue-800">ปฏิทิน</h2>
        <div className="flex gap-2 items-center">
          <button onClick={handlePrevMonth} className="text-blue-600 hover:text-blue-800 text-xl px-2">◀</button>
          <span className="text-sm font-semibold text-gray-700 w-40 text-center">{monthNames[month]} {year}</span>
          <button onClick={handleNextMonth} className="text-blue-600 hover:text-blue-800 text-xl px-2">▶</button>
        </div>
      </div>

      <div className="grid grid-cols-7 gap-1 mb-1">
        {dayNames.map(d => <div key={d} className="text-center text-xs font-semibold text-gray-500 py-2">{d}</div>)}
      </div>

      <div className="grid grid-cols-7 gap-1">
        {Array.from({ length: firstDay }).map((_, i) => <div key={"empty-" + i} />)}
        {days.map(d => {
          const dd = dayData[d.date];
          const courseCount = dd ? Object.keys(dd.courses).length : 0;
          const classCount = dd && dd.classes ? dd.classes.length : 0;
          const totalPeople = dd ? Object.values(dd.courses).reduce((sum, c) => sum + c.people, 0) : 0;
          const isToday = d.date === todayStr;
          const isPast = d.date < todayStr;
          const isSelected = d.date === selectedDate;
          const hasData = courseCount > 0 || classCount > 0;
          const hasFullCourse = dd && Object.values(dd.courses).some(c => c.people >= c.max);

          let bgClass = 'bg-gray-50 border-gray-200 text-gray-500';
          if (hasData && isPast) bgClass = 'bg-green-50 border-green-200 text-green-700';
          else if (hasData && hasFullCourse) bgClass = 'bg-orange-50 border-orange-300 text-orange-700';
          else if (hasData) bgClass = 'bg-blue-50 border-blue-300 text-blue-700';
          if (isToday) bgClass = hasData ? 'bg-blue-100 border-blue-400 text-blue-800 ring-2 ring-blue-400' : 'bg-yellow-50 border-yellow-300 text-yellow-700 ring-2 ring-yellow-300';
          if (isSelected) bgClass += ' ring-2 ring-indigo-500 shadow-md';

          return (
            <div key={d.date} onClick={() => hasData && setSelectedDate(isSelected ? null : d.date)}
              className={`border rounded-lg p-1 text-center text-xs font-medium min-h-[56px] transition-all ${bgClass} ${hasData ? 'cursor-pointer hover:shadow-md' : ''}`}>
              <div className={`font-bold ${isToday ? 'text-sm' : ''}`}>{d.day}</div>
              {hasData && (
                <div className="mt-0.5">
                  <div className="text-[10px] leading-tight truncate">
                    {dd.classes && dd.classes.slice(0, 2).map((cls, i) => (
                      <div key={'cls'+i} className="truncate text-teal-600">{(cls.courseName || cls.courseKey || '').length > 8 ? (cls.courseName || cls.courseKey || '').slice(0,8)+'..' : (cls.courseName || cls.courseKey || '')}</div>
                    ))}
                    {Object.values(dd.courses).slice(0, Math.max(0, 2 - classCount)).map((c, i) => (
                      <div key={'bk'+i} className="truncate">{c.label.length > 8 ? c.label.slice(0, 8) + '..' : c.label}</div>
                    ))}
                    {(courseCount + classCount) > 2 && <div>+{courseCount + classCount - 2}</div>}
                  </div>
                  {totalPeople > 0 && <div className="text-[10px] mt-0.5 font-bold">{totalPeople} คน</div>}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div className="flex flex-wrap gap-3 mt-4 text-[10px] text-gray-500">
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-blue-100 border border-blue-300 inline-block"></span> มีคอร์ส</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-orange-100 border border-orange-300 inline-block"></span> เต็มแล้ว</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-green-50 border border-green-200 inline-block"></span> ผ่านไปแล้ว</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-yellow-50 border border-yellow-300 ring-2 ring-yellow-300 inline-block"></span> วันนี้</span>
      </div>

      {/* ─── Day Detail Popup ─── */}
      {popupData && selectedDate && (
        <div className="mt-6 border-2 border-indigo-200 rounded-xl bg-indigo-50 p-5 animate-fadeIn">
          <div className="flex justify-between items-center mb-4">
            <h3 className="font-bold text-indigo-800 text-lg">{formatThaiDate(selectedDate)}</h3>
            <button onClick={() => setSelectedDate(null)} className="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
          </div>

          {/* คลาสเรียน (จากเปิดคลาส) */}
          {dayData[selectedDate]?.classes?.length > 0 && (
            <div className="space-y-2 mb-4">
              <p className="text-xs font-semibold text-teal-600 uppercase tracking-wide">คลาสเรียน</p>
              {dayData[selectedDate].classes.map((cls, i) => {
                const statusColors = { ready: 'bg-blue-100 text-blue-700', waiting_instructor: 'bg-yellow-100 text-yellow-700', full: 'bg-green-100 text-green-700', done: 'bg-gray-100 text-gray-600' };
                const statusLabels = { ready: 'พร้อม', waiting_instructor: 'รอผู้สอน', full: 'เต็ม', done: 'สอนแล้ว' };
                return (
                  <div key={i} className="bg-white rounded-lg p-3 border border-teal-100">
                    <div className="flex justify-between items-center mb-1">
                      <span className="font-semibold text-sm text-gray-800">{cls.courseName || cls.courseKey}</span>
                      <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${statusColors[cls.status] || 'bg-gray-100 text-gray-600'}`}>
                        {statusLabels[cls.status] || cls.status}
                      </span>
                    </div>
                    <div className="text-xs text-gray-600">
                      {cls.timeSlot && <span>⏰ {cls.timeSlot}</span>}
                      {cls.place && <span className="ml-2">📍 {cls.place}</span>}
                      <span className="ml-2">👥 {cls.maxStudents || 0} คน</span>
                    </div>
                    {cls.instructorNames && cls.instructorNames.length > 0 && (
                      <div className="text-xs text-teal-700 mt-1">🎓 ผู้สอน: {cls.instructorNames.join(', ')}</div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* คอร์สในวันนี้ (จากระบบจอง) */}
          {popupData.courses.length > 0 ? (
            <div className="space-y-3 mb-4">
              <p className="text-xs font-semibold text-indigo-600 uppercase tracking-wide">คอร์สในวันนี้</p>
              {popupData.courses.map((c, i) => {
                const pct = Math.min(100, Math.round((c.people / c.max) * 100));
                const isFull = c.people >= c.max;
                return (
                  <div key={i} className="bg-white rounded-lg p-3 border border-indigo-100">
                    <div className="flex justify-between items-center mb-1">
                      <span className="font-semibold text-sm text-gray-800">{c.label}</span>
                      <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${isFull ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>
                        {isFull ? 'เต็มแล้ว' : 'ยังว่าง'}
                      </span>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="flex-1 bg-gray-200 rounded-full h-2">
                        <div className={`h-2 rounded-full transition-all ${isFull ? 'bg-red-400' : pct > 70 ? 'bg-orange-400' : 'bg-blue-400'}`}
                          style={{ width: pct + '%' }}></div>
                      </div>
                      <span className="text-xs font-semibold text-gray-600">{c.people}/{c.max} คน</span>
                    </div>
                  </div>
                );
              })}
            </div>
          ) : (
            <p className="text-sm text-gray-500 mb-4">ไม่มีคอร์สในวันนี้</p>
          )}

          {/* รายชื่อนักเรียน */}
          {popupData.students.length > 0 && (
            <div>
              <p className="text-xs font-semibold text-indigo-600 uppercase tracking-wide mb-2">รายชื่อนักเรียน ({popupData.students.length} คน)</p>
              <div className="bg-white rounded-lg border border-indigo-100 overflow-hidden">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="bg-indigo-100 text-indigo-700">
                      <th className="text-left p-2">ชื่อ</th>
                      <th className="text-left p-2">เบอร์โทร</th>
                      <th className="text-left p-2">คอร์ส</th>
                      <th className="text-center p-2">เวลา</th>
                      <th className="text-center p-2">ผู้สอน</th>
                      <th className="text-center p-2">ชำระเงิน</th>
                      <th className="text-center p-2">โทร</th>
                    </tr>
                  </thead>
                  <tbody>
                    {popupData.students.map((st, i) => (
                      <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-gray-50'}>
                        <td className="p-2 font-medium text-gray-800">{st.name} {Number(st.people) > 1 ? '(' + st.people + ' คน)' : ''}</td>
                        <td className="p-2 text-gray-600">{st.tel}</td>
                        <td className="p-2 text-gray-600">{st.course.length > 15 ? st.course.slice(0, 15) + '..' : st.course}</td>
                        <td className="p-2 text-center text-gray-600">{st.timeSlot}</td>
                        <td className="p-2 text-center text-gray-600">{st.instructor}</td>
                        <td className="p-2 text-center">
                          <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold ${

                    ))}

                </table>

          )}

          {popupData.students.length === 0 && popupData.courses.length === 0 && (
            <p className="text-sm text-gray-400 text-center py-4">ยังไม่มีข้อมูลในวันนี้</p>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Instructor Availability ───
function InstructorAvailability({ instructors, instructorAvail, saveInstructorAvail, courses }) {
  const dynSlots = React.useMemo(() => getAllTimeSlots(courses), [courses]);
  const [year, setYear] = useState(new Date().getFullYear() + 543);
  const [month, setMonth] = useState(new Date().getMonth());
  const [selectedInstructor, setSelectedInstructor] = useState(instructors[0] || "");

  // ใช้ ref เก็บข้อมูลล่าสุด เพื่อแก้ปัญหา stale closure (ต้องอยู่ก่อน early return)
  const availRef = React.useRef(instructorAvail);
  React.useEffect(() => { availRef.current = instructorAvail; }, [instructorAvail]);

  // ถ้ายังไม่มีผู้สอน แสดงข้อความแทน
  if (!instructors || instructors.length === 0) {
    return (
      <div className="bg-white rounded-xl border border-blue-100 p-6 text-center">
        <div className="text-4xl mb-4">👨‍🏫</div>
        <h2 className="font-bold text-lg text-blue-800 mb-2">ยังไม่มีผู้สอน</h2>
        <p className="text-gray-500">กรุณาเพิ่มผู้สอนในหน้า "ตั้งค่า" ก่อน</p>
      </div>
    );
  }

  const getDaysInMonth = (m, y) => new Date(y - 543, m + 1, 0).getDate();
  const getFirstDay = (m, y) => new Date(y - 543, m, 1).getDay();
  const daysInMonth = getDaysInMonth(month, year);
  const firstDay = getFirstDay(month, year);

  const days = Array.from({ length: daysInMonth }, (_, i) => {
    const d = String(i + 1).padStart(2, "0");
    const m = String(month + 1).padStart(2, "0");
    return { date: (year - 543) + "-" + m + "-" + d, day: i + 1 };
  });

  const toggleAvailability = (date, timeSlot) => {
    const current = availRef.current;
    const exists = current.find(a => a.instructor === selectedInstructor && a.date === date && a.timeSlot === timeSlot);
    let updated;
    if (exists) {
      updated = current.filter(a => !(a.instructor === selectedInstructor && a.date === date && a.timeSlot === timeSlot));
    } else {
      updated = [...current, { id: uid(), instructor: selectedInstructor, date, timeSlot }];
    }
    availRef.current = updated;
    saveInstructorAvail(updated);
  };

  const toggleAllSlots = (date) => {
    const current = availRef.current;
    const currentAvail = dynSlots.filter(slot =>
      current.find(a => a.instructor === selectedInstructor && a.date === date && a.timeSlot === slot)
    );
    const allSelected = currentAvail.length === dynSlots.length;
    let updated = current.filter(a => !(a.instructor === selectedInstructor && a.date === date));
    if (!allSelected) {
      dynSlots.forEach(slot => {
        updated.push({ id: uid(), instructor: selectedInstructor, date, timeSlot: slot });
      });
    }
    availRef.current = updated;
    saveInstructorAvail(updated);
  };

  const getAvailabilityForDate = (date) => {
    return dynSlots.filter(slot =>
      instructorAvail.find(a => a.instructor === selectedInstructor && a.date === date && a.timeSlot === slot)
    );
  };

  const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
    "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
  const dayNames = ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"];

  const handlePrevMonth = () => {
    if (month === 0) { setMonth(11); setYear(year - 1); }
    else setMonth(month - 1);
  };
  const handleNextMonth = () => {
    if (month === 11) { setMonth(0); setYear(year + 1); }
    else setMonth(month + 1);
  };

  return (
    <div className="space-y-6">
      <div className="bg-white rounded-xl border border-blue-100 p-6">
        <h2 className="font-bold text-lg text-blue-800 mb-4">ลงเวลาผู้สอน</h2>

        <div className="mb-4">
          <label className="text-sm font-medium text-gray-700 block mb-2">เลือกผู้สอน</label>
          <select value={selectedInstructor} onChange={(e) => setSelectedInstructor(e.target.value)}
            className="w-full border border-blue-200 bg-blue-50 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
            {instructors.map(inst => (
              <option key={inst} value={inst}>{inst}</option>
            ))}
          </select>
        </div>

        <div className="flex justify-between items-center mb-4">
          <h3 className="font-semibold text-gray-800">{monthNames[month]} {year}</h3>
          <div className="flex gap-2">
            <button onClick={handlePrevMonth} className="text-blue-600 hover:text-blue-800">◀</button>
            <button onClick={handleNextMonth} className="text-blue-600 hover:text-blue-800">▶</button>
          </div>
        </div>

        <div className="grid grid-cols-7 gap-1">
          {dayNames.map(d => <div key={d} className="text-center text-xs font-semibold text-gray-600 py-2">{d}</div>)}
          {Array.from({ length: firstDay }).map((_, i) => <div key={"empty-" + i} className="min-h-[80px]" />)}
          {days.map(d => {
            const avail = getAvailabilityForDate(d.date);
            const hasAvail = avail.length > 0;
            const allSelected = avail.length === dynSlots.length;
            return (
              <div key={d.date} className={`border rounded p-1 transition-colors min-h-[80px] ${
                hasAvail ? "bg-green-50 border-green-300" : "bg-gray-50 border-gray-200"
              }`}>
                <div className="font-semibold text-xs text-center cursor-pointer hover:text-blue-600 mb-1" onClick={() => toggleAllSlots(d.date)}>{d.day}</div>
                <div className="flex flex-col gap-0.5">
                  {dynSlots.map(slot => {
                    const isOn = avail.includes(slot);
                    return (
                      <button key={slot} onClick={() => toggleAvailability(d.date, slot)}
                        className={`text-[9px] leading-tight px-0.5 py-0.5 rounded transition-colors truncate ${
                          isOn ? "bg-green-500 text-white font-semibold" : "bg-gray-200 text-gray-500 hover:bg-gray-300"
                        }`}>{slot}</button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
        <div className="text-center text-xs text-gray-500 mt-3">
          💡 แตะช่วงเวลาเพื่อเลือกทีละช่วง หรือแตะเลขวันที่เพื่อเลือก/ยกเลิกทั้งวัน
        </div>
      </div>

      <div className="bg-white rounded-xl border border-blue-100 p-6">
        <h2 className="font-bold text-lg text-blue-800 mb-4">สรุปความว่าง</h2>
        <div className="space-y-3">
          {instructors.map(inst => {
            const instAvail = instructorAvail.filter(a => a.instructor === inst);
            const dateCount = new Set(instAvail.map(a => a.date)).size;
            return (
              <div key={inst} className="border border-blue-100 rounded-lg p-4 bg-blue-50">
                <div className="font-semibold text-gray-800 mb-2">{inst}</div>
                <div className="text-sm text-gray-600">
                  {dateCount === 0 ? (
                    <span>ยังไม่ลงเวลาว่าง</span>
                  ) : (
                    <span>ลงเวลาว่าง {dateCount} วัน ({instAvail.length} ช่องเวลา)</span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── Promo Code Manager ───
function PromoCodeManager({ promoCodes, savePromoCodes, staff }) {
  const [discountAmount, setDiscountAmount] = useState("");
  const [discountUnit, setDiscountUnit] = useState("percent"); // percent | baht | free
  const [codeType, setCodeType] = useState("SALE");
  const [createdBy, setCreatedBy] = useState(staff[0] || window.JIA_AUTH_USER?.name || "");
  const [bookingUrl, setBookingUrl] = useState(() => localStorage.getItem("jia_booking_url") || "https://jiacpr-arch.github.io/jia-course/jia-booking.html");
  const [copied, setCopied] = useState(null);
  const [showQR, setShowQR] = useState(null);
  const [filterType, setFilterType] = useState("all");

  // v2: role check — sales สร้างได้เลย, admin ก็ได้
  const userRole = window.JIA_AUTH_USER?.role || 'admin';

  const handleGenerateCode = () => {
    let finalDiscount;
    if (discountUnit === 'free') {
      finalDiscount = 100; // 100% = ฟรี
    } else {
      if (!discountAmount || Number(discountAmount) <= 0) return;
      finalDiscount = Number(discountAmount);
    }
    const prefix = codeType === "JIA" ? "JIA-" : "SALE-";
    const code = prefix + randCode();
    const newCode = {
      id: uid(),
      code,
      type: codeType,
      discount: finalDiscount,
      discountUnit: discountUnit, // percent | baht | free
      createdBy: createdBy || window.JIA_AUTH_USER?.name || 'unknown',
      staffName: createdBy || window.JIA_AUTH_USER?.name || 'unknown',
      createdDate: today(),
      createdAt: today(),
      used: false,
      usedBy: "",
    };
    savePromoCodes([...promoCodes, newCode]);
    setDiscountAmount("");
  };

  const handleDeleteCode = (id) => {
    savePromoCodes(promoCodes.filter(c => c.id !== id));
  };

  const getBookingLink = (code) => bookingUrl + "?code=" + encodeURIComponent(code);
  const getQRUrl = (code) => "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + encodeURIComponent(getBookingLink(code));

  const copyLink = (code) => {
    navigator.clipboard.writeText(getBookingLink(code)).then(() => {
      setCopied(code);
      setTimeout(() => setCopied(null), 2000);
    }).catch(e => console.warn('Clipboard write failed:', e.message));
  };

  const copyCode = (code) => {
    navigator.clipboard.writeText(code).then(() => {
      setCopied(code + "-text");
      setTimeout(() => setCopied(null), 2000);
    }).catch(e => console.warn('Clipboard write failed:', e.message));
  };

  const saveBookingUrl = (url) => {
    setBookingUrl(url);
    localStorage.setItem("jia_booking_url", url);
  };

  // Payment settings
  const [paySettings, setPaySettings] = useState(() => {
    try { return JSON.parse(localStorage.getItem("jia_payment_settings") || "{}"); } catch(e) { return {}; }
  });
  const getSetting = (key) => paySettings[key] || "";
  const saveSetting = (key, val) => {

// ─── Instructor Schedule ───
function InstructorSchedule({ bookings, instructors }) {
  const instructorStats = useMemo(() => {
    const stats = {};
    instructors.forEach(inst => {
      const instBookings = bookings.filter(b => b.instructor === inst);
      const dateMap = {};
      instBookings.forEach(b => {
        if (b.startDate) {
          dateMap[b.startDate] = (dateMap[b.startDate] || 0) + (Number(b.totalPeople) || 0);
        }
      });
      const totalStudents = Object.values(dateMap).reduce((sum, val) => sum + val, 0);
      const totalEarnings = Object.values(dateMap).reduce((sum, students) => sum + Math.min(students * 250, 1000), 0);
      stats[inst] = {
        dateMap,
        totalStudents,
        totalEarnings,
        bookingCount: instBookings.length,
      };
    });
    return stats;
  }, [bookings, instructors]);

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {instructors.map(inst => {
          const stat = instructorStats[inst];
          const earningStatus = stat.totalEarnings >= 1000 ? "bg-red-100" : stat.totalEarnings >= 500 ? "bg-yellow-100" : "bg-green-100";
          const textStatus = stat.totalEarnings >= 1000 ? "text-red-700" : stat.totalEarnings >= 500 ? "text-yellow-700" : "text-green-700";
          const earningColor = stat.totalEarnings >= 1000 ? "🔴" : stat.totalEarnings >= 500 ? "🟡" : "🟢";

          return (
            <div key={inst} className={`border rounded-xl p-4 ${earningStatus}`}>
              <h3 className={`font-bold text-lg ${textStatus} mb-3`}>{inst} {earningColor}</h3>
              <div className="space-y-2 text-sm mb-4">
                <div className="flex justify-between">
                  <span className="text-gray-600">จำนวนนักเรียน</span>
                  <span className="font-semibold">{stat.totalStudents} คน</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-600">ค่าสอนทั้งหมด</span>
                  <span className="font-semibold">{stat.totalEarnings} บาท</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-600">คอร์สที่สอน</span>
                  <span className="font-semibold">{stat.bookingCount} คอร์ส</span>
                </div>
              </div>

              <div className="border-t pt-3">
                <p className="text-xs font-semibold text-gray-700 mb-2">ตารางวันเวลา:</p>
                <div className="space-y-1 max-h-40 overflow-y-auto">
                  {Object.keys(stat.dateMap).length === 0 ? (
                    <p className="text-xs text-gray-500">ยังไม่มีตารางสอน</p>
                  ) : (
                    Object.entries(stat.dateMap).map(([date, students]) => (
                      <div key={date} className="text-xs bg-white bg-opacity-50 px-2 py-1 rounded">
                        <span className="font-medium">{new Date(date).toLocaleDateString("th-TH")}</span>
                        <span className="text-gray-600"> ({students} คน)</span>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="bg-white rounded-xl border border-blue-100 p-5">
        <h2 className="font-bold text-lg text-blue-800 mb-4">สรุปทั่วไป</h2>
        <div className="space-y-2 text-sm">
          {instructors.map(inst => (
            <div key={inst} className="flex justify-between items-center py-2 border-b last:border-b-0">
              <span className="font-medium text-gray-800">{inst}</span>
              <div className="text-right">
                <div className="font-semibold text-gray-800">{instructorStats[inst].totalEarnings} บาท</div>
                <div className="text-xs text-gray-500">{instructorStats[inst].totalStudents} นักเรียน</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── User Manager (Admin Only) ───
function UserManager() {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [resetUser, setResetUser] = useState(null);
  const [newPin, setNewPin] = useState('');
  const [inviteRole, setInviteRole] = useState('sales');
  const [inviteCode, setInviteCode] = useState('');

  useEffect(() => {
    jiaApiGet('getAllData', { username: window.JIA_AUTH_USER?.username }).then(data => {
      if (data && data.users) setUsers(data.users);
      setLoading(false);
    }).catch(() => setLoading(false));
  }, []);

  const handleResetPin = async () => {
    if (!resetUser || newPin.length < 4) { alert('PIN ต้องมีอย่างน้อย 4 หลัก'); return; }
    // SHA-256 hash
    const encoder = new TextEncoder();
    const data = encoder.encode(newPin);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    const result = await jiaApiGet('resetPassword', { adminUser: window.JIA_AUTH_USER?.username, targetUser: resetUser, newPassword: hash });
    if (result && result.success) {
      showToast('✅ รีเซ็ตรหัสผ่านสำเร็จ');
      setResetUser(null); setNewPin('');
    } else {
      showToast('❌ ' + (result?.error || 'ไม่สำเร็จ'), true);
    }
  };

  const handleGenCode = async () => {
    const result = await jiaApiGet('genCode', { role: inviteRole, username: window.JIA_AUTH_USER?.username });
    if (result && result.code) {
      setInviteCode(result.code);
      showToast('✅ สร้างรหัสเชิญสำเร็จ');
    } else {
      showToast('❌ ' + (result?.error || 'ไม่สำเร็จ'), true);
    }
  };

  const handleDeleteUser = async (username) => {
    if (!confirm('ลบผู้ใช้ ' + username + ' จริงหรือไม่?')) return;
    const result = await jiaApiGet('deleteRow', { sheet: 'users', key: username, keyCol: 'username', username: window.JIA_AUTH_USER?.username });
    if (result && result.success) {
      setUsers(users.filter(u => u.username !== username));
      showToast('✅ ลบผู้ใช้แล้ว');
    } else {
      showToast('❌ ' + (result?.error || 'ไม่สำเร็จ'), true);
    }
  };

  if (loading) return <div className="text-center py-12 text-gray-500">กำลังโหลด...</div>;

  const roleColors = { admin: 'bg-red-100 text-red-700', sales: 'bg-blue-100 text-blue-700', instructor: 'bg-green-100 text-green-700' };

  return (
    <div className="space-y-6">
      <h2 className="text-xl font-bold text-blue-800">👥 จัดการผู้ใช้งาน</h2>

      {/* User List */}
      <div className="bg-white rounded-xl border overflow-hidden">
        <div className="px-4 py-3 bg-gray-50 border-b font-semibold text-sm">ผู้ใช้ทั้งหมด ({users.length})</div>
        <div className="divide-y max-h-96 overflow-y-auto">
          {users.map(u => (
            <div key={u.username} className="px-4 py-3 flex justify-between items-center">
              <div>
                <div className="font-medium text-sm">{u.name}</div>
                <div className="text-xs text-gray-400">@{u.username} · เข้าล่าสุด: {u.lastLogin ? fmt(u.lastLogin) : '-'}</div>
              </div>
              <div className="flex items-center gap-2">
                <span className={`text-xs px-2 py-1 rounded-full font-medium ${roleColors[u.role] || 'bg-gray-100'}`}>{u.role}</span>
                <button onClick={() => { setResetUser(u.username); setNewPin(''); }}
                  className="text-xs bg-yellow-100 text-yellow-700 px-2 py-1 rounded-lg hover:bg-yellow-200">🔑 Reset</button>
                {u.role !== 'admin' && (
                  <button onClick={() => handleDeleteUser(u.username)}
                    className="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-lg hover:bg-red-200">🗑️</button>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Reset PIN Modal */}
      {resetUser && (
        <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-4">
          <h3 className="font-semibold text-sm mb-3">🔑 รีเซ็ตรหัสผ่าน: @{resetUser}</h3>
          <div className="flex gap-2">
            <input type="text" value={newPin} onChange={e => setNewPin(e.target.value)} placeholder="PIN ใหม่ (4+ หลัก)"
              className="flex-1 border rounded-lg px-3 py-2 text-sm input-focus" maxLength={20} />
            <button onClick={handleResetPin} className="bg-yellow-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-yellow-600">ยืนยัน</button>
            <button onClick={() => setResetUser(null)} className="bg-gray-200 px-3 py-2 rounded-lg text-sm">ยกเลิก</button>
          </div>
        </div>
      )}

      {/* Generate Invite Code */}
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
        <h3 className="font-semibold text-sm mb-3">📨 สร้างรหัสเชิญผู้ใช้ใหม่</h3>
        <div className="flex gap-2 items-center">
          <select value={inviteRole} onChange={e => setInviteRole(e.target.value)}
            className="border rounded-lg px-3 py-2 text-sm bg-white">
            <option value="sales">Sales</option>
            <option value="instructor">Instructor</option>
            <option value="admin">Admin</option>
          </select>
          <button onClick={handleGenCode} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">สร้างรหัส</button>
        </div>
        {inviteCode && (
          <div className="mt-3 bg-white rounded-lg p-3 flex justify-between items-center">
            <code className="text-lg font-bold text-blue-700">{inviteCode}</code>
            <button onClick={() => { navigator.clipboard.writeText(inviteCode); showToast('📋 คัดลอกแล้ว'); }}
              className="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-lg">คัดลอก</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Course Settings ───
function CourseSettings({ courses, saveCourses, staff, saveStaff, instructors, saveInstructors, enrolled }) {
  const [editMode, setEditMode] = useState(null);
  const [newCourse, setNewCourse] = useState("");
  const [newStaff, setNewStaff] = useState("");
  const [newInstructor, setNewInstructor] = useState("");

  const handleAddCourse = () => {
    if (!newCourse.trim()) return;
    const nc = {
      key: newCourse.replace(/[^a-zA-Z0-9]/g, "").substring(0, 20) || "c" + Date.now(),
      label: newCourse,
      range: "",
      max: 15,
      color: "bg-gray-100 text-gray-700",
      price: 0,
      discountPrice: 0,
      onlineBooking: false,
      hasPackages: false,
      flexPrice: 600,
      fixedPrice: 500,
      description: "",
      timeSlots: [...TIME_SLOTS],
      requiredLevel: 1,
    };
    saveCourses([...courses, nc]);
    setNewCourse("");
  };

  const handleRemoveCourse = (key) => {
    saveCourses(courses.filter(c => c.key !== key));
  };

  const handleAddStaff = () => {
    if (!newStaff.trim()) return;
    if (!staff.includes(newStaff)) saveStaff([...staff, newStaff]);
    setNewStaff("");
  };

  const handleRemoveStaff = (name) => {
    saveStaff(staff.filter(s => s !== name));
  };

  const [newInstructorLevel, setNewInstructorLevel] = useState(1);

  const getInstName = (i) => typeof i === 'object' ? i.name : i;

  const handleAddInstructor = () => {
    if (!newInstructor.trim()) return;
    const exists = instructors.some(i => getInstName(i) === newInstructor.trim());
    if (!exists) {
      saveInstructors([...instructors, { id: 'inst_' + Date.now(), name: newInstructor.trim(), level: parseInt(newInstructorLevel) || 1 }]);
    }
    setNewInstructor("");
    setNewInstructorLevel(1);
  };

  const handleRemoveInstructor = (name) => {
    saveInstructors(instructors.filter(i => getInstName(i) !== name));
  };

  const handleChangeInstructorLevel = (name, newLevel) => {
    saveInstructors(instructors.map(i => {
      const n = getInstName(i);
      if (n === name) return typeof i === 'object' ? { ...i, level: parseInt(newLevel) } : { id: 'inst_' + Date.now(), name: n, level: parseInt(newLevel) };
      return i;
    }));
  };

  return (
    <div className="space-y-6">
      <div className="bg-white rounded-xl border border-blue-100 p-6">
        <h2 className="font-bold text-lg text-blue-800 mb-4">⚙️ คอร์สเรียน</h2>
        <div className="space-y-3">
          {courses.map(c => {
            const enrolled_count = enrolled[c.key] || 0;
            return (
              <div key={c.key} className={`border rounded-lg p-4 ${editMode === c.key ? "bg-blue-50 border-blue-300" : "bg-gray-50 border-gray-200"}`}>
                <div className="flex justify-between items-start mb-2">
                  <div>
                    <h3 className="font-semibold text-gray-800">{c.label}</h3>
                    <div className="flex flex-wrap gap-1 items-center mt-0.5">
                      <p className="text-xs text-gray-500">{enrolled_count}/{c.max} นักเรียน</p>
                      {c.durationHours && <span className="text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded font-medium">{c.totalDays > 1 ? c.totalDays + " วัน × " : ""}{c.durationHours} ชม.</span>}
                      <span className="text-xs bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-medium">{INSTRUCTOR_LEVELS.find(l=>l.value===(parseInt(c.requiredLevel)||1))?.badge} Level {c.requiredLevel || 1}</span>
                      {c.onlineBooking && <span className="text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded font-medium">เปิดจองออนไลน์</span>}
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => setEditMode(editMode === c.key ? null : c.key)} className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded hover:bg-blue-200">
                      {editMode === c.key ? "ปิด" : "แก้"}
                    </button>
                    {c.max < 999 && (
                      <button onClick={() => handleRemoveCourse(c.key)} className="text-xs bg-red-100 text-red-700 px-2 py-1 rounded hover:bg-red-200">
                        ลบ
                      </button>
                    )}
                  </div>
                </div>
                {editMode === c.key && (
                  <div className="space-y-2 mt-3 pt-3 border-t">
                    <input type="text" value={c.label} onChange={(e) => saveCourses(courses.map(x => x.key === c.key ? { ...x, label: e.target.value } : x))}
                      className="w-full border border-blue-200 bg-white rounded px-2 py-1 text-sm" placeholder="ชื่อคอร์ส" />
                    <input type="text" value={c.description || ""} onChange={(e) => saveCourses(courses.map(x => x.key === c.key ? { ...x, description: e.target.value } : x))}
                      className="w-full border border-blue-200 bg-white rounded px-2 py-1 text-sm" placeholder="รายละเอียด (แสดงในหน้าจอง)" />
                    <input type="number" value={c.max} onChange={(e) => saveCourses(courses.map(x => x.key === c.key ? { ...x, max: Number(e.target.value) } : x))}
                      className="w-full border border-blue-200 bg-white rounded px-2 py-1 text-sm" placeholder="จำนวนคนสูงสุด" min="1" />

                    {/* v2: ระดับผู้สอนที่ต้องการ */}
                    <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
                      <label className="text-xs font-semibold text-amber-700 block mb-1">ระดับผู้สอนที่ต้องการ</label>
                      <div className="flex gap-1">
                        {INSTRUCTOR_LEVELS.map(l => (
                          <button key={l.value} onClick={() => saveCourses(courses.map(x => x.key === c.key ? { ...x, requiredLevel: l.value } : x))}
                            className={'text-xs px-3 py-1.5 rounded-lg font-medium ' + ((parseInt(c.requiredLevel) || 1) === l.value ? 'bg-amber-600 text-white' : 'bg-white border border-amber-200 text-gray-700 hover:bg-amber-100')}>
                            {l.badge} Lv.{l.value}
                          </button>
                        ))}
                      </div>
                      <p className="text-xs text-gray-500 mt-1">ผู้สอนที่มีระดับ ≥ ค่านี้จะสอนคอร์สนี้ได้</p>
                    </div>

                    {/* ระยะเวลาเรียน + รอบเวลา */}
                    <div className="bg-purple-50 border border-purple-200 rounded-lg p-3 space-y-3">
                      <label className="text-xs font-semibold text-purple-700">ระยะเวลา & รอบเวลาเรียน</label>

                      {/* จำนวนวันเรียน */}
                      <div>
                        <label className="text-xs text-gray-600 block mb-1">จำนวนวันเรียน</label>
                        <div className="flex flex-wrap gap-1">
                          {[1, 2, 3, 4, 5].map(d => (
                            <button key={d} onClick={() => saveCourses(courses.map(x => x.key === c.key ? { ...x, totalDays: d } : x))}
                              className={`text-xs px-3 py-1.5 rounded-lg font-medium transition-colors ${
                                (c.totalDays || 1) === d
                                  ? "bg-purple-600 text-white"
                                  : "bg-white border border-purple-200 text-gray-700 hover:bg-purple-100"
                              }`}>
                              {d} วัน
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* ระยะเวลาต่อวัน */}
                      <div>
                        <label className="text-xs text-gray-600 block mb-1">ระยะเวลาต่อวัน</label>
                        <div className="flex flex-wrap gap-1">
                          {[1, 1.5, 2, 2.5, 3, 4, 5, 6].map(h => (
                            <button key={h} onClick={() => saveCourses(courses.map(x => x.key === c.key ? { ...x, durationHours: h } : x))}
                              className={`text-xs px-3 py-1.5 rounded-lg font-medium transition-colors ${
                                (c.durationHours || 2) === h
                                  ? "bg-purple-600 text-white"
                                  : "bg-white border border-purple-200 text-gray-700 hover:bg-purple-100"
                              }`}>
                              {h} ชม.
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* รอบเวลาที่มี */}
                      <div>
                        <label className="text-xs text-gray-600 block mb-1">รอบเวลา ({(c.timeSlots || TIME_SLOTS).length} รอบ)</label>
                        <div className="flex flex-wrap gap-1 mb-2">
                          {(c.timeSlots || TIME_SLOTS).map((slot, si) => {
                            const parts = slot.split("-");
                            const duration = c.durationHours || 2;
                            return (
                              <div key={si} className="flex items-center gap-1 bg-white border border-purple-200 rounded-lg px-2 py-1.5">
                                <span className="text-xs font-medium text-purple-700">{slot}</span>
                                <span className="text-xs text-gray-400">({duration} ชม.)</span>
                                <button onClick={() => {
                                  const current = c.timeSlots || [...TIME_SLOTS];
                                  saveCourses(courses.map(x => x.key === c.key ? { ...x, timeSlots: current.filter((_, i) => i !== si) } : x));
                                }} className="text-red-400 hover:text-red-600 text-xs font-bold ml-1">✕</button>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* เพิ่มรอบใหม่ */}
                      <div>
                        <label className="text-xs text-gray-600 block mb-1">เพิ่มรอบใหม่ — เลือกเวลาเริ่ม (จบอัตโนมัติตามระยะเวลา)</label>
                        <div className="flex gap-1 items-center">
                          <select id={"ts-hour-" + c.key}
                            className="border border-purple-200 bg-white rounded px-2 py-1.5 text-xs flex-1">
                            {Array.from({length: 14}, (_, i) => i + 7).map(h => (
                              <option key={h} value={h}>{String(h).padStart(2, "0")}:00</option>
                            ))}
                          </select>
                          <select id={"ts-min-" + c.key}
                            className="border border-purple-200 bg-white rounded px-2 py-1.5 text-xs">
                            <option value="00">:00</option>
                            <option value="30">:30</option>
                          </select>
                          <span className="text-xs text-gray-500">→</span>
                          <span className="text-xs font-medium text-purple-600" id={"ts-preview-" + c.key}>
                            +{c.durationHours || 2} ชม.
                          </span>
                          <button onClick={() => {
                            const hr = Number(document.getElementById("ts-hour-" + c.key)?.value || 9);
                            const mn = document.getElementById("ts-min-" + c.key)?.value || "00";
                            const dur = c.durationHours || 2;
                            const startMin = hr * 60 + Number(mn);
                            const endMin = startMin + dur * 60;
                            const endHr = Math.floor(endMin / 60);
                            const endMn = endMin % 60;
                            const startStr = String(hr).padStart(2, "0") + ":" + mn;
                            const endStr = String(endHr).padStart(2, "0") + ":" + String(endMn).padStart(2, "0");
                            const newSlot = startStr + "-" + endStr;
                            const current = c.timeSlots || [...TIME_SLOTS];
                            if (!current.includes(newSlot)) {
                              saveCourses(courses.map(x => x.key === c.key ? { ...x, timeSlots: [...current, newSlot].sort() } : x));
                            }
                          }} className="text-xs bg-purple-600 text-white px-3 py-1.5 rounded-lg hover:bg-purple-700 font-semibold">
                            + เพิ่มรอบ
                          </button>
                        </div>
                      </div>

                      <p className="text-xs text-gray-400">ตัวอย่าง: คลาส 2 ชม. เริ่ม 09:00 → รอบ 09:00-11:00</p>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <input type="number" value={c.price} onChange={(e) => saveCourses(courses.map(x => x.key === c.key ? { ...x, price: Number(e.target.value) } : x))}
                        className="w-full border border-blue-200 bg-white rounded px-2 py-1 text-sm" placeholder="ราคาเต็ม" min="0" />
                      <input type="number" value={c.discountPrice} onChange={(e) => saveCourses(courses.map(x => x.key === c.key ? { ...x, discountPrice: Number(e.target.value) } : x))}
                        className="w-full border border-blue-200 bg-white rounded px-2 py-1 text-sm" placeholder="ราคาส่วนลด" min="0" />
                    </div>

                    {/* เปิดจองออนไลน์ */}
                    <div className="bg-green-50 border border-green-200 rounded-lg p-3 space-y-2">
                      <label className="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" checked={!!c.onlineBooking}
                          onChange={(e) => saveCourses(courses.map(x => x.key === c.key ? { ...x, onlineBooking: e.target.checked } : x))}
                          className="w-4 h-4 accent-green-600" />
                        <span className="text-sm font-semibold text-green-700">เปิดจองออนไลน์ (แสดงในหน้าจองลูกค้า)</span>
                      </label>

                      {c.onlineBooking && (
                        <div className="space-y-2 ml-6">
                          <label className="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" checked={!!c.hasPackages}
                              onChange={(e) => saveCourses(courses.map(x => x.key === c.key ? { ...x, hasPackages: e.target.checked } : x))}
                              className="w-4 h-4 accent-blue-600" />
                            <span className="text-xs font-medium text-gray-700">มีแพ็กเกจ Flex/Fixed (ถ้าไม่ติ๊ก ใช้ราคาเต็ม/ส่วนลด)</span>
                          </label>
                          {c.hasPackages && (
                            <div className="grid grid-cols-2 gap-2">
                              <div>
                                <label className="text-xs text-gray-600">Flex (เลื่อนได้ไม่จำกัด)</label>
                                <input type="number" value={c.flexPrice || 600} onChange={(e) => saveCourses(courses.map(x => x.key === c.key ? { ...x, flexPrice: Number(e.target.value) } : x))}
                                  className="w-full border border-blue-200 bg-white rounded px-2 py-1 text-sm" min="0" />
                              </div>
                              <div>
                                <label className="text-xs text-gray-600">Fixed (เลื่อนได้ 1 ครั้ง)</label>
                                <input type="number" value={c.fixedPrice || 500} onChange={(e) => saveCourses(courses.map(x => x.key === c.key ? { ...x, fixedPrice: Number(e.target.value) } : x))}
                                  className="w-full border border-blue-200 bg-white rounded px-2 py-1 text-sm" min="0" />
                              </div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div className="mt-4 p-4 bg-blue-50 border border-blue-200 rounded-lg space-y-2">
          <input type="text" value={newCourse} onChange={(e) => setNewCourse(e.target.value)} placeholder="ชื่อคอร์สใหม่"
            className="w-full border border-blue-200 bg-white rounded px-3 py-2 text-sm" onKeyPress={(e) => e.key === "Enter" && handleAddCourse()} />
          <button onClick={handleAddCourse} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors">
            + เพิ่มคอร์สใหม่
          </button>
        </div>
      </div>

      <div className="bg-white rounded-xl border border-blue-100 p-6">
        <h2 className="font-bold text-lg text-blue-800 mb-4">👥 เซลล์ + ค่าคอมมิชชั่น</h2>
        <p className="text-xs text-gray-500 mb-3">ตั้งค่าคอม % ต่อการจองแต่ละครั้ง (คิดจากราคาสุทธิ)</p>
        <div className="space-y-2 mb-4">
          {staff.map(s => {
            const commissions = JSON.parse(localStorage.getItem('jia_staff_commissions') || '{}');
            const comm = commissions[s] || '';
            return (
              <div key={s} className="flex justify-between items-center bg-gray-50 border border-gray-200 rounded-lg p-3 gap-3">
                <span className="font-medium text-gray-800 flex-1">{s}</span>
                <div className="flex items-center gap-1">
                  <input type="number" value={comm} onChange={(e) => {
                    const c = JSON.parse(localStorage.getItem('jia_staff_commissions') || '{}');
                    c[s] = e.target.value;
                    localStorage.setItem('jia_staff_commissions', JSON.stringify(c));
                    // force re-render
                    saveStaff([...staff]);
                  }} placeholder="0" min="0" max="100" step="1"
                    className="w-16 border border-blue-200 bg-white rounded px-2 py-1 text-sm text-center" />
                  <span className="text-sm text-gray-500">%</span>
                </div>
                <button onClick={() => handleRemoveStaff(s)} className="text-xs bg-red-100 text-red-700 px-2 py-1 rounded hover:bg-red-200">
                  ลบ
                </button>
              </div>
            );
          })}
        </div>
        <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg space-y-2">
          <input type="text" value={newStaff} onChange={(e) => setNewStaff(e.target.value)} placeholder="ชื่อเซลล์ใหม่"
            className="w-full border border-blue-200 bg-white rounded px-3 py-2 text-sm" onKeyPress={(e) => e.key === "Enter" && handleAddStaff()} />
          <button onClick={handleAddStaff} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors">
            + เพิ่มเซลล์ใหม่
          </button>
        </div>
      </div>

      <div className="bg-white rounded-xl border border-blue-100 p-6">
        <h2 className="font-bold text-lg text-blue-800 mb-4">🎓 ผู้สอน + ระดับ</h2>
        <div className="text-xs text-gray-500 mb-3">🥉 Level 1 = Basic &nbsp; 🥈 Level 2 = Intermediate &nbsp; 🥇 Level 3 = Advanced</div>
        <div className="space-y-2 mb-4">
          {instructors.map(i => {
            const name = getInstName(i);
            const level = typeof i === 'object' ? (parseInt(i.level) || 1) : 1;
            const badge = INSTRUCTOR_LEVELS.find(l => l.value === level)?.badge || '🥉';
            return (
              <div key={name} className="flex justify-between items-center bg-gray-50 border border-gray-200 rounded-lg p-3">
                <div className="flex items-center gap-2">
                  <span className="text-lg">{badge}</span>
                  <span className="font-medium text-gray-800">{name}</span>
                </div>
                <div className="flex items-center gap-2">
                  <select value={level} onChange={e => handleChangeInstructorLevel(name, e.target.value)}
                    className="text-xs border rounded px-2 py-1 bg-white">
                    {INSTRUCTOR_LEVELS.map(l => <option key={l.value} value={l.value}>{l.badge} {l.label}</option>)}
                  </select>
                  <button onClick={() => handleRemoveInstructor(name)} className="text-xs bg-red-100 text-red-700 px-2 py-1 rounded hover:bg-red-200">
                    ลบ
                  </button>
                </div>
              </div>
            );
          })}
        </div>
        <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg space-y-2">
          <div className="flex gap-2">
            <input type="text" value={newInstructor} onChange={(e) => setNewInstructor(e.target.value)} placeholder="ชื่อผู้สอนใหม่"
              className="flex-1 border border-blue-200 bg-white rounded px-3 py-2 text-sm" onKeyPress={(e) => e.key === "Enter" && handleAddInstructor()} />
            <select value={newInstructorLevel} onChange={e => setNewInstructorLevel(e.target.value)}
              className="border border-blue-200 bg-white rounded px-2 py-2 text-sm">
              {INSTRUCTOR_LEVELS.map(l => <option key={l.value} value={l.value}>{l.badge} Lv.{l.value}</option>)}

          </div>
          <button onClick={handleAddInstructor} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors">
            + เพิ่มผู้สอนใหม่
          </button>
        </div>
      </div>
    </div>
  );
}

<script>
// ── Service Worker + Offline + Auto-refresh ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW reg failed:', e));
}
window.addEventListener('offline', () => {
  if (!document.getElementById('jia-offline')) {
    const b = document.createElement('div'); b.id = 'jia-offline';
    b.innerHTML = '📡 ออฟไลน์ — ใช้ข้อมูลในเครื่อง';
    b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#f59e0b;color:#fff;text-align:center;padding:6px;font-size:13px;font-weight:600;';
    document.body.prepend(b);
  }
});
window.addEventListener('online', () => { const b = document.getElementById('jia-offline'); if (b) b.remove(); showToast('✅ กลับมาออนไลน์แล้ว'); });
setInterval(() => {
  if (!navigator.onLine) return;
  const user = JSON.parse(localStorage.getItem('jia_user') || sessionStorage.getItem('jia_user') || 'null');
  if (!user) return;
  jiaApiGet('getAllData', { username: user.username }).then(data => {
    if (!data || data.error) return;
    Object.keys(data).forEach(k => {
      if (Array.isArray(data[k])) localStorage.setItem('jia_' + k, JSON.stringify(data[k]));
    });
    console.log('🔄 Auto-refresh done:', new Date().toLocaleTimeString());
  }).catch(() => {});
}, 5 * 60 * 1000);
</script>
