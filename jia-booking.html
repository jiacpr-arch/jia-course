<body>
    <div id="root"></div>

    <!-- ═══ API Bridge: โหลดข้อมูลจาก Google Sheets ═══ -->
    <script>
    // ★★★ CONFIG — API functions provided by jia-supabase-api.js ★★★
    const JIA_API_URL = true; // Supabase API is active (legacy GAS compatibility flag)

    // ─── แปลง instructor_avail rows → map ที่หน้าจองใช้ ───
    function convertAvailToMap(rows) {
        const map = {};
        rows.forEach(r => {
            // แปลง ISO date (2026-03-19T17:00:00.000Z) → YYYY-MM-DD (2026-03-20)
            let dateKey = r.date;
            if (dateKey && dateKey.includes('T')) {
                const d = new Date(dateKey);
                // ใช้ local date (ไม่ใช่ UTC) เพราะ Google Sheet เก็บเป็น UTC-7
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                dateKey = `${year}-${month}-${day}`;
            }
            if (!map[dateKey]) map[dateKey] = [];
            if (!map[dateKey].includes(r.timeSlot)) map[dateKey].push(r.timeSlot);
        });
        return map;
    }

    // ─── โหลดข้อมูลจาก API → เก็บใน localStorage ───
    window.JIA_DATA_READY = (async function() {
        if (!JIA_API_URL) {
            console.log('⚠️ JIA_API_URL ไม่ได้ตั้งค่า — ใช้ localStorage เดิม (offline mode)');
            return true;
        }
        try {
            console.log('📡 กำลังโหลดข้อมูลจาก API...');
            const [courses, avail, bookings, promoCodes, settings, classes, classInstructors] = await Promise.all([
                jiaApiGet('getData', { sheet: 'courses' }),
                jiaApiGet('getData', { sheet: 'instructor_avail' }),
                jiaApiGet('getData', { sheet: 'bookings' }),
                jiaApiGet('getData', { sheet: 'promo_codes' }),
                jiaApiGet('getData', { sheet: 'settings' }),
                jiaApiGet('getData', { sheet: 'classes' }),
                jiaApiGet('getData', { sheet: 'class_instructors' })
            ]);

            if (Array.isArray(courses)) {
                // แปลง timeSlots string → array ถ้าจำเป็น
                courses.forEach(c => {
                    if (typeof c.timeSlots === 'string') {
                        try { c.timeSlots = JSON.parse(c.timeSlots); } catch(e) {}
                    }
                    if (typeof c.onlineBooking === 'string') c.onlineBooking = c.onlineBooking === 'true' || c.onlineBooking === true;
                    if (typeof c.hasPackages === 'string') c.hasPackages = c.hasPackages === 'true' || c.hasPackages === true;
                    if (typeof c.price === 'string') c.price = Number(c.price);
                    if (typeof c.discountPrice === 'string') c.discountPrice = Number(c.discountPrice);
                    if (typeof c.flexPrice === 'string') c.flexPrice = Number(c.flexPrice);
                    if (typeof c.fixedPrice === 'string') c.fixedPrice = Number(c.fixedPrice);
                    if (typeof c.max === 'string') c.max = Number(c.max);
                    if (typeof c.durationHours === 'string') c.durationHours = Number(c.durationHours);
                    if (typeof c.totalDays === 'string') c.totalDays = Number(c.totalDays);
                });
                localStorage.setItem('jia_courses', JSON.stringify(courses));
            }

            if (Array.isArray(avail)) {
                localStorage.setItem('jia_instructor_avail', JSON.stringify(convertAvailToMap(avail)));
            }

            if (Array.isArray(bookings)) {
                localStorage.setItem('jia_bookings', JSON.stringify(bookings));
            }

            if (Array.isArray(promoCodes)) {
                // แปลง array → object map ที่หน้าจองใช้ { "SALE-XXX": { discount, used, ... } }
                const promoMap = {};
                promoCodes.forEach(p => {
                    promoMap[p.code] = {
                        discount: Number(p.discount) || 0,
                        discountUnit: p.discountUnit || 'baht',
                        used: p.used === true || p.used === 'true',
                        staffName: p.staffName || '',
                        usedAt: p.usedAt || '',
                        createdAt: p.createdAt || ''
                    };
                });
                localStorage.setItem('jia_promo_codes', JSON.stringify(promoMap));
            }

            if (Array.isArray(settings)) {
                const settingsMap = {};
                settings.forEach(s => { settingsMap[s.key] = s.value; });
                localStorage.setItem('jia_payment_settings', JSON.stringify(settingsMap));
            }

            // v2: classes (คลาสที่ Admin เปิด)
            if (Array.isArray(classes)) {
                localStorage.setItem('jia_classes', JSON.stringify(classes));
            }
            if (Array.isArray(classInstructors)) {
                localStorage.setItem('jia_class_instructors', JSON.stringify(classInstructors));
            }

            console.log('✅ โหลดข้อมูลจาก API สำเร็จ');
            return true;
        } catch(err) {
            console.error('❌ โหลดข้อมูลจาก API ไม่สำเร็จ:', err);
            console.log('⚠️ ใช้ข้อมูลจาก localStorage แทน (offline mode)');
            return false;
        }
    })();

    // ─── ดักจับ localStorage.setItem เพื่อ sync กลับ API ───
    (function() {
        if (!JIA_API_URL) return;
        const _origSetItem = localStorage.setItem.bind(localStorage);
        const SYNC_KEYS = {
            'jia_customers':  'customers',
            'jia_bookings':   'bookings',
            'jia_sessions':   'sessions',
            'jia_promo_codes': 'promo_codes'
        };
        localStorage.setItem = function(key, value) {
            _origSetItem(key, value);
            const sheet = SYNC_KEYS[key];
            if (sheet) {
                let data;
                try { data = JSON.parse(value); } catch(e) { return; }
                // แปลง promo_codes กลับจาก map → array สำหรับ Sheet
                if (key === 'jia_promo_codes' && !Array.isArray(data)) {
                    data = Object.entries(data).map(([code, info]) => ({
                        code, ...info
                    }));
                }
                if (Array.isArray(data)) {
                    jiaApiPost('replaceSheet', { sheet }, data).catch(console.error);
                }
            }
        };
    })();

    // ─── อัพโหลดสลิปไป Google Drive แทนเก็บ base64 ───
    async function uploadSlipToAPI(base64, bookingId) {
        if (!JIA_API_URL) return base64; // offline: คืน base64 เดิม
        try {
            const result = await jiaApiPost('uploadSlip', {}, {
                base64: base64,
                fileName: 'slip-' + bookingId + '.jpg',
                bookingId: bookingId
            });
            if (result && result.url) return result.url;
        } catch(e) {
            console.error('Upload slip failed:', e);
        }
        return base64; // fallback: คืน base64 เดิม
    }
    </script>

    <script src="jia-supabase-api.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Utility functions
        const uid = () => '_' + Math.random().toString(36).substr(2, 9);

        const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
        const getFirstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

        const formatDate = (date) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const thaiDateString = (date) => {
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(date).toLocaleDateString('th-TH', options);
        };

        const thaiMonthYear = (date) => {
            const options = { month: 'long', year: 'numeric' };
            return new Date(date).toLocaleDateString('th-TH', options);
        };

        const TIME_SLOTS = ['11:00-13:00', '14:00-16:00', '17:00-19:00'];

        // Default fallback course if no courses available in localStorage
        const DEFAULT_COURSES = [
            {
                key: 'CPR',
                label: 'CPR',
                description: 'สอนปฐมพยาบาลเบื้องต้น',
                onlineBooking: true,
                hasPackages: true,
                flexPrice: 600,
                fixedPrice: 500
            }
        ];

        // Function to get courses from localStorage or fallback
        const getCourses = () => {
            try {
                const coursesData = localStorage.getItem('jia_courses');
                if (coursesData) {
                    const courses = JSON.parse(coursesData).filter(c => c.onlineBooking === true);
                    if (courses.length > 0) {
                        return courses;
                    }
                }
            } catch (e) {
                console.error('Failed to parse courses from localStorage', e);
            }
            return DEFAULT_COURSES;
        };

        // PDPA Modal Component
        function PDPAConsent({ onConsent, onCancel }) {
            const [readPolicy, setReadPolicy] = useState(false);
            const [agreeToUse, setAgreeToUse] = useState(false);

            return (

                        <div className="pdpa-subheader">บริษัท เจี๋ยรักษา จำกัด</div>

                        <div className="pdpa-section">
                            <h3>ข้อมูลที่เราเก็บรวบรวม:</h3>

                                <li>เบอร์โทรศัพท์ — เพื่อติดต่อยืนยันการจอง</li>

                                <li>หลักฐานการชำระเงิน (สลิป) — เพื่อตรวจสอบการชำระเงิน</li>
                            </ul>
                        </div>

                        <div className="pdpa-section">
                            <h3>วัตถุประสงค์:</h3>
                            <p>เราเก็บข้อมูลของท่านเพื่อการจัดการจองคลาสเรียนและการชำระเงินเท่านั้น จะไม่นำไปใช้เพื่อวัตถุประสงค์อื่น และจะไม่เปิดเผยต่อบุคคลที่สาม</p>
                        </div>

                        <div className="pdpa-section">
                            <h3>ระยะเวลาเก็บรักษา:</h3>
                            <p>เราจะเก็บรักษาข้อมูลของท่านไม่เกิน 1 ปี หลังจากวันที่เรียนเสร็จ</p>
                        </div>

                        <div className="pdpa-section">
                            <h3>สิทธิ์ของท่าน:</h3>
                            <p>ท่านมีสิทธิ์ในการเข้าถึง แก้ไข ลบ หรือเพิกถอนความยินยอมได้ตลอดเวลา โดยติดต่อ: <a href="https://line.me/R/ti/p/@jiacpr" target="_blank" className="pdpa-link" style={{color:'#06C755'}}>LINE: @jiacpr</a></p>
                        </div>

                        <div className="pdpa-section">
                            <h3>ฐานกฎหมาย:</h3>
                            <p>ความยินยอม (Consent) ตาม พ.ร.บ.คุ้มครองข้อมูลส่วนบุคคล พ.ศ. 2562</p>
                        </div>

                        <div className="pdpa-checkboxes">
                            <div className="pdpa-checkbox">
                                <input
                                    type="checkbox"
                                    id="readPolicy"
                                    checked={readPolicy}
                                    onChange={(e) => setReadPolicy(e.target.checked)}
                                />
                                <label htmlFor="readPolicy">
                                    ☑ ข้าพเจ้าได้อ่านและเข้าใจนโยบายความเป็นส่วนตัวแล้ว
                                </label>
                            </div>

                            <div className="pdpa-checkbox">
                                <input
                                    type="checkbox"
                                    id="agreeToUse"
                                    checked={agreeToUse}
                                    onChange={(e) => setAgreeToUse(e.target.checked)}
                                />
                                <label htmlFor="agreeToUse">
                                    ☑ ข้าพเจ้ายินยอมให้เก็บรวบรวม ใช้ และเปิดเผยข้อมูลส่วนบุคคลตามที่ระบุข้างต้น
                                </label>
                            </div>

                            <div className="checkbox-status">
                                {readPolicy && agreeToUse ? (
                                    <span style={{ color: '#28a745' }}>✓ พร้อมดำเนินการต่อ</span>
                                ) : (
                                    <span>กรุณาติ๊กถูกสองกล่องข้างต้น</span>
                                )}
                            </div>
                        </div>

                        <div className="pdpa-button-group">
                            <button className="pdpa-button secondary" onClick={onCancel}>
                                ยกเลิก
                            </button>
                            <button
                                className="pdpa-button primary"
                                onClick={() => onConsent()}
                                disabled={!readPolicy || !agreeToUse}
                            >
                                ดำเนินการต่อ
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Wrapper ที่รอ API โหลดเสร็จก่อน mount แอปจริง
        function AppLoader() {
            const [ready, setReady] = useState(!window.JIA_API_URL);
            useEffect(() => {
                if (window.JIA_DATA_READY) {
                    window.JIA_DATA_READY.then(() => setReady(true));
                } else { setReady(true); }
            }, []);
            if (!ready) return (
                <div className="min-h-screen flex items-center justify-center hero-gradient">
                    <div className="text-center text-white">
                        <div className="text-5xl mb-4">🏥</div>
                        <h1 className="text-3xl font-bold mb-2">JIA TRAINER CENTER</h1>
                        <p className="text-red-200 mb-6">CPR / AED / BLS / ACLS Training</p>
                        <div style={{width:32,height:32,border:'3px solid rgba(255,255,255,0.3)',borderTop:'3px solid white',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto'}}></div>
                        <p className="text-red-200 text-sm mt-4">กำลังโหลดข้อมูล...</p>
                    </div>
                </div>
            );
            return <BookingApp />;
        }

        function BookingApp() {
            const [pdpaConsented, setPdpaConsented] = useState(() => {
                return sessionStorage.getItem('jia_pdpa_consented') === 'true';
            });
            const [step, setStep] = useState(1);
            const [selectedCourse, setSelectedCourse] = useState(null);
            const [selectedDate, setSelectedDate] = useState(null);
            const [additionalDates, setAdditionalDates] = useState([]);
            const [selectedTime, setSelectedTime] = useState(null);
            const [selectedPackage, setSelectedPackage] = useState(null);
            const [customerName, setCustomerName] = useState('');
            const [customerPhone, setCustomerPhone] = useState('');
            const [customerEmail, setCustomerEmail] = useState('');
            const [promoCode, setPromoCode] = useState('');
            const [promoFeedback, setPromoFeedback] = useState('');
            const [promoValid, setPromoValid] = useState(false);
            const [discountAmount, setDiscountAmount] = useState(0);
            const [bookingRef, setBookingRef] = useState('');
            const [instructorAvailability, setInstructorAvailability] = useState({});
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [paymentSlip, setPaymentSlip] = useState(null);
            const [paymentSlipPreview, setPaymentSlipPreview] = useState(null);
            const [showPrivacyNotice, setShowPrivacyNotice] = useState(false);
            const [availableCourses, setAvailableCourses] = useState([]);
            const [paymentSettings, setPaymentSettings] = useState({});
            // v2: classes
            const [classes, setClasses] = useState([]);
            const [useClassMode, setUseClassMode] = useState(false); // true = ใช้ class system ใหม่

            useEffect(() => {
                const availData = localStorage.getItem('jia_instructor_avail');
                if (availData) {
                    try {
                        const raw = JSON.parse(availData);
                        console.log('📅 raw instructor_avail:', raw);
                        // แปลง array format → object { date: [timeSlot, ...] }
                        if (Array.isArray(raw)) {
                            const map = {};
                            raw.forEach(a => {
                                if (!a.date || !a.timeSlot) return;
                                if (!map[a.date]) map[a.date] = [];
                                if (!map[a.date].includes(a.timeSlot)) map[a.date].push(a.timeSlot);
                            });
                            console.log('📅 converted availability map:', map);
                            setInstructorAvailability(map);
                        } else {
                            console.log('📅 availability already object:', raw);
                            setInstructorAvailability(raw);
                        }
                    } catch (e) {
                        console.error('Failed to parse instructor availability', e);
                    }
                }

                // Load payment settings
                try {
                    const ps = localStorage.getItem('jia_payment_settings');
                    if (ps) setPaymentSettings(JSON.parse(ps));
                } catch(e) {}

                // v2: Load classes
                try {
                    const cls = JSON.parse(localStorage.getItem('jia_classes') || '[]');
                    if (cls.length > 0) {
                        setClasses(cls);
                        setUseClassMode(true);
                        console.log('📋 Class mode ON —', cls.filter(c => c.status === 'ready').length, 'ready classes');
                    }
                } catch(e) {}

                // Load available courses
                const courses = getCourses();
                setAvailableCourses(courses);

                // Auto-select course if only one is available
                if (courses.length === 1) {
                    setSelectedCourse(courses[0]);
                    setStep(2); // Skip to step 2
                }

                // Read promo code from URL parameter (?code=SALE-XXXXXX)
                const urlParams = new URLSearchParams(window.location.search);
                const urlCode = urlParams.get('code');
                if (urlCode) {
                    setPromoCode(urlCode.toUpperCase());
                    // Trigger validation after a short delay to ensure state is set
                    setTimeout(() => {
                        validatePromoCode(urlCode.toUpperCase());
                    }, 100);
                }
            }, []);

            const handlePDPAConsent = () => {
                sessionStorage.setItem('jia_pdpa_consented', 'true');
                setPdpaConsented(true);
            };

            // v2: ดึง ready classes สำหรับคอร์สที่เลือก
            const getReadyClassesForCourse = (courseKey) => {
                if (!useClassMode) return [];
                return classes.filter(c => c.status === 'ready' && c.courseKey === courseKey);
            };

            const isDateAvailable = (dateStr) => {
                if (useClassMode && selectedCourse) {
                    // v2: ตรวจจาก classes ที่ ready
                    return getReadyClassesForCourse(selectedCourse.key).some(c => c.date === dateStr);
                }
                // fallback: ใช้ instructor availability เดิม
                return instructorAvailability[dateStr] && instructorAvailability[dateStr].length > 0;
            };

            const getAvailableTimeSlotsForDate = (dateStr) => {
                if (useClassMode && selectedCourse) {
                    // v2: ดึง time slots จาก ready classes
                    return getReadyClassesForCourse(selectedCourse.key)
                        .filter(c => c.date === dateStr)
                        .map(c => c.timeSlot);
                }
                // fallback
                const slots = instructorAvailability[dateStr];
                if (!slots) return [];
                const courseSlots = selectedCourse?.timeSlots || TIME_SLOTS;
                return courseSlots.filter(slot => slots.includes(slot));
            };

            // ─── ตรวจสอบโค้ดส่วนลด (ทั้ง JIA- และ SALE-) ───
            const validatePromoCode = (code) => {
                if (!code) return;
                const promoData = localStorage.getItem('jia_promo_codes');
                if (promoData) {
                    try {
                        const promoCodes = JSON.parse(promoData);
                        if (promoCodes[code]) {
                            const codeData = promoCodes[code];
                            if (!codeData.used) {
                                const label = code.startsWith('JIA-') ? 'คูปองคอร์สออนไลน์' : 'โค้ดส่วนลด';
                                const unit = codeData.discountUnit || 'baht';
                                let discAmt = Number(codeData.discount) || 0;
                                let discLabel = '';
                                if (unit === 'free' || discAmt >= 100 && unit === 'percent') {
                                    discLabel = '🎁 ฟรี!';
                                    // จะคำนวณ discount จริงตอน submit
                                    discAmt = 999999; // flag ว่าฟรี
                                } else if (unit === 'percent') {
                                    discLabel = 'ลด ' + discAmt + '%';
                                } else {
                                    discLabel = 'ลด ฿' + discAmt;
                                }
                                setPromoValid(true);
                                setPromoFeedback(`${label} ${discLabel} ✓`);
                                setDiscountAmount(discAmt);
                            } else {
                                setPromoValid(false);
                                setPromoFeedback('โค้ดนี้ถูกใช้แล้ว ✗');
                            }
                            return;
                        }
                    } catch (e) {}
                }
                setPromoValid(false);
                setPromoFeedback('โค้ดไม่ถูกต้อง ✗');
            };

            const handlePromoCodeChange = (code) => {
                setPromoCode(code.toUpperCase());
                setDiscountAmount(0);
                setPromoValid(false);
                setPromoFeedback('');

                if (!code) return;

                if (code.startsWith('JIA-') || code.startsWith('SALE-')) {
                    validatePromoCode(code);
                } else {
                    setPromoValid(false);
                    setPromoFeedback('โค้ดไม่ถูกต้อง ✗');
                }
            };

            const handlePaymentSlipUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setPaymentSlip(reader.result);
                        setPaymentSlipPreview(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleNextStep = () => {
                if (step === 1 && !selectedCourse) {
                    alert('กรุณาเลือกคลาส');
                    return;
                }
                if (step === 2 && (!selectedDate || !selectedTime)) {
                    alert('กรุณาเลือกวันและเวลา');
                    return;
                }
                // Step 3 is conditional: only if course has packages
                const courseHasPackages = selectedCourse && selectedCourse.hasPackages;
                if (step === 3 && courseHasPackages && !selectedPackage) {
                    alert('กรุณาเลือกแพ็กเกจ');
                    return;
                }
                // Adjust step progression based on course packages
                if (step === 3 && !courseHasPackages) {
                    // Skip step 3 entirely, go to step 4 (customer info)
                    setStep(4);
                    return;
                }
                if (step === 4 && (!customerName || !customerPhone)) {
                    alert('กรุณากรอกชื่อและเบอร์โทรศัพท์');
                    return;
                }
                if (step === 5 && !paymentSlip) {
                    alert('กรุณาอัพโหลดหลักฐานการชำระเงิน');
                    return;
                }
                setStep(step + 1);
            };

            const handlePrevStep = () => {
                if (step > 1) {
                    // Handle step 3 special case when skipped
                    if (step === 4 && selectedCourse && !selectedCourse.hasPackages) {
                        setStep(2);
                    } else {
                        setStep(step - 1);
                    }
                }
            };

            const calculateFinalPrice = () => {
                if (!selectedCourse) return 0;

                let basePrice = 0;
                if (selectedCourse.hasPackages) {
                    basePrice = selectedPackage === 'flex' ? selectedCourse.flexPrice : selectedCourse.fixedPrice;
                } else {
                    basePrice = selectedCourse.price || 0;
                }

                return basePrice - discountAmount;
            };

            const finalPrice = calculateFinalPrice();

            const handleSubmitBooking = async () => {
                try {
                    const customerId = uid();
                    const bookingId = uid();

                    // อัพโหลดสลิปไป Google Drive (ถ้ามี API)
                    let slipData = paymentSlip;
                    if (window.JIA_API_URL && paymentSlip) {
                        try {
                            slipData = await uploadSlipToAPI(paymentSlip, bookingId);
                        } catch(e) { console.error('Slip upload error:', e); }
                    }
                    const sessionId = uid();
                    const today = formatDate(new Date());

                    const customer = {
                        id: customerId,
                        name: customerName,
                        tel: customerPhone,
                        email: customerEmail || '',
                        createdAt: today,
                        source: 'online'
                    };

                    let packageName = 'standard';
                    if (selectedCourse.hasPackages) {
                        packageName = selectedPackage;
                    }

                    // Collect all dates for multi-day courses
                    const allDates = [selectedDate, ...additionalDates.filter(d => d)];
                    const totalDays = selectedCourse?.totalDays || 1;

                    const booking = {
                        id: bookingId,
                        customerId,
                        name: customerName,
                        tel: customerPhone,
                        courseType: selectedCourse.key,
                        courseName: selectedCourse.label,
                        classId: (useClassMode && selectedCourse && selectedDate && selectedTime) ?
                            (classes.find(c => c.status === 'ready' && c.courseKey === selectedCourse.key && c.date === selectedDate && c.timeSlot === selectedTime)?.id || '') : '',
                        channel: promoCode.startsWith('SALE-') ? 'ผ่านเซลล์' : promoCode.startsWith('JIA-') ? 'คอร์สออนไลน์' : 'ซื้อเอง (เว็บ)',
                        package: packageName,
                        totalPeople: 1,
                        finalPrice: finalPrice,
                        discountCode: promoCode || '',
                        discountAmount,
                        paymentMode: 'โอนเงิน',
                        paymentSlip: slipData,
                        paymentStatus: 'รอตรวจสอบ',
                        startDate: selectedDate,
                        timeSlot: selectedTime,
                        totalDays: totalDays,
                        additionalDates: totalDays > 1 ? additionalDates.filter(d => d) : [],
                        salesStaff: promoCode.startsWith('SALE-') ? promoCode : 'Online',
                        instructor: '',
                        note: totalDays > 1 ? `จองผ่านเว็บ (${totalDays} วัน)` : 'จองผ่านเว็บ',
                        pdpaConsent: true,
                        pdpaConsentDate: new Date().toISOString(),
                        createdAt: today
                    };

                    // Create sessions — one per day for multi-day courses
                    const sessions = allDates.map((date, idx) => ({
                        id: idx === 0 ? sessionId : uid(),
                        bookingId,
                        customerId,
                        sessionNo: idx + 1,
                        done: false,
                        date: date,
                        sessionTime: selectedTime,
                        place: 'Online',
                        createdAt: today
                    }));

                    // Save to localStorage
                    const existingCustomers = JSON.parse(localStorage.getItem('jia_customers') || '[]');
                    existingCustomers.push(customer);
                    localStorage.setItem('jia_customers', JSON.stringify(existingCustomers));

                    const existingBookings = JSON.parse(localStorage.getItem('jia_bookings') || '[]');
                    existingBookings.push(booking);
                    localStorage.setItem('jia_bookings', JSON.stringify(existingBookings));

                    const existingSessions = JSON.parse(localStorage.getItem('jia_sessions') || '[]');
                    sessions.forEach(s => existingSessions.push(s));
                    localStorage.setItem('jia_sessions', JSON.stringify(existingSessions));

                    // Mark promo code as used (ทั้ง SALE- และ JIA-)
                    if (promoCode.startsWith('SALE-') || promoCode.startsWith('JIA-')) {
                        const promoData = localStorage.getItem('jia_promo_codes');
                        if (promoData) {
                            try {
                                const promoCodes = JSON.parse(promoData);
                                if (promoCodes[promoCode]) {
                                    promoCodes[promoCode].used = true;
                                    promoCodes[promoCode].usedBy = customerName;
                                    promoCodes[promoCode].usedAt = new Date().toISOString();
                                    localStorage.setItem('jia_promo_codes', JSON.stringify(promoCodes));
                                }
                            } catch (e) {}
                        }
                    }

                    // แจ้งเตือนการจองใหม่ทางอีเมล
                    jiaApiPost('notifyBooking', {}, booking).catch(err => console.warn('⚠️ Notify failed:', err));

                    setBookingRef(bookingId);
                    setStep(selectedCourse?.hasPackages ? 6 : 5);
                } catch (error) {
                    console.error('Booking error:', error);
                    alert('เกิดข้อผิดพลาดในการจอง: ' + error.message);
                }
            };

            const handleNewBooking = () => {
                setSelectedCourse(null);
                setSelectedDate(null);
                setSelectedTime(null);
                setAdditionalDates([]);
                setSelectedPackage(null);
                setCustomerName('');
                setCustomerPhone('');
                setCustomerEmail('');
                setPromoCode('');
                setPromoFeedback('');
                setPromoValid(false);
                setDiscountAmount(0);
                setPaymentSlip(null);
                setPaymentSlipPreview(null);
                setShowPrivacyNotice(false);
                setStep(1);
            };

            const renderCalendar = (month) => {
                const daysInMonth = getDaysInMonth(month);
                const firstDay = getFirstDayOfMonth(month);
                const days = [];

                // Previous month days
                const prevMonthDays = getDaysInMonth(new Date(month.getFullYear(), month.getMonth() - 1));
                for (let i = firstDay - 1; i >= 0; i--) {
                    days.push(
                        <div key={`prev-${i}`} className="calendar-day other-month">
                            {prevMonthDays - i}
                        </div>
                    );
                }

                // Current month days
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = formatDate(new Date(month.getFullYear(), month.getMonth(), day));
                    const isAvailable = isDateAvailable(dateStr);
                    const isSelected = selectedDate === dateStr;

                    days.push(
                        <div
                            key={`current-${day}`}
                            className={`calendar-day ${isAvailable ? 'available' : 'unavailable'} ${
                                isSelected ? 'selected' : ''
                            }`}
                            onClick={() => isAvailable && setSelectedDate(dateStr)}
                        >
                            {day}
                        </div>
                    );
                }

                // Next month days
                const remainingDays = 42 - days.length;
                for (let day = 1; day <= remainingDays; day++) {
                    days.push(
                        <div key={`next-${day}`} className="calendar-day other-month">
                            {day}
                        </div>
                    );
                }

                return days;
            };

            // Determine which step to show and progress indicator
            const getProgressSteps = () => {
                const steps = [
                    { num: 1, label: 'เลือกคลาส' },
                    { num: 2, label: 'เลือกวันเรียน' }
                ];

                if (selectedCourse && selectedCourse.hasPackages) {
                    steps.push({ num: 3, label: 'เลือกแพ็กเกจ' });
                    steps.push({ num: 4, label: 'กรอกข้อมูล' });
                    steps.push({ num: 5, label: 'ชำระเงิน' });
                    steps.push({ num: 6, label: 'จองสำเร็จ' });
                } else {
                    steps.push({ num: 3, label: 'กรอกข้อมูล' });
                    steps.push({ num: 4, label: 'ชำระเงิน' });
                    steps.push({ num: 5, label: 'จองสำเร็จ' });
                }

                return steps;
            };

            const progressSteps = getProgressSteps();

            if (!pdpaConsented) {
                return <PDPAConsent onConsent={handlePDPAConsent} onCancel={() => window.close()} />;
            }

            return (
                <div className="min-h-screen" style={{background:'var(--jia-cream)'}}>
                    <header className="hero-gradient text-white sticky top-0 z-100 shadow-lg">
                        <div className="max-w-4xl mx-auto px-4 py-5">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h1 className="text-2xl font-bold">จองคลาสเรียน</h1>
                                    <p className="text-red-200 text-sm">JIA TRAINER CENTER — CPR/AED Training</p>
                                </div>
                                <div className="text-3xl">🏥</div>
                            </div>
                        </div>
                    </header>
                    {/* Trust Badges */}
                    <div className="trust-badges bg-white shadow-sm border-b">
                        <span className="trust-badge">✅ ใบรับรองมาตรฐาน</span>
                        <span className="trust-badge">👨‍⚕️ ผู้สอนมืออาชีพ</span>
                        <span className="trust-badge">🔒 ข้อมูลปลอดภัย</span>
                    </div>

                    <main className="max-w-4xl mx-auto px-4 py-12">
                        {/* Progress Indicator */}
