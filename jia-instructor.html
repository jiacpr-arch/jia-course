        // Schedule Tab
        function ScheduleTab({ instructor }) {
            const [bookings] = useState(() => {
                return JSON.parse(localStorage.getItem('jia_bookings') || '[]');
            });
            const [sessions, setSessions] = useState(() => JSON.parse(localStorage.getItem('jia_sessions') || '[]'));
            const [classes] = useState(() => JSON.parse(localStorage.getItem('jia_classes') || '[]'));
            const [classInstructors] = useState(() => JSON.parse(localStorage.getItem('jia_class_instructors') || '[]'));

            // เช็คชื่อ — toggle session done
            const toggleAttendance = (sessionId) => {
                const next = sessions.map(s => s.id === sessionId ? { ...s, done: !s.done, date: s.done ? '' : new Date().toISOString().slice(0,10) } : s);
                setSessions(next);
                localStorage.setItem('jia_sessions', JSON.stringify(next));
                const s = next.find(x => x.id === sessionId);
                if (window.JIA_API_URL && s) {
                    jiaApiPost('updateRow', { sheet: 'sessions', key: sessionId, keyCol: 'id' }, { done: s.done, date: s.date })
                        .catch(e => console.warn('Session sync failed:', e.message));
                }
                showToast(s?.done ? '✅ เช็คชื่อแล้ว' : '↩️ ยกเลิกเช็คชื่อ');
            };
            const [expandedClass, setExpandedClass] = useState(null);

            // คลาสที่ผมสอน
            const myClassIds = useMemo(() =>
                new Set(classInstructors.filter(ci => ci.instructor === instructor).map(ci => ci.classId)),
                [classInstructors, instructor]
            );
            const myClasses = useMemo(() =>
                classes.filter(c => myClassIds.has(c.id)).sort((a, b) => a.date > b.date ? 1 : -1),
                [classes, myClassIds]
            );

            // จับคู่ bookings กับ class (ผ่าน classId หรือ date+timeSlot+courseType)
            const getStudentsForClass = (cls) => {
                return bookings.filter(b =>
                    b.classId === cls.id ||
                    (b.startDate === cls.date && b.timeSlot === cls.timeSlot && b.courseType === cls.courseKey)
                );
            };

            const myBookings = bookings.filter(b => b.instructor === instructor).sort((a, b) => {
                const dateA = b.startDate || b.date;
                const dateB = a.startDate || a.date;
                return new Date(`${a.startDate || a.date} ${(a.timeSlot||'').split('-')[0]}`) - new Date(`${b.startDate || b.date} ${(b.timeSlot||'').split('-')[0]}`);
            });

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const todayClasses = myClasses.filter(c => {
                const d = new Date(c.date); d.setHours(0,0,0,0);
                return d.getTime() === today.getTime();
            });

            const upcomingClasses = myClasses.filter(c => {
                const d = new Date(c.date); d.setHours(0,0,0,0);
                return d.getTime() >= today.getTime();
            });

            const getPaymentBadge = (status) => {
                if (status === 'paid') {
                    return <span className="payment-badge bg-green-100 text-green-800">ชำระแล้ว</span>;
                } else if (status === 'pending') {
                    return <span className="payment-badge bg-amber-100 text-amber-800">รอตรวจสอบ</span>;
                } else {
                    return <span className="payment-badge bg-gray-200 text-gray-700">รอชำระ</span>;
                }
            };

            const ClassCard = ({ cls, isToday }) => {
                const students = getStudentsForClass(cls);
                const isExpanded = expandedClass === cls.id;
                const bgBase = isToday ? 'bg-white bg-opacity-10 border-white border-opacity-20' : 'border-gray-200';
                const textColor = isToday ? 'text-white' : 'text-gray-800';
                const subColor = isToday ? 'text-teal-100' : 'text-gray-500';
                return (
                    <div className={`border rounded-lg p-4 ${bgBase} ${isToday ? 'backdrop-blur-sm' : 'hover:shadow-md'} transition-all`}>
                        <div className="flex justify-between items-start mb-2">
                            <div>
                                {!isToday && <p className="text-sm text-gray-500">{formatThaiDate(new Date(cls.date))}</p>}
                                <p className={`font-bold text-lg ${isToday ? 'text-white' : 'text-teal-600'}`}>{cls.courseName || cls.courseKey}</p>
                                <p className={`text-sm ${subColor}`}>{cls.timeSlot}</p>
                            </div>
                            <span className={`text-xs px-2 py-1 rounded-full font-semibold ${students.length > 0 ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>
                                {students.length} คน
                            </span>
                        </div>
                        {cls.place && <p className={`text-xs ${subColor} mb-2`}>📍 {cls.place}</p>}

                        {/* กดเพื่อดูรายชื่อลูกค้า */}
                        <button onClick={() => setExpandedClass(isExpanded ? null : cls.id)}
                            className={`w-full text-left text-xs font-semibold mt-1 ${isToday ? 'text-teal-200' : 'text-teal-600'}`}>
                            {isExpanded ? '▲ ซ่อนรายชื่อ' : '▼ ดูรายชื่อผู้เรียน (' + students.length + ')'}
                        </button>

                        {isExpanded && (
                            <div className={`mt-3 space-y-2 border-t pt-3 ${isToday ? 'border-white border-opacity-20' : 'border-gray-200'}`}>
                                {students.length === 0 ? (
                                    <p className={`text-xs ${subColor} italic`}>ยังไม่มีผู้จองเข้าคลาสนี้</p>
                                ) : students.map((s, i) => {
                                    // หา sessions ของ booking นี้
                                    const bkSessions = sessions.filter(ss => ss.bookingId === s.id);
                                    return (
                                    <div key={s.id || i} className={`text-sm ${isToday ? 'bg-white bg-opacity-10' : 'bg-gray-50'} rounded-lg p-3`}>
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <p className={`font-semibold ${textColor}`}>{s.name || s.studentName || '-'}</p>
                                                {s.tel && <p className={`text-xs ${subColor}`}>📞 {s.tel}</p>}
                                            </div>
                                            <span className={`text-xs ${subColor}`}>{s.totalPeople || 1} คน</span>
                                        </div>
                                        {s.note && <p className={`text-xs ${subColor} mt-1 italic`}>📝 {s.note}</p>}
                                        {/* เช็คชื่อแต่ละ session */}
                                        {bkSessions.length > 0 && (
                                            <div className="mt-2 flex flex-wrap gap-2">
                                                {bkSessions.map(ss => (
                                                    <button key={ss.id} onClick={() => toggleAttendance(ss.id)}
                                                        className={`text-xs px-2 py-1 rounded-full font-medium transition-all ${
                                                            ss.done
                                                                ? (isToday ? 'bg-green-400 text-green-900' : 'bg-green-100 text-green-700')
                                                                : (isToday ? 'bg-white bg-opacity-20 text-white' : 'bg-gray-200 text-gray-600')
                                                        }`}>
                                                        {ss.done ? '✅' : '⬜'} คนที่ {ss.sessionNo}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="space-y-6">
                    {todayClasses.length > 0 && (
                        <div className="bg-gradient-to-r from-teal-500 to-teal-600 text-white rounded-lg shadow-md p-6">
                            <h2 className="text-2xl font-bold mb-4">📅 ตารางสอนวันนี้</h2>
                            <div className="space-y-3">
                                {todayClasses.map(cls => <ClassCard key={cls.id} cls={cls} isToday={true} />)}
                            </div>
                        </div>
                    )}

                    <div className="bg-white rounded-lg shadow-sm p-6">
                        <h2 className="text-2xl font-bold text-gray-800 mb-6">ตารางสอน</h2>

                        {upcomingClasses.length === 0 ? (
                            <div className="text-center py-12">
                                <p className="text-xl text-gray-500 mb-2">ยังไม่มีตารางสอน</p>
                                <p className="text-sm text-gray-400">กดรับคลาสในแท็บ "รับสอนคลาส"</p>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {upcomingClasses.map(cls => <ClassCard key={cls.id} cls={cls} isToday={false} />)}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Earnings Tab
        function EarningsTab({ instructor }) {
            const [classes, setClasses] = useState([]);
            const [classInstructors, setClassInstructors] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [currentDate, setCurrentDate] = useState(new Date());

            useEffect(() => {
                try {
                    setClasses(JSON.parse(localStorage.getItem('jia_classes') || '[]'));
                    setClassInstructors(JSON.parse(localStorage.getItem('jia_class_instructors') || '[]'));
                    setBookings(JSON.parse(localStorage.getItem('jia_bookings') || '[]'));
                } catch(e) {}
            }, []);

            const previousMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1));
            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1));

            // Get classes I'm assigned to teach
            const myClassIds = useMemo(() => {
                return new Set(classInstructors.filter(ci => ci.instructor === instructor).map(ci => ci.classId));
            }, [classInstructors, instructor]);

            const myClasses = useMemo(() => classes.filter(c => myClassIds.has(c.id)), [classes, myClassIds]);

            // Count students per class (from bookings)
            const studentsPerClass = useMemo(() => {
                const map = {};
                bookings.forEach(b => {
                    // Match by classId or by date+timeSlot+courseType
                    let cid = b.classId;
                    if (!cid) {
                        const matched = classes.find(c => c.date === b.startDate && c.timeSlot === b.timeSlot && (c.courseKey === b.courseType || c.courseName === b.courseType));
                        if (matched) cid = matched.id;
                    }
                    if (cid) map[cid] = (map[cid] || 0) + (parseInt(b.totalPeople) || 1);
                });
                return map;
            }, [bookings, classes]);

            // Calculate pay per class: perStudent × students, capped at max
            const calcPay = (cls) => {
                const perStudent = parseFloat(cls.instructorPayPerStudent) || 0;
                const maxPay = parseFloat(cls.instructorPayMax) || 0;
                const students = studentsPerClass[cls.id] || 0;
                if (perStudent <= 0) return { pay: 0, students, perStudent: 0, maxPay: 0, capped: false };
                let pay = perStudent * students;
                const capped = maxPay > 0 && pay > maxPay;
                if (capped) pay = maxPay;
                return { pay, students, perStudent, maxPay, capped };
            };

            // Filter by current month
            const monthClasses = useMemo(() => {
                const y = currentDate.getFullYear();
                const m = String(currentDate.getMonth() + 1).padStart(2, '0');
                const prefix = y + '-' + m;
                return myClasses.filter(c => (c.date || '').startsWith(prefix)).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
            }, [myClasses, currentDate]);

            // Calculate totals
            const totalEarnings = monthClasses.reduce((sum, c) => sum + calcPay(c).pay, 0);
            const completedClasses = monthClasses.filter(c => c.status === 'completed');
            const confirmedEarnings = completedClasses.reduce((sum, c) => sum + calcPay(c).pay, 0);
            const pendingEarnings = totalEarnings - confirmedEarnings;
            const totalStudents = monthClasses.reduce((sum, c) => sum + (studentsPerClass[c.id] || 0), 0);

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-xl md:text-2xl font-bold text-gray-800">สรุปรายได้</h2>
                        <div className="flex gap-1">
                            <button onClick={previousMonth} className="w-9 h-9 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center transition-colors">◀</button>
                            <span className="px-3 py-2 font-semibold text-gray-700 bg-gray-100 rounded-lg text-sm min-w-max">
                                {getThaiMonthYear(currentDate)}
                            </span>
                            <button onClick={nextMonth} className="w-9 h-9 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center transition-colors">▶</button>
                        </div>
                    </div>

                    {/* Summary Cards */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div className="earnings-card bg-gradient-to-br from-teal-500 to-teal-600 text-white rounded-xl shadow-md p-4">
                            <p className="text-xs opacity-90">รายได้รวม</p>
                            <p className="text-2xl font-bold mt-1">{totalEarnings.toLocaleString()} ฿</p>
                        </div>
                        <div className="earnings-card bg-gradient-to-br from-green-500 to-green-600 text-white rounded-xl shadow-md p-4">
                            <p className="text-xs opacity-90">สอนแล้ว</p>
                            <p className="text-2xl font-bold mt-1">{confirmedEarnings.toLocaleString()} ฿</p>
                            <p className="text-[10px] opacity-75">{completedClasses.length} คลาส</p>
                        </div>
                        <div className="earnings-card bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-xl shadow-md p-4">
                            <p className="text-xs opacity-90">รอสอน</p>
                            <p className="text-2xl font-bold mt-1">{pendingEarnings.toLocaleString()} ฿</p>
                            <p className="text-[10px] opacity-75">{monthClasses.length - completedClasses.length} คลาส</p>
                        </div>
                        <div className="earnings-card bg-gradient-to-br from-amber-500 to-amber-600 text-white rounded-xl shadow-md p-4">
                            <p className="text-xs opacity-90">นักเรียนรวม</p>
                            <p className="text-2xl font-bold mt-1">{totalStudents} คน</p>
                            <p className="text-[10px] opacity-75">{monthClasses.length} คลาส</p>
                        </div>
                    </div>

                    {/* Class Breakdown */}
                    <div className="bg-white rounded-xl shadow-sm p-4 md:p-6">
                        <h3 className="text-lg font-bold text-gray-800 mb-4">รายละเอียดคลาส</h3>

                        {monthClasses.length === 0 ? (
                            <div className="text-center py-8">
                                <p className="text-gray-400">ไม่มีคลาสที่รับสอนในเดือนนี้</p>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {monthClasses.map((cls) => {
                                    const { pay, students, perStudent, maxPay, capped } = calcPay(cls);
                                    const isCompleted = cls.status === 'completed';
                                    return (
                                        <div key={cls.id} className={`card-hover p-4 rounded-xl border ${isCompleted ? 'bg-green-50 border-green-200' : 'bg-gray-50 border-gray-200'}`}>
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <p className="font-semibold text-gray-800">{cls.courseName || cls.courseKey}</p>
                                                    <p className="text-sm text-gray-500">{formatThaiDate(new Date(cls.date))} · {cls.timeSlot}</p>
                                                    {cls.place && <p className="text-xs text-gray-400">📍 {cls.place}</p>}
                                                </div>
                                                <div className="text-right">
                                                    <p className={`text-lg font-bold ${isCompleted ? 'text-green-600' : 'text-blue-600'}`}>{pay.toLocaleString()} ฿</p>
                                                    <span className={`text-[10px] px-2 py-0.5 rounded-full ${isCompleted ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`}>
                                                        {isCompleted ? '✅ สอนแล้ว' : '⏳ รอสอน'}
                                                    </span>
                                                </div>
                                            </div>
                                            <div className="mt-2 text-xs text-gray-500 flex flex-wrap gap-x-3">
                                                <span>👥 {students} คน</span>
                                                {perStudent > 0 && <span>× {perStudent.toLocaleString()} บาท/คน</span>}
                                                {capped && <span className="text-amber-600 font-medium">⚠️ ถึง max {maxPay.toLocaleString()} ฿</span>}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                    {monthClasses.some(c => !c.instructorPayPerStudent || parseFloat(c.instructorPayPerStudent) === 0) && (
                        <div className="text-center text-sm text-yellow-600 pb-4">
                            ⚠️ บางคลาสยังไม่ได้ตั้งค่าค่าสอน — กรุณาติดต่อ Admin
                        </div>
                    )}
                </div>
            );
        }

        // Settings Tab
        function SettingsTab({ instructor }) {
            const [showChangePin, setShowChangePin] = useState(false);
            const [oldPin, setOldPin] = useState("");
            const [newPin, setNewPin] = useState("");
            const [confirmPin, setConfirmPin] = useState("");
            const [message, setMessage] = useState("");

            const getPINFromStorage = () => {
                const pins = JSON.parse(localStorage.getItem("jia_instructor_pins") || '{}');
                return pins[instructor] || "0000";
            };

            const handleChangePin = () => {
                const correctPin = getPINFromStorage();
                if (oldPin !== correctPin) {
                    setMessage("รหัส PIN เดิมไม่ถูกต้อง");
                    return;
                }
                if (newPin.length !== 4 || !/^\d+$/.test(newPin)) {
                    setMessage("รหัส PIN ใหม่ต้องเป็นตัวเลข 4 หลัก");
                    return;
                }
                if (newPin !== confirmPin) {
                    setMessage("รหัส PIN ใหม่ไม่ตรงกัน");
                    return;
                }
                const pins = JSON.parse(localStorage.getItem("jia_instructor_pins") || '{}');
                pins[instructor] = newPin;
                localStorage.setItem("jia_instructor_pins", JSON.stringify(pins));
                setMessage("เปลี่ยนรหัส PIN สำเร็จ");
                setOldPin("");
                setNewPin("");
                setConfirmPin("");
                setTimeout(() => {
                    setShowChangePin(false);
                    setMessage("");
                }, 2000);
            };

            return (
                <div className="space-y-6">
                    <div className="bg-white rounded-lg shadow-sm p-6">
                        <h2 className="text-2xl font-bold text-gray-800 mb-6">ตั้งค่า</h2>

                        <div className="space-y-6">
                            <div>
                                <h3 className="text-lg font-bold text-gray-800 mb-4">เปลี่ยนรหัส PIN</h3>
                                {!showChangePin ? (
                                    <button
                                        onClick={() => setShowChangePin(true)}
                                        className="px-6 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition-colors"
                                    >
                                        เปลี่ยนรหัส PIN
                                    </button>
                                ) : (
                                    <div className="space-y-4 max-w-md">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">
                                                รหัส PIN เดิม
                                            </label>
                                            <input
                                                type="password"
                                                maxLength="4"
                                                placeholder="0000"
                                                value={oldPin}
                                                onChange={(e) => setOldPin(e.target.value.replace(/\D/g, ''))}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">
                                                รหัส PIN ใหม่
                                            </label>
                                            <input
                                                type="password"
                                                maxLength="4"
                                                placeholder="0000"
                                                value={newPin}
                                                onChange={(e) => setNewPin(e.target.value.replace(/\D/g, ''))}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">
                                                ยืนยันรหัส PIN ใหม่
                                            </label>
                                            <input
                                                type="password"
                                                maxLength="4"
                                                placeholder="0000"
                                                value={confirmPin}
                                                onChange={(e) => setConfirmPin(e.target.value.replace(/\D/g, ''))}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
                                            />
                                        </div>
                                        {message && (
                                            <div className={`p-3 rounded-lg ${message.includes('สำเร็จ') ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                {message}
                                            </div>
                                        )}
                                        <div className="flex gap-3">
                                            <button
                                                onClick={handleChangePin}
                                                className="px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition-colors"
                                            >
                                                บันทึก
                                            </button>
                                            <button
                                                onClick={() => {
                                                    setShowChangePin(false);
                                                    setMessage("");
                                                    setOldPin("");
                                                    setNewPin("");
                                                    setConfirmPin("");
                                                }}
                                                className="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors"
                                            >
                                                ยกเลิก
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render app
        ReactDOM.render(<AppLoader />, document.getElementById('root'));
    </script>
    <script>
    // ── Service Worker + Offline + Auto-refresh ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW reg failed:', e));
    }
    window.addEventListener('offline', () => {
      if (!document.getElementById('jia-offline')) {
        const b = document.createElement('div'); b.id = 'jia-offline';
        b.innerHTML = '📡 ออฟไลน์ — ใช้ข้อมูลในเครื่อง';
        b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#f59e0b;color:#fff;text-align:center;padding:6px;font-size:13px;font-weight:600;';
        document.body.prepend(b);
      }
    });
    window.addEventListener('online', () => { const b = document.getElementById('jia-offline'); if (b) b.remove(); showToast('✅ กลับมาออนไลน์แล้ว'); });
    setInterval(() => {
      if (!navigator.onLine) return;
      const user = JSON.parse(localStorage.getItem('jia_user') || sessionStorage.getItem('jia_user') || 'null');
      if (!user) return;
      jiaApiGet('getAllData', { username: user.username }).then(data => {
        if (!data || data.error) return;
        ['courses','instructors','classes','class_instructors','bookings','sessions','instructor_quals'].forEach(k => {
          if (Array.isArray(data[k])) localStorage.setItem('jia_' + k, JSON.stringify(data[k]));
        });
        console.log('🔄 Auto-refresh done:', new Date().toLocaleTimeString());
      }).catch(() => {});
    }, 5 * 60 * 1000);
    </script>
</body>
</html>
