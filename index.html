<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIA Course - ระบบจองคอร์ส</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'] }
    }
  }
};
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: 'Noto Sans Thai', sans-serif; margin: 0; }
  .custom-scroll::-webkit-scrollbar { height: 4px; }
  .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ─── defaults ───
const DEFAULT_COURSES = [
  { key: "Full",    label: "Full Course",    range: "10-15 คน", max: 15, color: "bg-blue-100 text-blue-700" },
  { key: "Join",    label: "Join Course",    range: "5-7 คน",   max: 7,  color: "bg-indigo-100 text-indigo-700" },
  { key: "Mini",    label: "Mini Course",    range: "5-7 คน",   max: 7,  color: "bg-cyan-100 text-cyan-700" },
  { key: "Private", label: "Private Course", range: "5-7 คน",   max: 7,  color: "bg-sky-100 text-sky-700" },
  { key: "Other",   label: "Other",          range: "",          max: 999,color: "bg-gray-100 text-gray-700" },
];
const DEFAULT_STAFF = ["มิ้ง", "ป่าน", "แก้มใส", "โบว์", "แนน"];
const DEFAULT_OPS_STAFF = ["ป่าน", "แนน", "เจ๋ง", "ปั่น", "หมวย"];
const DEFAULT_INSTRUCTORS = ["หมอปุ้ย", "เจ๋ง", "ป่าน", "พลอย", "โบว์", "แนน"];
const DEFAULT_TIME_SLOTS = ["11:00-13:00", "14:00-16:00", "17:00-19:00"];
const BADGE_COLORS = [
  "bg-blue-100 text-blue-700","bg-indigo-100 text-indigo-700","bg-cyan-100 text-cyan-700",
  "bg-sky-100 text-sky-700","bg-purple-100 text-purple-700","bg-teal-100 text-teal-700",
  "bg-emerald-100 text-emerald-700","bg-amber-100 text-amber-700","bg-gray-100 text-gray-700",
];
const TABS = ["แดชบอร์ด", "จองคอร์ส", "ลูกค้า", "ตารางเรียน", "ปฏิทิน", "ตั้งค่าคอร์ส"];
const SALES_TABS = [0, 1, 2, 4]; // แดชบอร์ด, จองคอร์ส, ลูกค้า, ปฏิทิน
const OPS_TABS   = [0, 2, 3, 4, 5]; // แดชบอร์ด, ลูกค้า, ตารางเรียน, ปฏิทิน, ตั้งค่า
const ALL_TABS   = ["แดชบอร์ด", "จองคอร์ส", "ลูกค้า", "ตารางเรียน", "ปฏิทิน", "ตั้งค่าคอร์ส"];

// ─── JSONP helpers ───
const jsonp = (url) =>
  new Promise((resolve, reject) => {
    const name = "jia_cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const script = document.createElement("script");
    let done = false;
    const cleanup = () => { done = true; delete window[name]; if (script.parentNode) script.parentNode.removeChild(script); };
    window[name] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error("JSONP failed")); };
    script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + name;
    setTimeout(() => { if (!done) { cleanup(); reject(new Error("JSONP timeout")); } }, 10000);
    document.head.appendChild(script);
  });
const b64 = (obj) => btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
const gsAction = (baseUrl, params) => {
  const qs = Object.entries(params).map(([k, v]) => encodeURIComponent(k) + "=" + encodeURIComponent(v)).join("&");
  return jsonp(baseUrl + "?" + qs);
};

// ─── utility ───
const uid   = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const today = () => new Date().toISOString().slice(0, 10);
const fmt   = (d) => d ? new Date(d).toLocaleDateString("th-TH") : "-";

// ─── Main App ───
function App() {
  const [tab, setTab] = useState(0);
  const [role, setRole] = useState(() => localStorage.getItem("jia_role") || "");
  const [loggedIn, setLoggedIn] = useState(() => localStorage.getItem("jia_logged_in") === "true");
  const [loginUser, setLoginUser] = useState(() => localStorage.getItem("jia_login_user") || "");
  const [customers, setCustomers] = useState([]);
  const [bookings, setBookings] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [courses, setCourses] = useState([]);
  const [staff, setStaff] = useState([]);
  const [opsStaff, setOpsStaff] = useState([]);
  const [instructorList, setInstructorList] = useState([]);
  const [timeSlots, setTimeSlots] = useState([]);
  const [gsUrl, setGsUrl] = useState(() => localStorage.getItem("jia_gs_url") || "https://script.google.com/macros/s/AKfycbw-dsaXvMsamXHybSrnzu-JMcnBvQqbW19vAVMwNjlpnwXwWtYmw6oaYoy42PizLrvU/exec");
  const [showSetup, setShowSetup] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");

  useEffect(() => {
    try {
      setCustomers(JSON.parse(localStorage.getItem("jia_customers") || "[]"));
      setBookings(JSON.parse(localStorage.getItem("jia_bookings") || "[]"));
      setSessions(JSON.parse(localStorage.getItem("jia_sessions") || "[]"));
      const savedCourses = JSON.parse(localStorage.getItem("jia_courses") || "null");
      setCourses(savedCourses || DEFAULT_COURSES);
      const savedStaff = JSON.parse(localStorage.getItem("jia_staff") || "null");
      const oldDefaults = [["พี่มิ้ง", "แก้มใส", "ป่าน"], []];
      if (!savedStaff || oldDefaults.some(d => JSON.stringify(savedStaff) === JSON.stringify(d))) {
        setStaff(DEFAULT_STAFF); localStorage.setItem("jia_staff", JSON.stringify(DEFAULT_STAFF));
      } else {
        setStaff(savedStaff);
      }
      const savedOpsStaff = JSON.parse(localStorage.getItem("jia_ops_staff") || "null");
      setOpsStaff(savedOpsStaff || DEFAULT_OPS_STAFF);
      const savedInstructors = JSON.parse(localStorage.getItem("jia_instructors") || "null");
      setInstructorList(savedInstructors || DEFAULT_INSTRUCTORS);
      const savedTimeSlots = JSON.parse(localStorage.getItem("jia_time_slots") || "null");
      setTimeSlots(savedTimeSlots || DEFAULT_TIME_SLOTS);
    } catch {}
  }, []);

  const save = useCallback((key, data) => localStorage.setItem(key, JSON.stringify(data)), []);

  const courseMap = useMemo(() => {
    const m = {};
    courses.forEach(c => { m[c.key] = c; });
    return m;
  }, [courses]);
  const cfg = useCallback((key) => courseMap[key] || { label: key, range: "", max: 999, color: "bg-gray-100 text-gray-700" }, [courseMap]);
  const courseKeys = useMemo(() => courses.map(c => c.key), [courses]);

  const syncFromGs = useCallback(async () => {
    if (!gsUrl) return;
    setSyncing(true); setSyncMsg("กำลังซิงค์...");
    try {
      const res = await gsAction(gsUrl, { action: "get" });
      if (res.customers) { setCustomers(res.customers); save("jia_customers", res.customers); }
      if (res.bookings)  { setBookings(res.bookings);   save("jia_bookings", res.bookings); }
      if (res.sessions)  { setSessions(res.sessions);   save("jia_sessions", res.sessions); }
      setSyncMsg("ซิงค์สำเร็จ");
    } catch (e) { setSyncMsg("ผิดพลาด: " + e.message); }
    setSyncing(false);
    setTimeout(() => setSyncMsg(""), 3000);
  }, [gsUrl, save]);

  const addCustomer = useCallback(async (c) => {
    c.id = uid(); c.createdAt = today();
    const next = [...customers, c];
    setCustomers(next); save("jia_customers", next);
    if (gsUrl) gsAction(gsUrl, { action: "addCustomer", data: b64(c) }).catch(() => {});
    return c;
  }, [customers, gsUrl, save]);

  const updateCustomer = useCallback((id, data) => {
    const next = customers.map(c => c.id === id ? { ...c, ...data } : c);
    setCustomers(next); save("jia_customers", next);
    if (gsUrl) gsAction(gsUrl, { action: "addCustomer", data: b64({ id, ...data }) }).catch(() => {});
  }, [customers, gsUrl, save]);

  const deleteCustomer = useCallback((id) => {
    const nc = customers.filter(c => c.id !== id);
    const nb = bookings.filter(b => b.customerId !== id);
    const ns = sessions.filter(s => s.customerId !== id);
    setCustomers(nc); save("jia_customers", nc);
    setBookings(nb);  save("jia_bookings", nb);
    setSessions(ns);  save("jia_sessions", ns);
  }, [customers, bookings, sessions, save]);

  const genBookingCode = () => "JIA-" + Math.random().toString(36).slice(2, 6).toUpperCase();

  const addBooking = useCallback(async (bk) => {
    bk.id = uid(); bk.createdAt = today();
    bk.bookingCode = bk.bookingCode || genBookingCode();
    bk.registeredCount = bk.registeredCount || 0;
    const next = [...bookings, bk];
    setBookings(next); save("jia_bookings", next);
    if (gsUrl) {
      const cust = customers.find(c => c.id === bk.customerId);
      const crs = courseMap[bk.courseType];
      const insts = bk.instructors || [];
      const gsData = {
        ...bk,
        customerName: cust?.name || "",
        courseName: crs?.label || bk.courseType || "",
        totalSessions: Number(bk.totalPeople) || 1,
        instructor1: insts[0] || "",
        instructor2: insts[1] || "",
        instructor3: insts[2] || "",
        cash: bk.paymentStatus || "",
        notes: bk.note || ""
      };
      gsAction(gsUrl, { action: "addBooking", data: b64(gsData) }).catch(() => {});
    }
    const slist = Array.from({ length: Number(bk.totalPeople) || 1 }, (_, i) => ({
      id: uid(), bookingId: bk.id, customerId: bk.customerId || "",
      sessionNo: i + 1, done: false, date: i === 0 && bk.startDate ? bk.startDate : "", note: "",
      examResult: "", examScore: "", examNote: ""
    }));
    const nextS = [...sessions, ...slist];
    setSessions(nextS); save("jia_sessions", nextS);
    slist.forEach(s => { if (gsUrl) gsAction(gsUrl, { action: "addSession", data: b64(s) }).catch(() => {}); });
    return bk;
  }, [bookings, sessions, customers, courseMap, gsUrl, save]);

  const updateBooking = useCallback((id, data) => {
    const next = bookings.map(b => b.id === id ? { ...b, ...data } : b);
    setBookings(next); save("jia_bookings", next);
    if (gsUrl) {
      const fullBk = next.find(b => b.id === id);
      const cust = customers.find(c => c.id === fullBk?.customerId);
      const crs = courseMap[data.courseType || fullBk?.courseType];
      const insts = data.instructors || fullBk?.instructors || [];
      const gsData = {
        id, ...data,
        customerName: cust?.name || "",
        courseName: crs?.label || data.courseType || "",
        totalSessions: Number(data.totalPeople) || 1,
        instructor1: insts[0] || "",
        instructor2: insts[1] || "",
        instructor3: insts[2] || "",
        cash: data.paymentStatus || "",
        notes: data.note || ""
      };
      gsAction(gsUrl, { action: "addBooking", data: b64(gsData) }).catch(() => {});
    }
  }, [bookings, customers, courseMap, gsUrl, save]);

  const deleteBooking = useCallback((id) => {
    const nb = bookings.filter(b => b.id !== id);
    const ns = sessions.filter(s => s.bookingId !== id);
    setBookings(nb); save("jia_bookings", nb);
    setSessions(ns); save("jia_sessions", ns);
  }, [bookings, sessions, save]);

  const toggleSession = useCallback((sid) => {
    const next = sessions.map(s => s.id === sid ? { ...s, done: !s.done, date: s.done ? "" : today() } : s);
    setSessions(next); save("jia_sessions", next);
    const s = next.find(x => x.id === sid);
    if (gsUrl) gsAction(gsUrl, { action: "updateSession", id: sid, value: String(s.done) }).catch(() => {});
  }, [sessions, gsUrl, save]);

  const updateSessionDate = useCallback((sid, date) => {
    const next = sessions.map(s => s.id === sid ? { ...s, date } : s);
    setSessions(next); save("jia_sessions", next);
  }, [sessions, save]);

  const updateSessionExam = useCallback((sid, examData) => {
    const next = sessions.map(s => s.id === sid ? { ...s, ...examData } : s);
    setSessions(next); save("jia_sessions", next);
    if (gsUrl) gsAction(gsUrl, { action: "addSession", data: b64({ id: sid, ...examData }) }).catch(() => {});
  }, [sessions, gsUrl, save]);

  const saveCourses = useCallback((list) => {
    setCourses(list); save("jia_courses", list);
  }, [save]);

  const saveStaff = useCallback((list) => {
    setStaff(list); save("jia_staff", list);
  }, [save]);

  const saveOpsStaff = useCallback((list) => {
    setOpsStaff(list); save("jia_ops_staff", list);
  }, [save]);

  const saveInstructorList = useCallback((list) => {
    setInstructorList(list); save("jia_instructors", list);
  }, [save]);

  const saveTimeSlots = useCallback((list) => {
    setTimeSlots(list); save("jia_time_slots", list);
  }, [save]);

  const enrolled = useMemo(() => {
    const map = {};
    courseKeys.forEach(k => { map[k] = 0; });
    bookings.forEach(b => { map[b.courseType] = (map[b.courseType] || 0) + (Number(b.totalPeople) || 0); });
    return map;
  }, [bookings, courseKeys]);

  const stats = useMemo(() => ({
    totalCustomers: customers.length,
    totalBookings: bookings.length,
    todayDone: sessions.filter(s => s.date === today()).length,
    pending: sessions.filter(s => !s.done).length,
  }), [customers, bookings, sessions]);

  const handleLogin = (r, userName) => {
    setRole(r); setLoggedIn(true); setLoginUser(userName); setTab(0);
    localStorage.setItem("jia_role", r);
    localStorage.setItem("jia_logged_in", "true");
    localStorage.setItem("jia_login_user", userName);
  };
  const handleLogout = () => {
    setLoggedIn(false); setRole(""); setLoginUser(""); setTab(0);
    localStorage.removeItem("jia_logged_in");
    localStorage.removeItem("jia_login_user");
    localStorage.removeItem("jia_role");
  };
  const visibleTabs = role === "sales" ? SALES_TABS : OPS_TABS;

  // ─── PIN management (stored in localStorage) ───
  const getPins = () => {
    try { return JSON.parse(localStorage.getItem("jia_pins") || '{"sales":"1234","ops":"5678"}'); }
    catch { return { sales: "1234", ops: "5678" }; }
  };
  const savePins = (pins) => localStorage.setItem("jia_pins", JSON.stringify(pins));

  if (!loggedIn) {
    return <LoginScreen onLogin={handleLogin} staff={staff} opsStaff={opsStaff} getPins={getPins} />;
  }

  return (
    <div className="min-h-screen bg-blue-50 font-sans">
      <header style={{ background: "linear-gradient(135deg, #253A8D 0%, #3757D3 100%)" }} className="text-white shadow-lg">
        <div className="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
          <div>
            <h1 className="text-xl font-bold tracking-wide">JIA Course</h1>
            <p className="text-blue-200 text-xs">เจี๋ยรักษา — ระบบจองคอร์ส</p>
          </div>
          <div className="flex gap-2 items-center">
            <span className="text-xs bg-white/20 px-2 py-1 rounded-lg">
              {role === "sales" ? "เซลล์" : "หน้างาน"}: {loginUser}
            </span>
            {syncMsg && <span className="text-xs bg-white/20 px-2 py-1 rounded">{syncMsg}</span>}
            <button onClick={syncFromGs} disabled={!gsUrl || syncing}
              className="text-xs bg-white/20 hover:bg-white/30 px-3 py-1 rounded disabled:opacity-40">
              {syncing ? "..." : "🔄"} ซิงค์
            </button>
            <button onClick={() => setShowSetup(true)}
              className="text-xs bg-white/20 hover:bg-white/30 px-3 py-1 rounded">ตั้งค่า</button>
            <button onClick={handleLogout}
              className="text-xs bg-red-500/80 hover:bg-red-500 px-3 py-1 rounded font-medium">ออกจากระบบ</button>
          </div>
        </div>
      </header>

      <nav className="bg-white border-b shadow-sm overflow-x-auto custom-scroll">
        <div className="max-w-5xl mx-auto px-4 flex">
          {visibleTabs.map((ti) => (
            <button key={ti} onClick={() => setTab(ti)}
              className={`px-4 py-3 text-sm font-medium border-b-2 whitespace-nowrap transition-colors ${
                tab === ti ? "border-blue-600 text-blue-700" : "border-transparent text-gray-500 hover:text-blue-600"
              }`}>{ALL_TABS[ti]}</button>
          ))}
        </div>
      </nav>

      <main className="max-w-5xl mx-auto px-4 py-6">
        {tab === 0 && <Dashboard stats={stats} bookings={bookings} customers={customers} enrolled={enrolled} courses={courses} cfg={cfg} courseKeys={courseKeys} role={role} sessions={sessions} />}
        {tab === 1 && <BookingForm addBooking={addBooking} enrolled={enrolled} courses={courses} cfg={cfg} courseKeys={courseKeys} instructorList={instructorList} timeSlots={timeSlots} loginUser={loginUser} />}
        {tab === 2 && (
          <CustomerList customers={customers} bookings={bookings} sessions={sessions}
            updateCustomer={updateCustomer} deleteCustomer={deleteCustomer}
            updateBooking={updateBooking} deleteBooking={deleteBooking} enrolled={enrolled} cfg={cfg} courseKeys={courseKeys} staff={staff} courses={courses} instructorList={instructorList} timeSlots={timeSlots} />
        )}
        {tab === 3 && (
          <Schedule sessions={sessions} bookings={bookings} customers={customers}
            toggleSession={toggleSession} updateSessionDate={updateSessionDate} updateSessionExam={updateSessionExam}
            updateBooking={updateBooking} deleteBooking={deleteBooking} enrolled={enrolled} cfg={cfg} courseKeys={courseKeys} staff={staff} courses={courses} instructorList={instructorList} timeSlots={timeSlots} loginUser={loginUser} />
        )}
        {tab === 4 && <CalendarView sessions={sessions} bookings={bookings} courses={courses} cfg={cfg} timeSlots={timeSlots} />}
        {tab === 5 && <CourseSettings courses={courses} saveCourses={saveCourses} staff={staff} saveStaff={saveStaff} opsStaff={opsStaff} saveOpsStaff={saveOpsStaff} instructorList={instructorList} saveInstructorList={saveInstructorList} timeSlots={timeSlots} saveTimeSlots={saveTimeSlots} enrolled={enrolled} getPins={getPins} savePins={savePins} />}
      </main>

      {showSetup && (
        <SetupModal gsUrl={gsUrl} setGsUrl={(u) => { setGsUrl(u); localStorage.setItem("jia_gs_url", u); }}
          onClose={() => setShowSetup(false)} onSync={syncFromGs} />
      )}
    </div>
  );
}

// ─── Login Screen ───
function LoginScreen({ onLogin, staff, opsStaff, getPins }) {
  const [step, setStep] = useState("role");
  const [selectedRole, setSelectedRole] = useState("");
  const [userName, setUserName] = useState("");
  const [pin, setPin] = useState("");
  const [error, setError] = useState("");
  const pinRefs = [React.useRef(), React.useRef(), React.useRef(), React.useRef()];

  const handleRoleSelect = (r) => { setSelectedRole(r); setStep("user"); setError(""); };

  const handleUserSelect = (name) => { setUserName(name); setStep("pin"); setPin(""); setError(""); setTimeout(() => pinRefs[0].current?.focus(), 100); };

  const handlePinChange = (idx, val) => {
    if (!/^\d*$/.test(val)) return;
    const digits = pin.split("");
    digits[idx] = val.slice(-1);
    const newPin = digits.join("").slice(0, 4);
    setPin(newPin);
    if (val && idx < 3) setTimeout(() => pinRefs[idx + 1].current?.focus(), 50);
    if (newPin.length === 4) {
      const pins = getPins();
      const correctPin = pins[selectedRole] || (selectedRole === "sales" ? "1234" : "5678");
      if (newPin === correctPin) {
        onLogin(selectedRole, userName);
      } else {
        setError("รหัส PIN ไม่ถูกต้อง");
        setTimeout(() => { setPin(""); setError(""); pinRefs[0].current?.focus(); }, 1200);
      }
    }
  };

  const handlePinKeyDown = (idx, e) => {
    if (e.key === "Backspace" && !pin[idx] && idx > 0) {
      setTimeout(() => pinRefs[idx - 1].current?.focus(), 50);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{ background: "linear-gradient(135deg, #1a2a6c 0%, #253A8D 40%, #3757D3 100%)" }}>
      <div className="w-full max-w-sm">
        {/* Logo */}
        <div className="text-center mb-8">
          <h1 className="text-3xl font-bold text-white tracking-wide">JIA Course</h1>
          <p className="text-blue-300 text-sm mt-1">เจี๋ยรักษา — ระบบจองคอร์ส</p>
        </div>

        <div className="bg-white rounded-2xl shadow-2xl overflow-hidden">
          {/* Step 1: เลือกบทบาท */}
          {step === "role" && (
            <div className="p-6">
              <h2 className="text-center text-lg font-semibold text-gray-800 mb-1">เข้าสู่ระบบ</h2>
              <p className="text-center text-sm text-gray-500 mb-6">เลือกบทบาทของคุณ</p>
              <div className="space-y-3">
                <button onClick={() => handleRoleSelect("sales")}
                  className="w-full flex items-center gap-4 p-4 rounded-xl border-2 border-blue-100 hover:border-blue-400 hover:bg-blue-50 transition group">
                  <div className="w-12 h-12 rounded-xl flex items-center justify-center text-2xl"
                    style={{ background: "linear-gradient(135deg, #3757D3 0%, #5C91FF 100%)" }}>
                    <span className="text-white">💼</span>
                  </div>
                  <div className="text-left">
                    <p className="font-semibold text-gray-800 group-hover:text-blue-700">เซลล์ (Sales)</p>
                    <p className="text-xs text-gray-500">จองคอร์ส, ลูกค้า, ชำระเงิน</p>
                  </div>
                </button>
                <button onClick={() => handleRoleSelect("ops")}
                  className="w-full flex items-center gap-4 p-4 rounded-xl border-2 border-teal-100 hover:border-teal-400 hover:bg-teal-50 transition group">
                  <div className="w-12 h-12 rounded-xl flex items-center justify-center text-2xl"
                    style={{ background: "linear-gradient(135deg, #0F6E56 0%, #1D9E75 100%)" }}>

// ─── Course Type Picker ───
function CourseTypePicker({ value, onChange, enrolled, courses, size = "normal" }) {
  return (
    <div className="flex flex-wrap gap-2">
      {courses.map(c => {
        const used  = enrolled[c.key] || 0;
        const full  = used >= c.max;
        const active = value === c.key;
        return (
          <button key={c.key} type="button"
            onClick={() => !full && onChange(c.key)}
            disabled={full}
            className={`relative flex flex-col items-start rounded-xl border transition
              ${size === "small" ? "px-3 py-1.5" : "px-4 py-2.5"}
              ${active ? "border-blue-600 bg-blue-50 text-blue-700 shadow-sm" : "border-gray-200 text-gray-600 hover:border-blue-400 bg-white"}
              ${full ? "opacity-50 cursor-not-allowed bg-gray-50 border-gray-200" : ""}
            `}>
            <span className="font-medium text-sm">{c.label}</span>
            {c.range && <span className={`text-xs mt-0.5 ${active ? "text-blue-500" : "text-gray-400"}`}>{c.range}</span>}
            {full && <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full font-bold">เต็ม</span>}
            {!full && c.max < 999 && <span className={`text-xs mt-0.5 ${active ? "text-blue-400" : "text-gray-400"}`}>เหลือ {c.max - used} ที่</span>}
          </button>
        );
      })}
    </div>
  );
}

// ─── Staff Picker ───
function StaffPicker({ selected, onChange, staff }) {
  const toggle = (name) => {
    if (selected.includes(name)) onChange(selected.filter(s => s !== name));
    else onChange([...selected, name]);
  };
  return (
    <div className="flex flex-wrap gap-2">
      {staff.map(name => {
        const active = selected.includes(name);
        return (
          <button key={name} type="button" onClick={() => toggle(name)}
            className={`px-3 py-1.5 rounded-lg text-sm border transition ${
              active ? "bg-blue-600 text-white border-blue-600" : "border-gray-300 text-gray-600 hover:border-blue-400"
            }`}>{name}</button>
        );
      })}
    </div>
  );
}

// ─── Payment Picker ───
function PaymentPicker({ value, onChange }) {
  const options = ["โอนแล้ว", "ยังไม่ได้โอน"];
  return (
    <div className="flex gap-2">
      {options.map(opt => {
        const active = value === opt;
        const isTransferred = opt === "โอนแล้ว";
        return (
          <button key={opt} type="button" onClick={() => onChange(opt)}
            className={`flex-1 py-1.5 rounded-lg text-sm border transition font-medium ${
              active
                ? isTransferred
                  ? "bg-green-500 text-white border-green-500"
                  : "bg-orange-400 text-white border-orange-400"
                : "border-gray-300 text-gray-600 hover:border-blue-400"
            }`}>{opt}</button>
        );
      })}
    </div>
  );
}

              className="py-2 bg-green-500 text-white rounded-lg text-sm font-medium hover:bg-green-600 flex items-center justify-center gap-1">
              💬 ส่ง LINE
            </button>
            <button onClick={() => {
                const text = "ลงทะเบียนเรียน JIA Course\nรหัสจอง: " + savedBk.bookingCode + "\nคอร์ส: " + (cfg(savedBk.courseType)?.label || "") + "\n\nกดลิงก์:\n" + linkWithCode;
                navigator.clipboard?.writeText(text); alert("คัดลอกข้อความแล้ว วางส่งใน LINE/แชทได้เลย!");
              }}
              className="py-2 border border-gray-300 text-gray-600 rounded-lg text-sm font-medium hover:bg-gray-50 flex items-center justify-center gap-1">
              📋 คัดลอกข้อความ
            </button>
          </div>

          <p className="text-xs text-blue-500 mt-3 text-center">ผู้เรียน {savedBk.totalPeople} คนใช้ลิงก์/QR เดียวกัน กรอกข้อมูล + ยินยอม PDPA เอง</p>
        </div>
        <button onClick={() => { setSavedBk(null); setForm({ ...blank, courseType: courseKeys[0] || "Full" }); }}
          className="w-full py-2.5 text-white rounded-lg font-medium"
          style={{ background: "linear-gradient(135deg, #3757D3 0%, #5C91FF 100%)" }}>
          จองรายการใหม่
        </button>
      </div>
    );
  }

  return (
    <div className="bg-white rounded-xl border border-blue-100 p-6 max-w-2xl">
      <h2 className="text-lg font-semibold text-blue-800 mb-1">จองที่นั่งคอร์ส</h2>
      <p className="text-xs text-gray-500 mb-4">จองจำนวนที่นั่ง แล้วส่งลิงก์ให้ผู้เรียนกรอกข้อมูลเอง</p>

      <form onSubmit={handleSubmit} className="space-y-5">
        <div>
          <label className="text-sm text-gray-600 block mb-2">ประเภทคอร์ส</label>
          <CourseTypePicker value={form.courseType} onChange={v => set("courseType", v)} enrolled={enrolled} courses={courses} />
        </div>

        <div>
          <label className="text-sm text-gray-600 block mb-2">รอบเวลาเรียน</label>
          <TimeSlotPicker value={form.timeSlot} onChange={v => set("timeSlot", v)} timeSlots={timeSlots} />
        </div>

        <div className="grid grid-cols-2 gap-4">
          <div>
            <label className="text-sm text-gray-600 block mb-1">
              จำนวนคน
              {cInfo.max < 999 && (
                <span className={`ml-2 text-xs font-medium ${remaining <= 0 ? "text-red-500" : "text-blue-600"}`}>
                  (เหลือ {remaining} ที่)
                </span>
              )}
            </label>
            <input type="number" value={form.totalPeople} onChange={e => set("totalPeople", e.target.value)}
              min={1} max={remaining > 0 ? remaining : 1}
              className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
          </div>
          <Field label="วันที่เริ่ม" type="date" value={form.startDate} onChange={v => set("startDate", v)} />
        </div>

        <div>
          <label className="text-sm text-gray-600 block mb-2">ผู้สอน</label>
          <div className="flex flex-wrap gap-2">
            {instructorList.map(name => {
              const active = (form.instructors || []).includes(name);
              return (
                <button key={name} type="button" onClick={() => {
                  const cur = form.instructors || [];
                  set("instructors", active ? cur.filter(n => n !== name) : [...cur, name]);
                }}
                  className={`px-3 py-1.5 rounded-lg text-sm border transition ${
                    active ? "bg-purple-600 text-white border-purple-600" : "border-gray-300 text-gray-600 hover:border-purple-400"
                  }`}>{name}</button>
              );
            })}
          </div>
        </div>

        <div>
          <label className="text-sm text-gray-600 block mb-2">เซลล์ผู้จอง</label>
          <div className="px-4 py-2.5 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-700 font-medium">
            {loginUser || "(ไม่ระบุ)"}
          </div>
        </div>

        <div>
          <label className="text-sm text-gray-600 block mb-2">การชำระเงิน</label>
          <PaymentPicker value={form.paymentStatus} onChange={v => set("paymentStatus", v)} />
        </div>

        <Field label="หมายเหตุ" value={form.note} onChange={v => set("note", v)} />

        <button type="submit"
          className="w-full text-white py-2.5 rounded-lg font-medium transition"
          style={{ background: "linear-gradient(135deg, #3757D3 0%, #5C91FF 100%)" }}>
          จองที่นั่ง
        </button>
      </form>
    </div>
  );
}

function Field({ label, value, onChange, type = "text", required, min }) {
  return (
    <div>
      <label className="text-sm text-gray-600 block mb-1">{label}</label>
      <input type={type} value={value} onChange={e => onChange(e.target.value)}
        required={required} min={min}
        className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
    </div>
  );
}

// ─── Customer List ───
function CustomerList({ customers, bookings, sessions, updateCustomer, deleteCustomer, updateBooking, deleteBooking, enrolled, cfg, courseKeys, staff, courses, instructorList, timeSlots }) {
  const [search, setSearch] = useState("");
  const [editCust, setEditCust] = useState(null);
  const [editBk, setEditBk] = useState(null);
  const [expandId, setExpandId] = useState(null);

  const filtered = customers.filter(c =>
    c.name?.toLowerCase().includes(search.toLowerCase()) ||
    (c.phone || "").includes(search)
  );

  const confirmDelete = (label, fn) => { if (window.confirm('ลบ "' + label + '" ออกจากระบบ?')) fn(); };

  return (
    <div className="space-y-4">
      <input value={search} onChange={e => setSearch(e.target.value)}
        placeholder="ค้นหาชื่อหรือเบอร์โทร..."
        className="w-full border border-blue-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-400" />

      {filtered.length === 0 ? (
        <div className="text-center py-12 text-gray-400">ไม่พบข้อมูลลูกค้า</div>
      ) : (
        <div className="space-y-3">
          {filtered.map(c => {
            const cBk  = bookings.filter(b => b.customerId === c.id);
            const cSe  = sessions.filter(s => s.customerId === c.id);
            const done = cSe.filter(s => s.done).length;
            const expanded = expandId === c.id;

            return (
              <div key={c.id} className="bg-white rounded-xl border border-blue-100 overflow-hidden">
                <div className="p-4 flex justify-between items-center gap-3">
                  <button className="flex-1 text-left" onClick={() => setExpandId(expanded ? null : c.id)}>
                    <div className="flex items-center gap-2">
                      <p className="font-semibold text-gray-800">{c.name}</p>
                      <span className="text-xs text-gray-400">{expanded ? "▲" : "▼"}</span>
                    </div>
                    {c.phone && <p className="text-xs text-gray-500 mt-0.5">{c.phone}</p>}
                    <p className="text-xs text-gray-400 mt-0.5">สมัคร {fmt(c.createdAt)} | {cBk.length} คอร์ส | {done}/{cSe.length} ครั้ง</p>
                  </button>
                  <div className="flex gap-1 shrink-0">
                    <button onClick={() => setEditCust({ ...c })}
                      className="text-xs px-2.5 py-1.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 font-medium">แก้ไข</button>
                    <button onClick={() => confirmDelete(c.name, () => deleteCustomer(c.id))}
                      className="text-xs px-2.5 py-1.5 bg-red-50 text-red-500 rounded-lg hover:bg-red-100">ลบ</button>
                  </div>
                </div>

                {expanded && (
                  <div className="border-t bg-blue-50/50 px-4 py-3">
                    {cBk.length === 0 ? (
                      <p className="text-xs text-gray-400">ยังไม่มีการจอง</p>
                    ) : (
                      <div className="space-y-2">
                        <p className="text-xs font-medium text-blue-600 mb-1">คอร์สที่จอง</p>
                        {cBk.map(bk => {
                          const bkSe   = sessions.filter(s => s.bookingId === bk.id);
                          const bkDone = bkSe.filter(s => s.done).length;
                          const bc     = cfg(bk.courseType);
                          return (
                            <div key={bk.id} className="flex items-center justify-between bg-white rounded-lg px-3 py-2 border border-blue-100">
                              <div className="flex flex-wrap items-center gap-2">
                                <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${bc.color}`}>{bc.label}</span>
                                <span className="text-xs text-gray-500">{bk.totalPeople || "-"} คน</span>
                                {bk.timeSlot && <span className="text-xs text-gray-400">{bk.timeSlot}</span>}
                                <span className="text-xs text-gray-400">{bkDone}/{bkSe.length} ครั้ง</span>
                                {bk.instructors?.length > 0 && <span className="text-xs text-purple-500">ผู้สอน: {bk.instructors.join(", ")}</span>}
                                {bk.paymentStatus && (
                                  <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${bk.paymentStatus === "โอนแล้ว" ? "bg-green-100 text-green-700" : "bg-orange-100 text-orange-600"}`}>
                                    {bk.paymentStatus}
                                  </span>
                                )}
                              </div>
                              <div className="flex gap-1 shrink-0">
                                <button onClick={() => setEditBk({ ...bk, teachers: bk.teachers || [], instructors: bk.instructors || ["", "", ""] })}
                                  className="text-xs px-2 py-1 bg-blue-50 text-blue-600 rounded hover:bg-blue-100">แก้ไข</button>
                                <button onClick={() => confirmDelete(bc.label, () => deleteBooking(bk.id))}
                                  className="text-xs px-2 py-1 bg-red-50 text-red-500 rounded hover:bg-red-100">ลบ</button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {editCust && (
        <EditModal title="แก้ไขข้อมูลลูกค้า" onClose={() => setEditCust(null)}
          onSave={() => { updateCustomer(editCust.id, { name: editCust.name, phone: editCust.phone, qrCode: editCust.qrCode }); setEditCust(null); }}>
          <div className="space-y-3">
            <Field label="ชื่อลูกค้า *" value={editCust.name || ""} onChange={v => setEditCust(c => ({ ...c, name: v }))} required />
            <Field label="เบอร์โทร" value={editCust.phone || ""} onChange={v => setEditCust(c => ({ ...c, phone: v }))} />
            <Field label="รหัส QR Code" value={editCust.qrCode || ""} onChange={v => setEditCust(c => ({ ...c, qrCode: v }))} />
          </div>
        </EditModal>
      )}

      {editBk && (
        <BookingEditModal bk={editBk} setBk={setEditBk} enrolled={enrolled}
          courses={courses} staff={staff} instructorList={instructorList} timeSlots={timeSlots}
          onSave={() => {
            updateBooking(editBk.id, {
              courseType: editBk.courseType, totalPeople: Number(editBk.totalPeople),
              teachers: editBk.teachers || [],
              instructors: (editBk.instructors || []),
              timeSlot: editBk.timeSlot,
              paymentStatus: editBk.paymentStatus, note: editBk.note, startDate: editBk.startDate
            });
            setEditBk(null);
          }}
          onClose={() => setEditBk(null)} />
      )}
    </div>
  );
}

// ─── Booking Edit Modal ───
function BookingEditModal({ bk, setBk, enrolled, courses, staff, instructorList, timeSlots, onSave, onClose }) {
  return (
    <EditModal title="แก้ไขการจอง" onClose={onClose} onSave={onSave}>
      <div className="space-y-4">
        <div>
          <label className="text-sm text-gray-600 block mb-2">ประเภทคอร์ส</label>
          <CourseTypePicker value={bk.courseType} onChange={v => setBk(b => ({ ...b, courseType: v }))} enrolled={enrolled} courses={courses} size="small" />
        </div>
        <div>
          <label className="text-sm text-gray-600 block mb-2">รอบเวลาเรียน</label>
          <TimeSlotPicker value={bk.timeSlot || ""} onChange={v => setBk(b => ({ ...b, timeSlot: v }))} timeSlots={timeSlots} />
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="จำนวนคน" type="number" value={bk.totalPeople || ""} onChange={v => setBk(b => ({ ...b, totalPeople: v }))} min={1} />
          <Field label="วันที่เริ่ม" type="date" value={bk.startDate || ""} onChange={v => setBk(b => ({ ...b, startDate: v }))} />
        </div>
        <div>
          <label className="text-sm text-gray-600 block mb-2">ผู้สอน</label>
          <div className="flex flex-wrap gap-2">
            {(instructorList || []).map(name => {
              const active = (bk.instructors || []).includes(name);
              return (
                <button key={name} type="button" onClick={() => {
                  const cur = bk.instructors || [];
                  setBk(b => ({ ...b, instructors: active ? cur.filter(n => n !== name) : [...cur, name] }));
                }}
                  className={`px-3 py-1.5 rounded-lg text-sm border transition ${
                    active ? "bg-purple-600 text-white border-purple-600" : "border-gray-300 text-gray-600 hover:border-purple-400"
                  }`}>{name}</button>
              );
            })}
          </div>
        </div>
        <div>
          <label className="text-sm text-gray-600 block mb-2">การชำระเงิน</label>
          <PaymentPicker value={bk.paymentStatus || "ยังไม่ได้โอน"} onChange={v => setBk(b => ({ ...b, paymentStatus: v }))} />
        </div>
        <Field label="หมายเหตุ" value={bk.note || ""} onChange={v => setBk(b => ({ ...b, note: v }))} />
      </div>
    </EditModal>
  );
}

// ─── Schedule ───
function Schedule({ sessions, bookings, customers, toggleSession, updateSessionDate, updateSessionExam, updateBooking, deleteBooking, enrolled, cfg, courseKeys, staff, courses, instructorList, timeSlots, loginUser }) {
  const [filter, setFilter] = useState("pending");
  const [editBk, setEditBk] = useState(null);
  const [examSession, setExamSession] = useState(null);
  const [certSession, setCertSession] = useState(null);

  const filtered = sessions.filter(s => filter === "all" ? true : filter === "pending" ? !s.done : s.done);
  const sorted = [...filtered].sort((a, b) => {
    const ba = bookings.find(x => x.id === a.bookingId);
    const bb = bookings.find(x => x.id === b.bookingId);
    return (ba?.createdAt||"").localeCompare(bb?.createdAt||"") || a.sessionNo - b.sessionNo;
  });

  const confirmDelete = (label, fn) => { if (window.confirm('ลบ "' + label + '"?')) fn(); };

  return (
    <div className="space-y-4">
      <div className="flex gap-2">
        {[["pending","รอดำเนินการ"],["done","เสร็จแล้ว"],["all","ทั้งหมด"]].map(([v,l]) => (
          <button key={v} onClick={() => setFilter(v)}
            className={`px-4 py-1.5 rounded-full text-sm border transition ${
              filter === v ? "bg-blue-600 text-white border-blue-600" : "border-gray-300 text-gray-500 hover:border-blue-400"
            }`}>{l}</button>
        ))}
      </div>

      {sorted.length === 0 ? (
        <div className="text-center py-12 text-gray-400">ไม่มีข้อมูล</div>
      ) : (
        <div className="bg-white rounded-xl border border-blue-100 overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-blue-50 border-b border-blue-100">
              <tr className="text-left text-blue-700 text-xs">
                <th className="px-4 py-3">ลูกค้า</th>
                <th className="px-4 py-3">คอร์ส</th>
                <th className="px-4 py-3">รอบ</th>
                <th className="px-4 py-3">ลำดับ</th>
                <th className="px-4 py-3">วันที่</th>
                <th className="px-4 py-3">เซลล์</th>
                <th className="px-4 py-3">สถานะ</th>
                <th className="px-4 py-3">ผลสอบ</th>
                <th className="px-4 py-3"></th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(s => {
                const bk = bookings.find(b => b.id === s.bookingId);
                const c  = customers.find(x => x.id === s.customerId);
                const bc = cfg(bk?.courseType);
                const allDone = sessions.filter(x => x.bookingId === s.bookingId).every(x => x.done || x.id === s.id);
                const examPassed = s.examResult === "ผ่าน";
                const displayDate = s.date || (s.sessionNo <= 1 ? bk?.startDate : "") || "";
                return (
                  <tr key={s.id} className="border-b last:border-0 hover:bg-blue-50/30">
                    <td className="px-4 py-2.5">
                      <p className="font-medium">{c?.name || "(รอลงทะเบียน)"}</p>
                      {c?.phone && <p className="text-xs text-gray-400">{c.phone}</p>}
                      {bk?.bookingCode && <p className="text-xs text-blue-500 font-mono">{bk.bookingCode}</p>}
                    </td>
                    <td className="px-4 py-2.5">
                      <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${bc.color}`}>{bc.label}</span>
                    </td>
                    <td className="px-4 py-2.5 text-xs text-gray-500">{bk?.timeSlot || "-"}</td>
                    <td className="px-4 py-2.5 text-center text-gray-500 text-xs">#{s.sessionNo || "1"}</td>
                    <td className="px-4 py-2.5">
                      <input type="date" value={displayDate} onChange={e => updateSessionDate(s.id, e.target.value)}
                        className="border border-gray-200 rounded px-2 py-0.5 text-xs text-gray-600 w-32" />
                    </td>
                    <td className="px-4 py-2.5 text-xs text-gray-500">{loginUser || "-"}</td>
                    <td className="px-4 py-2.5">
                      <button onClick={() => toggleSession(s.id)}
                        className={`text-xs px-3 py-1 rounded-full transition ${
                          s.done ? "bg-green-100 text-green-700 hover:bg-green-200" : "bg-blue-100 text-blue-600 hover:bg-blue-200"
                        }`}>{s.done ? "เสร็จ" : "ยังไม่เสร็จ"}</button>
                    </td>
                    <td className="px-4 py-2.5">
                      {s.examResult ? (
                        <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${
                          examPassed ? "bg-green-100 text-green-700" : "bg-red-100 text-red-600"
                        }`}>{s.examResult}{s.examScore ? " (" + s.examScore + ")" : ""}</span>
                      ) : (
                        s.done && <button onClick={() => setExamSession({ ...s })}
                          className="text-xs px-2 py-1 bg-amber-100 text-amber-700 rounded-lg hover:bg-amber-200 font-medium">บันทึกผลสอบ</button>
                      )}
                    </td>
                    <td className="px-4 py-2.5">
                      <div className="flex gap-1">
                        {s.done && examPassed && allDone && (
                          <button onClick={() => setCertSession(s)}
                            className="text-xs px-2 py-1 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 font-medium">ใบประกาศ</button>
                        )}
                        {s.sessionNo === 1 && bk && (
                          <>
                            <button onClick={() => setEditBk({ ...bk, teachers: bk.teachers || [], instructors: bk.instructors || [] })}
                              className="text-xs px-2 py-1 bg-blue-50 text-blue-600 rounded hover:bg-blue-100">แก้ไข</button>
                            <button onClick={() => confirmDelete(bc.label, () => deleteBooking(bk.id))}
                              className="text-xs px-2 py-1 bg-red-50 text-red-500 rounded hover:bg-red-100">ลบ</button>
                          </>
                        )}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Exam Modal */}
      {examSession && (
        <ExamModal session={examSession}
          onSave={(data) => {
            updateSessionExam(examSession.id, data);
            if (data.examResult === "ไม่ผ่าน") {
              const bk = bookings.find(b => b.id === examSession.bookingId);
              if (bk && window.confirm("สร้างนัดเรียนซ้ำให้อัตโนมัติไหม?")) {
                const newSess = { id: uid(), bookingId: bk.id, customerId: examSession.customerId,
                  sessionNo: sessions.filter(x => x.bookingId === bk.id).length + 1, done: false, date: "", note: "เรียนซ้ำ",
                  examResult: "", examScore: "", examNote: "" };
                const next = [...sessions, newSess];
                setSessions && void 0;
              }
            }
            setExamSession(null);
          }}
          onClose={() => setExamSession(null)} />
      )}

      {/* Certificate Modal */}
      {certSession && (
        <CertificateModal session={certSession}
          booking={bookings.find(b => b.id === certSession.bookingId)}
          customer={customers.find(c => c.id === certSession.customerId)}
          cfg={cfg}
          onClose={() => setCertSession(null)} />
      )}

      {editBk && (
        <BookingEditModal bk={editBk} setBk={setEditBk} enrolled={enrolled}
          courses={courses} staff={staff} instructorList={instructorList} timeSlots={timeSlots}
          onSave={() => {
            updateBooking(editBk.id, {
              courseType: editBk.courseType, totalPeople: Number(editBk.totalPeople),
              teachers: editBk.teachers || [],
              instructors: (editBk.instructors || []),
              timeSlot: editBk.timeSlot,
              paymentStatus: editBk.paymentStatus, note: editBk.note, startDate: editBk.startDate
            });
            setEditBk(null);
          }}
          onClose={() => setEditBk(null)} />
      )}
    </div>
  );
}

// ─── Exam Modal ───
function ExamModal({ session, onSave, onClose }) {
  const [result, setResult] = useState(session.examResult || "");
  const [score, setScore] = useState(session.examScore || "");
  const [note, setNote] = useState(session.examNote || "");
  return (
    <EditModal title="บันทึกผลสอบ / ประเมิน" onClose={onClose}
      onSave={() => { if (!result) { alert("กรุณาเลือกผลสอบ"); return; } onSave({ examResult: result, examScore: score, examNote: note, done: true, date: session.date || today() }); }}>
      <div className="space-y-4">
        <div>
          <label className="text-sm text-gray-600 block mb-2">ผลสอบ *</label>
          <div className="flex gap-3">
            {["ผ่าน", "ไม่ผ่าน"].map(r => (
              <button key={r} type="button" onClick={() => setResult(r)}
                className={`flex-1 py-2.5 rounded-lg text-sm font-medium border-2 transition ${
                  result === r
                    ? r === "ผ่าน" ? "border-green-500 bg-green-50 text-green-700" : "border-red-500 bg-red-50 text-red-700"
                    : "border-gray-200 text-gray-500 hover:border-gray-400"
                }`}>{r === "ผ่าน" ? "✓ ผ่าน" : "✗ ไม่ผ่าน"}</button>
            ))}
          </div>
        </div>
        <Field label="คะแนน (ถ้ามี)" value={score} onChange={setScore} />
        <Field label="หมายเหตุ" value={note} onChange={setNote} />
      </div>
    </EditModal>
  );
}

// ─── Calendar View (ปฏิทิน ว่าง/ไม่ว่าง) ───
function CalendarView({ sessions, bookings, courses, cfg, timeSlots }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [selectedDate, setSelectedDate] = useState(null);

  const prevMonth = () => { if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1); };
  const nextMonth = () => { if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1); };
  const goToday = () => { setYear(now.getFullYear()); setMonth(now.getMonth()); };

  const MONTH_NAMES = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const DAY_NAMES = ["อา","จ","อ","พ","พฤ","ศ","ส"];

  const occupancy = useMemo(() => {
    const map = {};
    // นับจาก sessions ที่มี date
    sessions.forEach(s => {
      if (!s.date) return;
      const bk = bookings.find(b => b.id === s.bookingId);
      if (!bk) return;
      const key = s.date;
      if (!map[key]) map[key] = {};
      const ct = bk.courseType;
      if (!map[key][ct]) map[key][ct] = {};
      const ts = bk.timeSlot || "ไม่ระบุ";
      map[key][ct][ts] = (map[key][ct][ts] || 0) + 1;
    });
    // นับจาก bookings ที่มี startDate (เซลล์จอง) แต่ session ยังไม่มี date
    bookings.forEach(bk => {
      if (!bk.startDate) return;
      const bkSessions = sessions.filter(s => s.bookingId === bk.id);
      const hasDateSession = bkSessions.some(s => s.date);
      if (hasDateSession) return; // ถ้ามี session มี date แล้ว ไม่ต้องนับซ้ำ
      const key = bk.startDate;
      if (!map[key]) map[key] = {};
      const ct = bk.courseType;
      if (!map[key][ct]) map[key][ct] = {};
      const ts = bk.timeSlot || "ไม่ระบุ";
      map[key][ct][ts] = (map[key][ct][ts] || 0) + (Number(bk.totalPeople) || 1);
    });
    return map;
  }, [sessions, bookings]);

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const weeks = [];
  let week = Array(firstDay).fill(null);
  for (let d = 1; d <= daysInMonth; d++) {
    week.push(d);
    if (week.length === 7) { weeks.push(week); week = []; }
  }
  if (week.length > 0) { while (week.length < 7) week.push(null); weeks.push(week); }

  const todayStr = today();
  const activeCourses = courses.filter(c => c.max < 999);

  const getStatus = (dateStr, courseType) => {
    const dayData = occupancy[dateStr];
    if (!dayData || !dayData[courseType]) return "available";
    const c = cfg(courseType);
    let total = 0;
    Object.values(dayData[courseType]).forEach(n => { total += n; });
    if (total >= c.max) return "full";
    return "partial";
  };

  const getDateStr = (d) => {
    const mm = String(month + 1).padStart(2, "0");
    const dd = String(d).padStart(2, "0");
    return `${year}-${mm}-${dd}`;
  };

  const selectedDetail = useMemo(() => {
    if (!selectedDate) return null;
    const dayData = occupancy[selectedDate] || {};
    return courses.map(c => {
      const slots = dayData[c.key] || {};
      let total = 0;
      Object.values(slots).forEach(n => { total += n; });
      const remaining = Math.max(0, (c.max < 999 ? c.max : 999) - total);
      const status = total === 0 ? "available" : total >= c.max && c.max < 999 ? "full" : "partial";
      const slotDetail = {};
      timeSlots.forEach(ts => { slotDetail[ts] = slots[ts] || 0; });
      return { ...c, total, remaining, status, slotDetail };
    });
  }, [selectedDate, occupancy, courses, cfg]);

  return (
    <div className="space-y-4">
      <div className="bg-white rounded-xl border border-blue-100 p-4">
        <div className="flex items-center justify-between mb-4">
          <button onClick={prevMonth} className="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 text-sm font-medium">◀ ก่อนหน้า</button>
          <div className="text-center">
            <h2 className="text-lg font-bold text-blue-800">{MONTH_NAMES[month]} {year + 543}</h2>
            <button onClick={goToday} className="text-xs text-blue-500 hover:underline">วันนี้</button>
          </div>
          <button onClick={nextMonth} className="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 text-sm font-medium">ถัดไป ▶</button>
        </div>

        <div className="flex flex-wrap gap-3 mb-4 text-xs">
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-green-400"></span> ว่าง</span>
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-amber-400"></span> มีจองบางส่วน</span>
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-red-400"></span> เต็ม</span>
        </div>

        <div className="grid grid-cols-7 gap-px bg-gray-200 rounded-lg overflow-hidden">
          {DAY_NAMES.map(d => (
            <div key={d} className="bg-blue-50 text-center py-2 text-xs font-medium text-blue-600">{d}</div>
          ))}
          {weeks.flat().map((d, idx) => {
            if (d === null) return <div key={"e" + idx} className="bg-white p-1 min-h-[64px]"></div>;
            const dateStr = getDateStr(d);
            const isToday = dateStr === todayStr;
            const isSelected = dateStr === selectedDate;

            const dots = activeCourses.map(c => ({
              key: c.key,
              status: getStatus(dateStr, c.key),
              color: getStatus(dateStr, c.key) === "available" ? "bg-green-400" :
                     getStatus(dateStr, c.key) === "full" ? "bg-red-400" : "bg-amber-400"
            }));

            return (
              <button key={d} onClick={() => setSelectedDate(dateStr === selectedDate ? null : dateStr)}
                className={`bg-white p-1 min-h-[64px] text-left hover:bg-blue-50 transition relative ${
                  isSelected ? "ring-2 ring-blue-500 z-10" : ""
                }`}>
                <span className={`text-xs font-medium block mb-1 ${
                  isToday ? "bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center" : "text-gray-700 pl-1"
                }`}>{d}</span>
                <div className="flex flex-wrap gap-0.5 px-0.5">
                  {dots.map(dot => (
                    <span key={dot.key} className={`w-2.5 h-2.5 rounded-full ${dot.color}`} title={cfg(dot.key).label}></span>
                  ))}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {selectedDate && selectedDetail && (
        <div className="bg-white rounded-xl border border-blue-100 p-5">
          <h3 className="font-semibold text-blue-800 mb-3">
            {new Date(selectedDate).toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
          </h3>
          <div className="space-y-2">
            {selectedDetail.map(c => {
              const statusColor = c.status === "available" ? "bg-green-50 border-green-200" :
                                  c.status === "full" ? "bg-red-50 border-red-200" : "bg-amber-50 border-amber-200";
              const statusText = c.status === "available" ? "ว่าง" :
                                 c.status === "full" ? "เต็ม" : "มีจองบางส่วน";
              const statusBadge = c.status === "available" ? "bg-green-100 text-green-700" :
                                  c.status === "full" ? "bg-red-100 text-red-700" : "bg-amber-100 text-amber-700";
              return (
                <div key={c.key} className={`rounded-lg border p-3 ${statusColor}`}>
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-2">
                      <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${c.color}`}>{c.label}</span>
                      <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${statusBadge}`}>{statusText}</span>
                    </div>
                    {c.max < 999 && (
                      <span className="text-xs text-gray-500">
                        จอง {c.total} / {c.max} คน {c.remaining > 0 && <span className="text-green-600 font-medium">(เหลือ {c.remaining})</span>}
                      </span>
                    )}
                  </div>
                  <div className="flex flex-wrap gap-2">
                    {timeSlots.map(ts => {
                      const count = c.slotDetail[ts] || 0;
                      return (
                        <div key={ts} className="flex items-center gap-1 bg-white/60 rounded px-2 py-1">
                          <span className="text-xs text-gray-500">{ts}</span>
                          <span className={`text-xs font-medium ${count > 0 ? "text-blue-600" : "text-gray-400"}`}>
                            {count > 0 ? count + " คน" : "ว่าง"}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Course Settings ───
function CourseSettings({ courses, saveCourses, staff, saveStaff, opsStaff, saveOpsStaff, instructorList, saveInstructorList, timeSlots, saveTimeSlots, enrolled, getPins, savePins }) {
  const [editIdx, setEditIdx] = useState(null);
  const [editForm, setEditForm] = useState(null);
  const [newStaff, setNewStaff] = useState("");
  const [newOps, setNewOps] = useState("");
  const [newInstructor, setNewInstructor] = useState("");
  const [newTimeSlot, setNewTimeSlot] = useState("");
  const [pins, setPinsLocal] = useState(() => getPins());
  const [pinSaved, setPinSaved] = useState(false);

  const startEdit = (idx) => {
    setEditIdx(idx);
    setEditForm({ ...courses[idx] });
  };

  const saveEdit = () => {
    if (!editForm.label) return;
    const next = [...courses];
    if (!editForm.key) editForm.key = editForm.label.replace(/\s+/g, "_") + "_" + Date.now().toString(36);
    next[editIdx] = editForm;
    saveCourses(next);
    setEditIdx(null); setEditForm(null);
  };

  const addCourse = () => {
    const key = "course_" + Date.now().toString(36);
    const colorIdx = courses.length % BADGE_COLORS.length;
    const newC = { key, label: "", range: "", max: 10, color: BADGE_COLORS[colorIdx] };
    const next = [...courses, newC];
    saveCourses(next);
    startEdit(next.length - 1);
  };

  const deleteCourse = (idx) => {
    const c = courses[idx];
    const used = enrolled[c.key] || 0;
    if (used > 0) { alert("ไม่สามารถลบได้ — มีการจอง " + used + " คนอยู่"); return; }
    if (!window.confirm('ลบคอร์ส "' + c.label + '"?')) return;
    saveCourses(courses.filter((_, i) => i !== idx));
  };

  const addStaffMember = () => {
    const name = newStaff.trim();
    if (!name || staff.includes(name)) return;
    saveStaff([...staff, name]);
    setNewStaff("");
  };

  const deleteStaffMember = (name) => {
    if (!window.confirm('ลบเซลล์ "' + name + '"?')) return;
    saveStaff(staff.filter(s => s !== name));
  };

  const addOpsMember = () => {
    const name = newOps.trim();
    if (!name || opsStaff.includes(name)) return;
    saveOpsStaff([...opsStaff, name]);
    setNewOps("");
  };

  const deleteOpsMember = (name) => {
    if (!window.confirm('ลบคนหน้างาน "' + name + '"?')) return;
    saveOpsStaff(opsStaff.filter(s => s !== name));
  };

  const addInstructor = () => {
    const name = newInstructor.trim();
    if (!name || instructorList.includes(name)) return;
    saveInstructorList([...instructorList, name]);
    setNewInstructor("");
  };

  const deleteInstructor = (name) => {
    if (!window.confirm('ลบผู้สอน "' + name + '"?')) return;
    saveInstructorList(instructorList.filter(s => s !== name));
  };

  const addTimeSlot = () => {
    const slot = newTimeSlot.trim();
    if (!slot || timeSlots.includes(slot)) return;
    saveTimeSlots([...timeSlots, slot]);
    setNewTimeSlot("");
  };

  const deleteTimeSlot = (slot) => {
    if (!window.confirm('ลบรอบ "' + slot + '"?')) return;
    saveTimeSlots(timeSlots.filter(s => s !== slot));
  };

  return (
    <div className="space-y-6 max-w-2xl">
      <div className="bg-white rounded-xl border border-blue-100 p-5">
        <div className="flex justify-between items-center mb-4">
          <h2 className="font-semibold text-blue-800">ประเภทคอร์ส</h2>
          <button onClick={addCourse}
            className="text-sm px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700">+ เพิ่มคอร์ส</button>
        </div>

        <div className="space-y-2">
          {courses.map((c, idx) => (
            <div key={c.key} className="flex items-center justify-between bg-blue-50/50 rounded-lg px-4 py-3 border border-blue-100">
              <div className="flex items-center gap-3">
                <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${c.color}`}>{c.label || "(ไม่มีชื่อ)"}</span>
                {c.range && <span className="text-xs text-gray-400">{c.range}</span>}
                <span className="text-xs text-gray-400">สูงสุด {c.max < 999 ? c.max + " คน" : "ไม่จำกัด"}</span>
                {(enrolled[c.key] || 0) > 0 && <span className="text-xs text-blue-600 font-medium">จอง {enrolled[c.key]} คน</span>}
              </div>
              <div className="flex gap-1">
                <button onClick={() => startEdit(idx)}
                  className="text-xs px-2 py-1 bg-blue-100 text-blue-600 rounded hover:bg-blue-200">แก้ไข</button>
                <button onClick={() => deleteCourse(idx)}
                  className="text-xs px-2 py-1 bg-red-50 text-red-500 rounded hover:bg-red-100">ลบ</button>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="bg-white rounded-xl border border-blue-100 p-5">
        <h2 className="font-semibold text-blue-800 mb-4">เซลล์</h2>
        <div className="flex gap-2 mb-3">
          <input value={newStaff} onChange={e => setNewStaff(e.target.value)}
            onKeyDown={e => e.key === "Enter" && (e.preventDefault(), addStaffMember())}
            placeholder="ชื่อเซลล์ใหม่..."
            className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
          <button onClick={addStaffMember}
            className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">+ เพิ่ม</button>
        </div>
        <div className="flex flex-wrap gap-2">
          {staff.map(name => (
            <div key={name} className="flex items-center gap-1 bg-blue-50 border border-blue-200 rounded-lg px-3 py-1.5">
              <span className="text-sm text-blue-700">{name}</span>
              <button onClick={() => deleteStaffMember(name)} className="text-red-400 hover:text-red-600 ml-1 text-xs">x</button>
            </div>
          ))}
          {staff.length === 0 && <p className="text-xs text-gray-400">ยังไม่มีเซลล์</p>}
        </div>
      </div>

      <div className="bg-white rounded-xl border border-teal-100 p-5">
        <h2 className="font-semibold text-teal-800 mb-4">คนหน้างาน (Ops)</h2>
        <div className="flex gap-2 mb-3">
          <input value={newOps} onChange={e => setNewOps(e.target.value)}
            onKeyDown={e => e.key === "Enter" && (e.preventDefault(), addOpsMember())}
            placeholder="ชื่อคนหน้างานใหม่..."
            className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-teal-400" />
          <button onClick={addOpsMember}
            className="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm hover:bg-teal-700">+ เพิ่ม</button>
        </div>
        <div className="flex flex-wrap gap-2">
          {opsStaff.map(name => (
            <div key={name} className="flex items-center gap-1 bg-teal-50 border border-teal-200 rounded-lg px-3 py-1.5">
              <span className="text-sm text-teal-700">{name}</span>
              <button onClick={() => deleteOpsMember(name)} className="text-red-400 hover:text-red-600 ml-1 text-xs">x</button>
            </div>
          ))}
          {opsStaff.length === 0 && <p className="text-xs text-gray-400">ยังไม่มีคนหน้างาน</p>}
        </div>
      </div>

      <div className="bg-white rounded-xl border border-purple-100 p-5">
        <h2 className="font-semibold text-purple-800 mb-4">ผู้สอน</h2>
        <div className="flex gap-2 mb-3">
          <input value={newInstructor} onChange={e => setNewInstructor(e.target.value)}
            onKeyDown={e => e.key === "Enter" && (e.preventDefault(), addInstructor())}
            placeholder="ชื่อผู้สอนใหม่..."
            className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400" />
          <button onClick={addInstructor}
            className="px-4 py-2 bg-purple-600 text-white rounded-lg text-sm hover:bg-purple-700">+ เพิ่ม</button>
        </div>
        <div className="flex flex-wrap gap-2">
          {instructorList.map(name => (
            <div key={name} className="flex items-center gap-1 bg-purple-50 border border-purple-200 rounded-lg px-3 py-1.5">
              <span className="text-sm text-purple-700">{name}</span>
              <button onClick={() => deleteInstructor(name)} className="text-red-400 hover:text-red-600 ml-1 text-xs">x</button>
            </div>
          ))}
          {instructorList.length === 0 && <p className="text-xs text-gray-400">ยังไม่มีผู้สอน</p>}
        </div>
      </div>

      <div className="bg-white rounded-xl border border-sky-100 p-5">
        <h2 className="font-semibold text-sky-800 mb-4">รอบเวลาเรียน</h2>
        <div className="flex gap-2 mb-3">
          <input value={newTimeSlot} onChange={e => setNewTimeSlot(e.target.value)}
            onKeyDown={e => e.key === "Enter" && (e.preventDefault(), addTimeSlot())}
            placeholder="เช่น 09:00-11:00"
            className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-sky-400" />
          <button onClick={addTimeSlot}
            className="px-4 py-2 bg-sky-600 text-white rounded-lg text-sm hover:bg-sky-700">+ เพิ่ม</button>
        </div>
        <div className="flex flex-wrap gap-2">
          {timeSlots.map(slot => (
            <div key={slot} className="flex items-center gap-1 bg-sky-50 border border-sky-200 rounded-lg px-3 py-1.5">
              <span className="text-sm text-sky-700">{slot}</span>
              <button onClick={() => deleteTimeSlot(slot)} className="text-red-400 hover:text-red-600 ml-1 text-xs">x</button>
            </div>
          ))}
          {timeSlots.length === 0 && <p className="text-xs text-gray-400">ยังไม่มีรอบเวลา</p>}
        </div>
      </div>

      {/* PIN Settings */}
      <div className="bg-white rounded-xl border border-blue-100 p-5">
        <h2 className="font-semibold text-blue-800 mb-4">รหัส PIN เข้าสู่ระบบ</h2>
        <div className="space-y-3">
          <div>
            <label className="text-sm text-gray-600 block mb-1">PIN เซลล์ (4 หลัก)</label>
            <input type="text" inputMode="numeric" maxLength={4} value={pins.sales || ""}
              onChange={e => { if (/^\d{0,4}$/.test(e.target.value)) setPinsLocal(p => ({ ...p, sales: e.target.value })); }}
              placeholder="เช่น 1234"
              className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono tracking-widest focus:outline-none focus:border-blue-400" />
          </div>
          <div>
            <label className="text-sm text-gray-600 block mb-1">PIN หน้างาน (4 หลัก)</label>
            <input type="text" inputMode="numeric" maxLength={4} value={pins.ops || ""}
              onChange={e => { if (/^\d{0,4}$/.test(e.target.value)) setPinsLocal(p => ({ ...p, ops: e.target.value })); }}
              placeholder="เช่น 5678"
              className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono tracking-widest focus:outline-none focus:border-blue-400" />
          </div>
          <button onClick={() => {
              savePins(pins); setPinSaved(true);
              setTimeout(() => setPinSaved(false), 2000);
            }}
            className="w-full py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
            {pinSaved ? "✓ บันทึกแล้ว" : "บันทึก PIN"}
          </button>
          <p className="text-xs text-gray-400">PIN เริ่มต้น: เซลล์ = 1234 / หน้างาน = 5678</p>
        </div>
      </div>

      {editIdx !== null && editForm && (
        <EditModal title="แก้ไขคอร์ส" onClose={() => { setEditIdx(null); setEditForm(null); }} onSave={saveEdit}>
          <div className="space-y-3">
            <Field label="ชื่อคอร์ส *" value={editForm.label} onChange={v => setEditForm(f => ({ ...f, label: v }))} required />
            <Field label="ช่วงจำนวนคน (เช่น 5-7 คน)" value={editForm.range} onChange={v => setEditForm(f => ({ ...f, range: v }))} />
            <div>
              <label className="text-sm text-gray-600 block mb-1">จำนวนสูงสุด</label>
              <input type="number" value={editForm.max} onChange={e => setEditForm(f => ({ ...f, max: Number(e.target.value) }))}
                min={1} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
              <p className="text-xs text-gray-400 mt-1">ใส่ 999 = ไม่จำกัด</p>
            </div>
            <div>
              <label className="text-sm text-gray-600 block mb-2">สีป้าย</label>
              <div className="flex flex-wrap gap-2">
                {BADGE_COLORS.map((bc, i) => (
                  <button key={i} type="button" onClick={() => setEditForm(f => ({ ...f, color: bc }))}
                    className={`px-3 py-1 rounded-full text-xs font-medium ${bc} border-2 transition ${
                      editForm.color === bc ? "border-blue-600 ring-2 ring-blue-300" : "border-transparent"
                    }`}>Aa</button>
                ))}
              </div>
            </div>
          </div>
        </EditModal>
      )}
    </div>
  );
}

// ─── Edit Modal ───
function EditModal({ title, children, onSave, onClose }) {
  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto">
        <h2 className="text-base font-semibold text-blue-800 mb-4">{title}</h2>
        {children}
        <div className="flex gap-2 mt-5">
          <button onClick={onSave}
            className="flex-1 text-white py-2 rounded-lg text-sm font-medium"
            style={{ background: "linear-gradient(135deg, #3757D3 0%, #5C91FF 100%)" }}>
            บันทึก
          </button>
          <button onClick={onClose}
            className="flex-1 border border-gray-300 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50">ยกเลิก</button>
        </div>
      </div>
    </div>
  );
}

// ─── Setup Modal ───
function SetupModal({ gsUrl, setGsUrl, onClose, onSync }) {
  const [url, setUrl] = useState(gsUrl);
  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
        <h2 className="text-lg font-semibold text-blue-800 mb-1">ตั้งค่า Google Sheets</h2>
        <p className="text-xs text-gray-400 mb-4">วาง URL ของ Google Apps Script Web App</p>
        <textarea value={url} onChange={e => setUrl(e.target.value)} rows={3}
          placeholder="https://script.google.com/macros/s/..."
          className="w-full border border-blue-200 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-blue-400" />
        <p className="text-xs text-gray-400 mt-2 mb-4">
          หากยังไม่มี: เปิด Google Sheets, Extensions, Apps Script, วางโค้ด, Deploy, New deployment
        </p>
        <div className="flex gap-2">
          <button onClick={() => { setGsUrl(url); onSync(); onClose(); }}
            className="flex-1 text-white py-2 rounded-lg text-sm font-medium"
            style={{ background: "linear-gradient(135deg, #3757D3 0%, #5C91FF 100%)" }}>
            บันทึกและซิงค์
          </button>
          <button onClick={onClose}
            className="flex-1 border border-gray-300 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50">ยกเลิก</button>
        </div>
      </div>
    </div>
  );
}

// ─── Render ───
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
